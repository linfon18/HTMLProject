<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sierpinski Patterns</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.btn.active{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.25);color:#a78bfa}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn active" onclick="setMode('chaos')">Chaos Game</button>
  <button class="btn" onclick="setMode('triangle')">Triangle</button>
  <button class="btn" onclick="setMode('carpet')">Carpet</button>
  <button class="btn" onclick="setMode('arrowhead')">Arrowhead</button>
  <button class="btn" onclick="resetSim()">Reset</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%3">Color</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;resetSim()}
addEventListener('resize',resize);

let mode='chaos',colorMode=0,count=0;
let x=0,y=0;

function setMode(m){mode=m;document.querySelectorAll('.btn').forEach(b=>{b.classList.remove('active');if(b.textContent.toLowerCase()===m)b.classList.add('active')});resetSim()}

function resetSim(){
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  count=0;x=Math.random();y=Math.random();
  if(mode==='triangle'||mode==='arrowhead'){
    // Draw recursive
    drawTriangleRecursive();
  }else if(mode==='carpet'){
    drawCarpetRecursive();
  }
}

function drawTriangleRecursive(){
  function sierpinski(ax,ay,bx,by,cx,cy,depth){
    if(depth===0){
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx,cy);ctx.closePath();
      const hue=(ax+by)*.1%360;
      ctx.fillStyle=`hsla(${hue},50%,30%,.8)`;ctx.fill();
      return;
    }
    const mabx=(ax+bx)/2,maby=(ay+by)/2;
    const mbcx=(bx+cx)/2,mbcy=(by+cy)/2;
    const macx=(ax+cx)/2,macy=(ay+cy)/2;
    sierpinski(ax,ay,mabx,maby,macx,macy,depth-1);
    sierpinski(mabx,maby,bx,by,mbcx,mbcy,depth-1);
    sierpinski(macx,macy,mbcx,mbcy,cx,cy,depth-1);
  }
  const pad=40;
  sierpinski(W/2,pad,pad,H-pad,W-pad,H-pad,Math.min(8,Math.floor(Math.log2(Math.min(W,H)/20))));
}

function drawCarpetRecursive(){
  function carpet(x,y,size,depth){
    if(depth===0){
      ctx.fillStyle=`hsla(${(x+y)*.2%360},50%,30%,.8)`;
      ctx.fillRect(x,y,size,size);return;
    }
    const s=size/3;
    for(let dy=0;dy<3;dy++)for(let dx=0;dx<3;dx++){
      if(dx===1&&dy===1)continue;
      carpet(x+dx*s,y+dy*s,s,depth-1);
    }
  }
  const size=Math.min(W,H)*.8;
  carpet((W-size)/2,(H-size)/2,size,Math.min(6,Math.floor(Math.log(size/3)/Math.log(3))));
}

function chaosStep(){
  if(mode==='chaos'){
    // Standard chaos game with 3 vertices
    const verts=[[W/2,30],[30,H-30],[W-30,H-30]];
    for(let i=0;i<100;i++){
      const v=verts[Math.random()*3|0];
      x=(x+v[0])/2;y=(y+v[1])/2;
      const hue=colorMode===0?count*.1%360:colorMode===1?(x/W)*360:Math.atan2(y-H/2,x-W/2)*180/Math.PI+180;
      ctx.fillStyle=`hsla(${hue},70%,55%,.6)`;
      ctx.fillRect(x,y,1.5,1.5);
      count++;
    }
  }else if(mode==='arrowhead'){
    // Sierpinski arrowhead via chaos game with hexagonal symmetry
    const verts=[[W/2,30],[30,H-30],[W-30,H-30],[W/2,H*.7],[W*.3,H*.3],[W*.7,H*.3]];
    for(let i=0;i<100;i++){
      const v=verts[Math.random()*6|0];
      x=(x*2+v[0])/3;y=(y*2+v[1])/3;
      ctx.fillStyle=`hsla(${count*.05%360},60%,50%,.5)`;
      ctx.fillRect(x,y,1,1);count++;
    }
  }
  document.getElementById('stats').textContent=`${count} points`;
}

function loop(){
  if(mode==='chaos'||mode==='arrowhead')chaosStep();
  requestAnimationFrame(loop);
}
resetSim();
requestAnimationFrame(loop);
</script>
</body>
</html>
