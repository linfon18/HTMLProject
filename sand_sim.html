<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Simulation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.btn.active{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.25);color:#a78bfa}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn active" onclick="setMaterial('sand')">Sand</button>
  <button class="btn" onclick="setMaterial('water')">Water</button>
  <button class="btn" onclick="setMaterial('stone')">Stone</button>
  <button class="btn" onclick="setMaterial('fire')">Fire</button>
  <button class="btn" onclick="setMaterial('wood')">Wood</button>
  <button class="btn" onclick="setMaterial('acid')">Acid</button>
  <button class="btn" onclick="setMaterial('gas')">Gas</button>
  <button class="btn" onclick="clearGrid()">Clear</button>
  <button class="btn" onclick="brushSize=brushSize===1?3:brushSize===3?6:1;brushBtn.textContent='Brush:'+brushSize" id="brushBtn">Brush:1</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const S=4;
let W,H,cols,rows;
let grid;
let currentMaterial='sand',brushSize=1,mouseDown=false,mouseX=0,mouseY=0;

// Materials: 0=empty, 1=sand, 2=water, 3=stone, 4=fire, 5=wood, 6=acid, 7=gas
const MAT_COLORS={
  0:[5,5,8],
  1:[(t)=>180+Math.sin(t*.1)*20,(t)=>150+Math.sin(t*.05)*20,(t)=>80],
  2:[(t)=>30+Math.sin(t*.2)*10,(t)=>100+Math.sin(t*.15)*30,(t)=>200],
  3:[120,120,130],
  4:[(t)=>255,(t)=>100+Math.random()*80,(t)=>20+Math.random()*30],
  5:[100,70,40],
  6:[(t)=>50+Math.random()*30,(t)=>220+Math.random()*35,(t)=>50+Math.random()*30],
  7:[(t)=>80+Math.sin(t*.3)*30,(t)=>80+Math.sin(t*.2)*20,(t)=>100+Math.sin(t*.1)*30]
};

function resize(){
  cols=Math.floor(innerWidth/S);rows=Math.floor(innerHeight/S);
  W=canvas.width=cols*S;H=canvas.height=rows*S;
  if(!grid)grid=new Uint8Array(cols*rows);
}
addEventListener('resize',resize);

canvas.addEventListener('mousedown',e=>{mouseDown=true;draw_at(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;if(mouseDown)draw_at(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>mouseDown=false);

function draw_at(px,py){
  const cx=Math.floor(px/S),cy=Math.floor(py/S);
  const mat={sand:1,water:2,stone:3,fire:4,wood:5,acid:6,gas:7}[currentMaterial];
  for(let dy=-brushSize;dy<=brushSize;dy++)for(let dx=-brushSize;dx<=brushSize;dx++){
    if(dx*dx+dy*dy>brushSize*brushSize)continue;
    const x=cx+dx,y=cy+dy;
    if(x>=0&&x<cols&&y>=0&&y<rows){
      if(mat===3||mat===5)grid[y*cols+x]=mat;
      else if(Math.random()<.6)grid[y*cols+x]=mat;
    }
  }
}

function setMaterial(m){
  currentMaterial=m;
  document.querySelectorAll('.btn').forEach(b=>{
    if(['Sand','Water','Stone','Fire','Wood','Acid','Gas'].includes(b.textContent))b.classList.remove('active');
    if(b.textContent.toLowerCase()===m)b.classList.add('active');
  });
}

function clearGrid(){grid.fill(0)}

function step(){
  const next=new Uint8Array(cols*rows);
  // Process bottom-up
  for(let y=rows-1;y>=0;y--){
    for(let x=0;x<cols;x++){
      const i=y*cols+x;
      const mat=grid[i];
      if(mat===0)continue;
      if(mat===3||mat===5){next[i]=mat;continue} // Stone and wood don't move

      const below=y+1<rows?grid[(y+1)*cols+x]:3;
      const belowL=x>0&&y+1<rows?grid[(y+1)*cols+x-1]:3;
      const belowR=x<cols-1&&y+1<rows?grid[(y+1)*cols+x+1]:3;
      const left=x>0?grid[y*cols+x-1]:3;
      const right=x<cols-1?grid[y*cols+x+1]:3;

      if(mat===1){ // Sand
        if(below===0){next[(y+1)*cols+x]=1}
        else if(below===2){next[i]=2;next[(y+1)*cols+x]=1} // Sink in water
        else if(belowL===0&&x>0){next[(y+1)*cols+x-1]=1}
        else if(belowR===0&&x<cols-1){next[(y+1)*cols+x+1]=1}
        else next[i]=1;
      }
      else if(mat===2){ // Water
        if(below===0){next[(y+1)*cols+x]=2}
        else{
          const dir=Math.random()>.5?1:-1;
          const side1=x+dir>=0&&x+dir<cols?grid[y*cols+x+dir]:3;
          const side2=x-dir>=0&&x-dir<cols?grid[y*cols+x-dir]:3;
          if(side1===0&&x+dir>=0&&x+dir<cols){next[y*cols+x+dir]=2}
          else if(side2===0&&x-dir>=0&&x-dir<cols){next[y*cols+x-dir]=2}
          else next[i]=2;
        }
      }
      else if(mat===4){ // Fire
        if(Math.random()<.1)continue; // Dies out
        // Burns adjacent wood
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          const nx=x+dx,ny=y+dy;
          if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&grid[ny*cols+nx]===5&&Math.random()<.05){
            next[ny*cols+nx]=4;
          }
        }
        // Rises
        if(y>0&&next[(y-1)*cols+x]===0){next[(y-1)*cols+x]=4;next[i]=0}
        else if(y>0&&x>0&&next[(y-1)*cols+x-1]===0&&Math.random()>.5){next[(y-1)*cols+x-1]=4;next[i]=0}
        else if(y>0&&x<cols-1&&next[(y-1)*cols+x+1]===0&&Math.random()>.5){next[(y-1)*cols+x+1]=4;next[i]=0}
        else next[i]=4;
      }
      else if(mat===6){ // Acid
        // Dissolves adjacent non-acid, non-empty
        let dissolved=false;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          const nx=x+dx,ny=y+dy;
          if(nx>=0&&nx<cols&&ny>=0&&ny<rows){
            const target=grid[ny*cols+nx];
            if(target!==0&&target!==6&&Math.random()<.02){
              grid[ny*cols+nx]=0;dissolved=true;
            }
          }
        }
        if(dissolved&&Math.random()<.3)continue; // Acid consumed
        if(below===0){next[(y+1)*cols+x]=6}
        else{next[i]=6}
      }
      else if(mat===7){ // Gas
        if(y>0&&grid[(y-1)*cols+x]===0){next[(y-1)*cols+x]=7}
        else{
          const dir=Math.random()>.5?1:-1;
          if(x+dir>=0&&x+dir<cols&&grid[y*cols+x+dir]===0){next[y*cols+x+dir]=7}
          else if(x-dir>=0&&x-dir<cols&&grid[y*cols+x-dir]===0){next[y*cols+x-dir]=7}
          else if(y>0&&x+dir>=0&&x+dir<cols&&grid[(y-1)*cols+x+dir]===0){next[(y-1)*cols+x+dir]=7}
          else next[i]=7;
        }
      }
    }
  }
  // Keep stone and wood
  for(let i=0;i<grid.length;i++){
    if(grid[i]===3||grid[i]===5)next[i]=grid[i];
  }
  grid=next;
}

function draw(){
  const imgData=ctx.createImageData(W,H);
  const d=imgData.data;
  let particles=0;
  const t=performance.now()*.01;
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const mat=grid[y*cols+x];
    if(mat)particles++;
    const col=MAT_COLORS[mat];
    const r=typeof col[0]==='function'?col[0](t+x+y):col[0];
    const g=typeof col[1]==='function'?col[1](t+x):col[1];
    const b=typeof col[2]==='function'?col[2](t+y):col[2];
    for(let dy=0;dy<S;dy++)for(let dx=0;dx<S;dx++){
      const idx=((y*S+dy)*W+x*S+dx)*4;
      // Add slight variation
      const noise=mat!==0?(Math.random()-.5)*10:0;
      d[idx]=Math.max(0,Math.min(255,r+noise));
      d[idx+1]=Math.max(0,Math.min(255,g+noise));
      d[idx+2]=Math.max(0,Math.min(255,b+noise));
      d[idx+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
  document.getElementById('stats').textContent=`${particles} particles · ${cols}x${rows} grid`;
}

resize();
function loop(){step();draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
</html>
