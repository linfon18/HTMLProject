<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Spectrum Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;inset:0}
.ui{position:fixed;top:12px;left:12px;z-index:10}
.panel{padding:12px;border-radius:10px;background:rgba(10,10,15,.8);backdrop-filter:blur(16px);border:1px solid var(--border);min-width:180px}
.panel h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:.68rem}
.row label{color:var(--t3);font-size:.62rem}
input[type=range]{width:70px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3);min-width:22px;text-align:right}
.btn{padding:5px 10px;border-radius:6px;font-size:.68rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t3);cursor:pointer;transition:all .2s;text-align:center;margin-top:4px;width:100%}
.btn:hover{color:var(--t1);background:rgba(255,255,255,.1)}
.info{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="panel">
    <h3>Spectrum Analyzer</h3>
    <button class="btn" onclick="startMic()">Start Microphone</button>
    <button class="btn" onclick="startDemo()">Demo Mode</button>
    <div class="row"><label>Smoothing</label><input type="range" id="smoothing" min="0" max="90" value="80"><span class="val" id="smoothingV">0.8</span></div>
    <div class="row"><label>Gain</label><input type="range" id="gain" min="1" max="100" value="50"><span class="val" id="gainV">50</span></div>
    <button class="btn" onclick="vizMode=(vizMode+1)%4">Change Visualization</button>
  </div>
</div>
<div class="info" id="info">Click "Start Microphone" or "Demo Mode" to begin</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let audioCtx,analyser,dataArray,freqArray;
let vizMode=0,demoMode=false,demoPhase=0;

async function startMic(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const source=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;
    source.connect(analyser);
    dataArray=new Uint8Array(analyser.frequencyBinCount);
    freqArray=new Uint8Array(analyser.frequencyBinCount);
    demoMode=false;
    document.getElementById('info').textContent='Microphone active';
  }catch(e){document.getElementById('info').textContent='Mic error: '+e.message}
}

function startDemo(){
  demoMode=true;
  document.getElementById('info').textContent='Demo mode - simulated audio';
}

function update(){
  if(demoMode){
    demoPhase+=.02;
    const bins=1024;
    if(!dataArray||dataArray.length!==bins){
      dataArray=new Uint8Array(bins);
      freqArray=new Uint8Array(bins);
    }
    for(let i=0;i<bins;i++){
      const f=i/bins;
      const bass=Math.max(0,Math.sin(demoPhase*3+f*10)*.6+.4)*255*(1-f*2);
      const mid=Math.max(0,Math.sin(demoPhase*5+f*20)*.5+.5)*255*Math.sin(f*Math.PI);
      const treble=Math.max(0,Math.sin(demoPhase*8+f*40)*.4+.6)*255*f;
      freqArray[i]=Math.min(255,Math.max(0,bass+mid+treble));
      dataArray[i]=Math.min(255,freqArray[i]+Math.random()*20);
    }
  }else if(analyser){
    analyser.getByteFrequencyData(freqArray);
    analyser.getByteTimeDomainData(dataArray);
  }
}

function draw(){
  ctx.fillStyle='rgba(5,5,8,.2)';ctx.fillRect(0,0,W,H);
  if(!freqArray)return;

  const smoothing=+document.getElementById('smoothing').value/100;
  const gain=+document.getElementById('gain').value/50;
  const bins=freqArray.length;

  if(vizMode===0){
    // Bars
    const barCount=128;
    const barW=W/barCount;
    for(let i=0;i<barCount;i++){
      const idx=Math.floor(i/barCount*bins*.5);
      const val=freqArray[idx]/255*gain;
      const h=val*H*.8;
      const hue=i/barCount*300+200;
      ctx.fillStyle=`hsla(${hue},70%,50%,.8)`;
      ctx.fillRect(i*barW,H-h,barW-1,h);
      // Mirror
      ctx.fillStyle=`hsla(${hue},70%,30%,.2)`;
      ctx.fillRect(i*barW,H,barW-1,h*.3);
    }
  }else if(vizMode===1){
    // Circular
    const cx=W/2,cy=H/2,r=Math.min(W,H)*.3;
    ctx.beginPath();
    for(let i=0;i<bins;i++){
      const angle=i/bins*Math.PI*2;
      const val=freqArray[i]/255*gain;
      const rr=r+val*r;
      const x=cx+Math.cos(angle)*rr;
      const y=cy+Math.sin(angle)*rr;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,'rgba(139,92,246,.3)');grad.addColorStop(1,'rgba(6,182,212,.3)');
    ctx.fillStyle=grad;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
  }else if(vizMode===2){
    // Waveform
    ctx.beginPath();
    const sliceW=W/dataArray.length;
    for(let i=0;i<dataArray.length;i++){
      const v=dataArray[i]/128;const y=v*H/2;
      if(i===0)ctx.moveTo(0,y);else ctx.lineTo(i*sliceW,y);
    }
    ctx.strokeStyle='rgba(34,197,94,.6)';ctx.lineWidth=2;ctx.stroke();
    // Fill under
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle='rgba(34,197,94,.05)';ctx.fill();
  }else{
    // Spectrogram (time-frequency)
    const imgData=ctx.getImageData(0,0,W,H);
    // Shift left
    const data=imgData.data;
    for(let y=0;y<H;y++){
      for(let x=0;x<W-1;x++){
        const src=((y)*W+x+1)*4;
        const dst=((y)*W+x)*4;
        data[dst]=data[src];data[dst+1]=data[src+1];data[dst+2]=data[src+2];data[dst+3]=255;
      }
    }
    // New column
    for(let y=0;y<H;y++){
      const freqIdx=Math.floor((1-y/H)*bins*.5);
      const val=freqArray[freqIdx]/255*gain;
      const hue=val*300;
      const idx=(y*W+W-1)*4;
      data[idx]=Math.sin(hue*.017)*127+128;
      data[idx+1]=Math.sin(hue*.017+2.09)*127+128;
      data[idx+2]=Math.sin(hue*.017+4.19)*127+128;
      data[idx+3]=255;
    }
    ctx.putImageData(imgData,0,0);
    return;
  }

  // Frequency labels
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='10px Space Mono';
  const freqs=['60Hz','250Hz','1kHz','4kHz','16kHz'];
  freqs.forEach((f,i)=>{
    const x=i/(freqs.length-1)*W*.9+W*.05;
    ctx.fillText(f,x,H-5);
  });
}

document.getElementById('smoothing').addEventListener('input',e=>{
  document.getElementById('smoothingV').textContent=(+e.target.value/100).toFixed(1);
  if(analyser)analyser.smoothingTimeConstant=+e.target.value/100;
});
document.getElementById('gain').addEventListener('input',e=>document.getElementById('gainV').textContent=e.target.value);

function loop(){update();draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
</html>
