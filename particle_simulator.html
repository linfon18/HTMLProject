<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子流体模拟器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--panel:rgba(255,255,255,.04);--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}

body{
  background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;
  min-height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

canvas{display:block;position:fixed;inset:0;z-index:0}

.ui{
  position:fixed;top:20px;left:20px;z-index:10;
  display:flex;flex-direction:column;gap:8px;
}
.panel{
  background:rgba(10,10,15,.75);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:12px;
  padding:16px;min-width:220px;
}
.panel h3{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:.78rem}
.row label{color:var(--t3);font-size:.72rem}
.row input[type=range]{
  width:100px;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.1);border-radius:2px;outline:none;
}
.row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--t1);cursor:pointer;box-shadow:0 0 8px rgba(255,255,255,.2);
}
.row .val{
  font-family:'Space Mono',monospace;font-size:.7rem;color:var(--t2);
  min-width:32px;text-align:right;
}
.btn{
  padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--t2);cursor:pointer;transition:all .2s;width:100%;margin-top:4px;
}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.btn.active{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.3);color:#a78bfa}

.fps{
  position:fixed;bottom:16px;left:16px;z-index:10;
  font-size:.65rem;font-family:'Space Mono',monospace;color:var(--t3);
  padding:4px 10px;border-radius:6px;background:rgba(10,10,15,.6);
  backdrop-filter:blur(10px);border:1px solid var(--border);
}

.info{
  position:fixed;bottom:16px;right:16px;z-index:10;
  font-size:.65rem;color:var(--t3);text-align:right;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui">
  <div class="panel">
    <h3>Controls</h3>
    <div class="row">
      <label>Particles</label>
      <input type="range" id="pCount" min="100" max="3000" value="800" step="50">
      <span class="val" id="pCountV">800</span>
    </div>
    <div class="row">
      <label>Viscosity</label>
      <input type="range" id="visc" min="1" max="100" value="30">
      <span class="val" id="viscV">30</span>
    </div>
    <div class="row">
      <label>Force</label>
      <input type="range" id="force" min="1" max="100" value="50">
      <span class="val" id="forceV">50</span>
    </div>
    <div class="row">
      <label>Radius</label>
      <input type="range" id="radius" min="1" max="8" value="3" step="0.5">
      <span class="val" id="radiusV">3</span>
    </div>
    <div class="row">
      <label>Gravity</label>
      <input type="range" id="gravity" min="0" max="20" value="5" step="1">
      <span class="val" id="gravityV">5</span>
    </div>
    <button class="btn" id="modeBtn" onclick="toggleMode()">Mode: Attract</button>
    <button class="btn" onclick="resetParticles()">Reset</button>
    <button class="btn" id="colorBtn" onclick="cycleColor()">Color: Rainbow</button>
  </div>
</div>

<div class="fps" id="fps">0 FPS · 0 particles</div>
<div class="info">Click & drag to interact · Scroll to zoom force</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

// State
let particles=[];
let mouseX=W/2,mouseY=H/2,mouseDown=false;
let mode='attract'; // attract, repel, vortex
let colorMode='rainbow';
let frameCount=0,fpsVal=0,lastFps=performance.now();

const cfg={
  count:800,viscosity:.97,force:.05,radius:3,gravity:.02
};

// Color palettes
const palettes={
  rainbow:(p,i)=>`hsl(${(i*.3+frameCount*.5)%360},80%,65%)`,
  ocean:(p,i)=>`hsl(${200+p.vy*50},70%,${50+p.vx*20}%)`,
  fire:(p,i)=>`hsl(${20+p.age*.5},90%,${50+p.speed*30}%)`,
  neon:(p,i)=>`hsl(${280+i%60},100%,60%)`,
  mono:(p,i)=>`rgba(255,255,255,${.3+p.speed*.5})`,
};

class Particle{
  constructor(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*2;this.vy=(Math.random()-.5)*2;
    this.ax=0;this.ay=0;this.age=Math.random()*1000;this.speed=0;
  }
  update(){
    // Gravity
    this.ay+=cfg.gravity*.01;

    // Mouse interaction
    if(mouseDown){
      const dx=mouseX-this.x,dy=mouseY-this.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+1;
      const f=cfg.force*200/(dist+50);
      if(mode==='attract'){this.ax+=dx/dist*f;this.ay+=dy/dist*f}
      else if(mode==='repel'){this.ax-=dx/dist*f;this.ay-=dy/dist*f}
      else{this.ax+=-dy/dist*f;this.ay+=dx/dist*f}
    }

    this.vx+=this.ax;this.vy+=this.ay;
    this.vx*=cfg.viscosity;this.vy*=cfg.viscosity;
    this.x+=this.vx;this.y+=this.vy;
    this.ax=0;this.ay=0;
    this.speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    this.age+=.5;

    // Boundaries
    if(this.x<0){this.x=0;this.vx*=-.6}
    if(this.x>W){this.x=W;this.vx*=-.6}
    if(this.y<0){this.y=0;this.vy*=-.6}
    if(this.y>H){this.y=H;this.vy*=-.6}
  }
  draw(i){
    const c=palettes[colorMode](this,i);
    ctx.beginPath();
    ctx.arc(this.x,this.y,cfg.radius,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
    // Glow
    if(this.speed>.5){
      ctx.beginPath();
      ctx.arc(this.x,this.y,cfg.radius*2.5,0,Math.PI*2);
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,cfg.radius*2.5);
      g.addColorStop(0,c.replace(')',',.15)').replace('hsl','hsla').replace('rgba','rgba'));
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.fill();
    }
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<cfg.count;i++)particles.push(new Particle());
}
initParticles();

function resetParticles(){initParticles()}

function toggleMode(){
  const modes=['attract','repel','vortex'];
  const idx=(modes.indexOf(mode)+1)%modes.length;
  mode=modes[idx];
  document.getElementById('modeBtn').textContent='Mode: '+mode.charAt(0).toUpperCase()+mode.slice(1);
  document.getElementById('modeBtn').classList.add('active');
}

function cycleColor(){
  const modes=Object.keys(palettes);
  const idx=(modes.indexOf(colorMode)+1)%modes.length;
  colorMode=modes[idx];
  document.getElementById('colorBtn').textContent='Color: '+colorMode.charAt(0).toUpperCase()+colorMode.slice(1);
}

// Adjust particle count
function adjustCount(){
  const target=cfg.count;
  while(particles.length<target)particles.push(new Particle());
  while(particles.length>target)particles.pop();
}

// Sliders
document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>{
    vEl.textContent=s.value;
    if(s.id==='pCount'){cfg.count=+s.value;adjustCount()}
    if(s.id==='visc'){cfg.viscosity=.9+.1*(+s.value/100)}
    if(s.id==='force'){cfg.force=+s.value/1000}
    if(s.id==='radius'){cfg.radius=+s.value}
    if(s.id==='gravity'){cfg.gravity=+s.value*.004}
  });
});

// Mouse
canvas.addEventListener('mousedown',e=>{mouseDown=true;mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mouseup',()=>{mouseDown=false});
canvas.addEventListener('touchstart',e=>{mouseDown=true;mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
canvas.addEventListener('touchmove',e=>{mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});
canvas.addEventListener('touchend',()=>{mouseDown=false});

// Draw mouse indicator
function drawMouse(){
  if(!mouseDown)return;
  ctx.beginPath();
  ctx.arc(mouseX,mouseY,30,0,Math.PI*2);
  ctx.strokeStyle=mode==='attract'?'rgba(139,92,246,.3)':mode==='repel'?'rgba(244,63,94,.3)':'rgba(6,182,212,.3)';
  ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();
  ctx.arc(mouseX,mouseY,60,0,Math.PI*2);
  ctx.strokeStyle=mode==='attract'?'rgba(139,92,246,.1)':mode==='repel'?'rgba(244,63,94,.1)':'rgba(6,182,212,.1)';
  ctx.stroke();
}

// Main loop
function loop(){
  ctx.fillStyle='rgba(5,5,8,.15)';
  ctx.fillRect(0,0,W,H);

  for(let i=0;i<particles.length;i++){
    particles[i].update();
    particles[i].draw(i);
  }
  drawMouse();

  frameCount++;
  const now=performance.now();
  if(now-lastFps>500){
    fpsVal=Math.round(1000/(now-lastFps)*frameCount);
    document.getElementById('fps').textContent=`${fpsVal} FPS · ${particles.length} particles`;
    frameCount=0;lastFps=now;
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
