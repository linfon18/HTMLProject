<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Wave Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;padding:16px}
.top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.top h1{font-size:.9rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.btn.active{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.25);color:#4ade80}
canvas{width:100%;flex:1;border:1px solid var(--border);border-radius:8px}
.controls{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;align-items:center}
.slider-group{display:flex;align-items:center;gap:6px}
.slider-group label{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);white-space:nowrap}
input[type=range]{width:80px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--t3);min-width:40px}
select{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--t2);font-size:.7rem;padding:4px 8px;font-family:inherit}
</style>
</head>
<body>
<div class="top">
  <h1>Sound Wave Generator</h1>
  <button class="btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
  <button class="btn" onclick="stopAll()">Stop</button>
  <button class="btn" onclick="resetDefaults()">Reset</button>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <div class="slider-group"><label>Frequency</label><input type="range" id="freq" min="20" max="2000" value="440"><span class="val" id="freqV">440 Hz</span></div>
  <div class="slider-group"><label>Volume</label><input type="range" id="vol" min="0" max="100" value="30"><span class="val" id="volV">30%</span></div>
  <select id="waveType" onchange="updateOsc()">
    <option value="sine">Sine</option>
    <option value="square">Square</option>
    <option value="sawtooth">Sawtooth</option>
    <option value="triangle">Triangle</option>
  </select>
  <div class="slider-group"><label>Detune</label><input type="range" id="detune" min="-100" max="100" value="0"><span class="val" id="detuneV">0¢</span></div>
  <div class="slider-group"><label>Attack</label><input type="range" id="attack" min="0" max="2000" value="50"><span class="val" id="attackV">50ms</span></div>
  <div class="slider-group"><label>Release</label><input type="range" id="release" min="0" max="3000" value="200"><span class="val" id="releaseV">200ms</span></div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,audioCtx,osc,gain,analyser,dataArray,playing=false;

function resize(){W=canvas.width=canvas.offsetWidth*2;H=canvas.height=canvas.offsetHeight*2}
addEventListener('resize',resize);resize();

function initAudio(){
  if(audioCtx)return;
  audioCtx=new AudioContext();
  analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function togglePlay(){
  initAudio();
  if(!playing){
    osc=audioCtx.createOscillator();
    gain=audioCtx.createGain();
    osc.type=document.getElementById('waveType').value;
    osc.frequency.value=+document.getElementById('freq').value;
    osc.detune.value=+document.getElementById('detune').value;
    gain.gain.value=0;
    osc.connect(gain);gain.connect(analyser);analyser.connect(audioCtx.destination);
    osc.start();
    // Attack
    const attack=+document.getElementById('attack').value/1000;
    gain.gain.linearRampToValueAtTime(+document.getElementById('vol').value/100,audioCtx.currentTime+attack);
    playing=true;
    document.getElementById('playBtn').textContent='⏸ Pause';
    document.getElementById('playBtn').classList.add('active');
  }else{
    stopAll();
  }
}

function stopAll(){
  if(!playing)return;
  const release=+document.getElementById('release').value/1000;
  gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+release);
  setTimeout(()=>{try{osc.stop()}catch(e){}},release*1000+100);
  playing=false;
  document.getElementById('playBtn').textContent='▶ Play';
  document.getElementById('playBtn').classList.remove('active');
}

function updateOsc(){
  if(!playing||!osc)return;
  osc.type=document.getElementById('waveType').value;
  osc.frequency.value=+document.getElementById('freq').value;
  osc.detune.value=+document.getElementById('detune').value;
  gain.gain.value=+document.getElementById('vol').value/100;
}

function resetDefaults(){
  document.getElementById('freq').value=440;document.getElementById('vol').value=30;
  document.getElementById('detune').value=0;document.getElementById('attack').value=50;
  document.getElementById('release').value=200;
  updateSliders();updateOsc();
}

function updateSliders(){
  document.getElementById('freqV').textContent=document.getElementById('freq').value+' Hz';
  document.getElementById('volV').textContent=document.getElementById('vol').value+'%';
  document.getElementById('detuneV').textContent=document.getElementById('detune').value+'¢';
  document.getElementById('attackV').textContent=document.getElementById('attack').value+'ms';
  document.getElementById('releaseV').textContent=document.getElementById('release').value+'ms';
}

document.querySelectorAll('input[type=range]').forEach(s=>s.addEventListener('input',()=>{updateSliders();updateOsc()}));

function loop(){
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let y=0;y<H;y+=H/8){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  for(let x=0;x<W;x+=W/16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  // Center line
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();

  if(playing&&analyser){
    analyser.getByteTimeDomainData(dataArray);
    // Waveform
    ctx.beginPath();
    const sliceW=W/dataArray.length;
    for(let i=0;i<dataArray.length;i++){
      const v=dataArray[i]/128;const y=v*H/2;
      if(i===0)ctx.moveTo(0,y);else ctx.lineTo(i*sliceW,y);
    }
    const freq=+document.getElementById('freq').value;
    const hue=(freq/2000)*360;
    ctx.strokeStyle=`hsla(${hue},70%,55%,.8)`;ctx.lineWidth=2;ctx.stroke();
    // Glow
    ctx.strokeStyle=`hsla(${hue},70%,55%,.15)`;ctx.lineWidth=8;ctx.stroke();

    // Frequency domain
    analyser.getByteFrequencyData(dataArray);
    const barW=W/dataArray.length*2.5;
    for(let i=0;i<dataArray.length/2;i++){
      const v=dataArray[i]/255;
      const barH=v*H*.4;
      ctx.fillStyle=`hsla(${hue+i/dataArray.length*60},60%,50%,${v*.5})`;
      ctx.fillRect(i*barW,H-barH,barW-1,barH);
    }
  }else{
    // Draw theoretical wave
    const freq=+document.getElementById('freq').value;
    const type=document.getElementById('waveType').value;
    const hue=(freq/2000)*360;
    const time=Date.now()*.001;
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const t=x/W*Math.PI*2*4+time*freq*.01;
      let v;
      if(type==='sine')v=Math.sin(t);
      else if(type==='square')v=Math.sin(t)>0?1:-1;
      else if(type==='sawtooth')v=(t%(Math.PI*2))/(Math.PI)*2-1;
      else v=1-Math.abs((t%(Math.PI*2))/Math.PI-1)*2;
      const y=H/2+v*H*.3;
      if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`hsla(${hue},70%,55%,.5)`;ctx.lineWidth=2;ctx.stroke();
  }

  requestAnimationFrame(loop);
}
updateSliders();
requestAnimationFrame(loop);
</script>
</body>
</html>
