<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Function Collapse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="initWFC()">Generate</button>
  <button class="btn" onclick="autoRun=!autoRun">Auto</button>
  <button class="btn" onclick="tileSize=Math.max(8,tileSize-4)">Smaller</button>
  <button class="btn" onclick="tileSize=Math.min(60,tileSize+4)">Bigger</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;initWFC()}
addEventListener('resize',resize);

// Tile types with allowed neighbors (NESW)
const TILES=[
  {name:'empty',color:'rgba(10,10,15,.8)',neighbors:[[],[1,2],[1,3],[1,2]],weight:1},
  {name:'path_h',color:'rgba(139,92,246,.3)',neighbors:[[1,2],[1,2],[1,2],[1,2]],weight:3},
  {name:'path_v',color:'rgba(139,92,246,.3)',neighbors:[[1,2],[1,2],[1,2],[1,2]],weight:3},
  {name:'path_cross',color:'rgba(139,92,246,.4)',neighbors:[[1,2],[1,2],[1,2],[1,2]],weight:1},
  {name:'wall',color:'rgba(60,60,80,.6)',neighbors:[[0,4,5],[0,4,5],[0,4,5],[0,4,5]],weight:2},
  {name:'corner',color:'rgba(80,60,100,.4)',neighbors:[[0,4,5],[0,4,5],[0,4,5],[0,4,5]],weight:1}
];

let grid,tileSize=24,collapsedCount=0,failed=false,autoRun=false;

function initWFC(){
  const cols=Math.ceil(W/tileSize),rows=Math.ceil(H/tileSize);
  grid=Array.from({length:rows},(_,y)=>Array.from({length:cols},(_,x)=>({
    options:[0,1,2,3,4,5],collapsed:false,value:-1
  })));
  collapsedCount=0;failed=false;
}

function collapse(){
  // Find cell with least options (entropy)
  let minEntropy=Infinity,candidates=[];
  for(let y=0;y<grid.length;y++)for(let x=0;x<grid[0].length;x++){
    const cell=grid[y][x];
    if(cell.collapsed)continue;
    if(cell.options.length===0){failed=true;return false}
    if(cell.options.length<minEntropy){minEntropy=cell.options.length;candidates=[]}
    if(cell.options.length===minEntropy)candidates.push({x,y});
  }
  if(candidates.length===0)return false;

  // Weighted random pick
  const cell=candidates[Math.random()*candidates.length|0];
  const c=grid[cell.y][cell.x];
  const weights=c.options.map(o=>TILES[o].weight);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  let pick=c.options[0];
  for(let i=0;i<c.options.length;i++){r-=weights[i];if(r<=0){pick=c.options[i];break}}
  c.collapsed=true;c.value=pick;c.options=[pick];
  collapsedCount++;

  // Propagate
  propagate(cell.x,cell.y);
  return true;
}

function propagate(sx,sy){
  const stack=[{x:sx,y:sy}];
  const dirs=[{dx:0,dy:-1,opp:2},{dx:1,dy:0,opp:3},{dx:0,dy:1,opp:0},{dx:-1,dy:0,opp:1}];
  while(stack.length){
    const{x,y}=stack.pop();
    const cell=grid[y][x];
    for(const{dx,dy,opp}of dirs){
      const nx=x+dx,ny=y+dy;
      if(ny<0||ny>=grid.length||nx<0||nx>=grid[0].length)continue;
      const neighbor=grid[ny][nx];
      if(neighbor.collapsed)continue;
      const allowed=new Set();
      cell.options.forEach(o=>{TILES[o].neighbors[opp].forEach(n=>allowed.add(n))});
      const before=neighbor.options.length;
      neighbor.options=neighbor.options.filter(o=>allowed.has(o));
      if(neighbor.options.length<before)stack.push({x:nx,y:ny});
    }
  }
}

function draw(){
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  if(!grid)return;
  for(let y=0;y<grid.length;y++)for(let x=0;x<grid[0].length;x++){
    const cell=grid[y][x];
    if(cell.collapsed){
      ctx.fillStyle=TILES[cell.value].color;
      ctx.fillRect(x*tileSize,y*tileSize,tileSize,tileSize);
      // Border
      ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=.5;
      ctx.strokeRect(x*tileSize,y*tileSize,tileSize,tileSize);
    }else{
      // Show entropy
      const entropy=cell.options.length/TILES.length;
      ctx.fillStyle=`rgba(139,92,246,${entropy*.15})`;
      ctx.fillRect(x*tileSize+1,y*tileSize+1,tileSize-2,tileSize-2);
    }
  }
  document.getElementById('stats').textContent=`${grid[0].length}x${grid.length} · ${collapsedCount} collapsed`;
}

initWFC();

function loop(){
  if(autoRun&&!failed){for(let i=0;i<5;i++)if(!collapse())break}
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
