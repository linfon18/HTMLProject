<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant Colony Optimization</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="resetSim()">Reset</button>
  <button class="btn" onclick="addFood()">Add Food</button>
  <button class="btn" onclick="antCount=Math.min(500,antCount+50)">More Ants</button>
  <button class="btn" onclick="showPheromone=!showPheromone">Pheromones</button>
</div>
<div class="stats" id="stats">
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;resetSim()}
addEventListener('resize',resize);

let antCount=200,showPheromone=true;
let ants=[],foods=[],nest,pherHome,pherFood,collected=0;

function resetSim(){
  nest={x:W/2,y:H/2};
  foods=[];collected=0;
  // Add food sources
  for(let i=0;i<5;i++){
    const angle=Math.random()*Math.PI*2;
    const dist=150+Math.random()*200;
    foods.push({x:nest.x+Math.cos(angle)*dist,y:nest.y+Math.sin(angle)*dist,amount:100});
  }
  ants=[];
  for(let i=0;i<antCount;i++)ants.push(createAnt());
  // Pheromone grids
  const cols=Math.ceil(W/4),rows=Math.ceil(H/4);
  pherHome=new Float32Array(cols*rows);
  pherFood=new Float32Array(cols*rows);
}

function createAnt(){
  return{
    x:nest.x+(Math.random()-.5)*20,y:nest.y+(Math.random()-.5)*20,
    angle:Math.random()*Math.PI*2,hasFood:false,speed:1.5+Math.random(),
    wander:0
  };
}

function addFood(){
  foods.push({x:50+Math.random()*(W-100),y:50+Math.random()*(H-100),amount:80+Math.random()*100|0});
}

function pIdx(x,y){return(Math.floor(y/4))*(Math.ceil(W/4))+Math.floor(x/4)}

function update(){
  const gW=Math.ceil(W/4),gH=Math.ceil(H/4);

  // Diffuse pheromones
  const decay=.995;
  for(let i=0;i<pherHome.length;i++){pherHome[i]*=decay;pherFood[i]*=decay}

  ants.forEach(a=>{
    const s=a.speed;

    if(a.hasFood){
      // Head towards nest
      const dx=nest.x-a.x,dy=nest.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<15){a.hasFood=false;collected++;a.angle+=Math.PI;return}
      a.angle=Math.atan2(dy,dx)+(Math.random()-.5)*.3;
      // Drop food pheromone
      const idx=pIdx(a.x,a.y);
      if(idx>=0&&idx<pherFood.length)pherFood[idx]=Math.min(1,pherFood[idx]+.5);
    }else{
      // Sense food pheromone
      const ahead={x:a.x+Math.cos(a.angle)*20,y:a.y+Math.sin(a.angle)*20};
      const left={x:a.x+Math.cos(a.angle-.5)*15,y:a.y+Math.sin(a.angle-.5)*15};
      const right={x:a.x+Math.cos(a.angle+.5)*15,y:a.y+Math.sin(a.angle+.5)*15};

      const senseA=pIdx(ahead.x,ahead.y);
      const senseL=pIdx(left.x,left.y);
      const senseR=pIdx(right.x,right.y);

      const vA=senseA>=0&&senseA<pherFood.length?pherFood[senseA]:0;
      const vL=senseL>=0&&senseL<pherFood.length?pherFood[senseL]:0;
      const vR=senseR>=0&&senseR<pherFood.length?pherFood[senseR]:0;

      if(vA>vL&&vA>vR){} // keep going
      else if(vL>vR)a.angle-=.3+Math.random()*.2;
      else if(vR>vL)a.angle+=.3+Math.random()*.2;
      else a.angle+=(Math.random()-.5)*.5;

      // Drop home pheromone
      const idx=pIdx(a.x,a.y);
      if(idx>=0&&idx<pherHome.length)pherHome[idx]=Math.min(1,pherHome[idx]+.3);

      // Check food
      foods.forEach(f=>{
        if(f.amount>0&&Math.hypot(a.x-f.x,a.y-f.y)<12){
          a.hasFood=true;f.amount--;a.angle+=Math.PI;
        }
      });
    }

    a.x+=Math.cos(a.angle)*s;
    a.y+=Math.sin(a.angle)*s;
    // Bounce
    if(a.x<5||a.x>W-5){a.angle=Math.PI-a.angle;a.x=Math.max(5,Math.min(W-5,a.x))}
    if(a.y<5||a.y>H-5){a.angle=-a.angle;a.y=Math.max(5,Math.min(H-5,a.y))}
  });

  foods=foods.filter(f=>f.amount>0);
}

function draw(){
  ctx.fillStyle='rgba(5,5,8,.08)';ctx.fillRect(0,0,W,H);

  // Pheromones
  if(showPheromone){
    const imgData=ctx.getImageData(0,0,W,H);
    const d=imgData.data;
    for(let y=0;y<H;y+=4)for(let x=0;x<W;x+=4){
      const idx=pIdx(x,y);
      const ph=idx>=0&&idx<pherFood.length?pherFood[idx]:0;
      const pH=idx>=0&&idx<pherHome.length?pherHome[idx]:0;
      if(ph>.01||pH>.01){
        for(let dy=0;dy<4&&y+dy<H;dy++)for(let dx=0;dx<4&&x+dx<W;dx++){
          const i=((y+dy)*W+(x+dx))*4;
          d[i]+=ph*80;d[i+1]+=pH*30;d[i+2]+=ph*60;
        }
      }
    }
    ctx.putImageData(imgData,0,0);
  }

  // Nest
  ctx.beginPath();ctx.arc(nest.x,nest.y,8,0,Math.PI*2);
  ctx.fillStyle='rgba(139,92,246,.6)';ctx.fill();
  ctx.fillStyle='rgba(139,92,246,.15)';
  ctx.beginPath();ctx.arc(nest.x,nest.y,20,0,Math.PI*2);ctx.fill();

  // Food
  foods.forEach(f=>{
    ctx.beginPath();ctx.arc(f.x,f.y,5+f.amount*.05,0,Math.PI*2);
    ctx.fillStyle=`rgba(34,197,94,${Math.min(1,f.amount/50)})`;ctx.fill();
  });

  // Ants
  ants.forEach(a=>{
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.hasFood?2.5:1.5,0,Math.PI*2);
    ctx.fillStyle=a.hasFood?'rgba(234,179,8,.7)':'rgba(255,255,255,.3)';
    ctx.fill();
  });

  document.getElementById('stats').textContent=`${ants.length} ants · ${collected} collected · ${foods.length} food sources`;
}

function loop(){update();draw();requestAnimationFrame(loop)}
resetSim();
requestAnimationFrame(loop);
</script>
</body>
</html>
