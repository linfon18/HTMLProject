<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube Solver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;padding:16px}
h1{font-size:1rem;font-weight:700;color:var(--t1);margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:2px;margin:2px}
.face-label{font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);text-align:center;margin-bottom:4px}
.cell{border-radius:3px;transition:background .3s}
.net{display:grid;grid-template-columns:repeat(4,auto);gap:4px;justify-content:center;margin-bottom:16px}
.face{display:flex;flex-direction:column;align-items:center}
.btn{padding:6px 12px;border-radius:7px;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;max-width:400px}
.move-btn{width:36px;height:36px;border-radius:6px;font-size:.75rem;font-weight:700;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.move-btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.moves-log{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--t3);max-width:400px;text-align:center;min-height:20px}
</style>
</head>
<body>
<h1>Rubik's Cube</h1>
<div class="net" id="net"></div>
<div class="controls">
  <button class="move-btn" onclick="doMove('U')">U</button>
  <button class="move-btn" onclick="doMove('U\'')">U'</button>
  <button class="move-btn" onclick="doMove('D')">D</button>
  <button class="move-btn" onclick="doMove('D\'')">D'</button>
  <button class="move-btn" onclick="doMove('R')">R</button>
  <button class="move-btn" onclick="doMove('R\'')">R'</button>
  <button class="move-btn" onclick="doMove('L')">L</button>
  <button class="move-btn" onclick="doMove('L\'')">L'</button>
  <button class="move-btn" onclick="doMove('F')">F</button>
  <button class="move-btn" onclick="doMove('F\'')">F'</button>
  <button class="move-btn" onclick="doMove('B')">B</button>
  <button class="move-btn" onclick="doMove('B\'')">B'</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:8px">
  <button class="btn" onclick="scramble()">Scramble</button>
  <button class="btn" onclick="resetCube()">Reset</button>
</div>
<div class="moves-log" id="log"></div>

<script>
// Faces: U=0, D=1, F=2, B=3, L=4, R=5
// Each face is 3x3 array
const COLORS=['#fff','#ffd500','#009b48','#0046ad','#b71234','#ff5800'];
const FACE_NAMES=['Up','Down','Front','Back','Left','Right'];
let cube,movesLog=[];

function resetCube(){
  cube=Array.from({length:6},(f,i)=>Array(9).fill(i));
  movesLog=[];render();
}

function scramble(){
  const moves=['U',"U'",'D',"D'",'R',"R'",'L',"L'",'F',"F'",'B',"B'"];
  for(let i=0;i<20)doMove(moves[Math.random()*moves.length|0],false);
  movesLog=['Scrambled!'];render();
}

function rotateFace(face,cw){
  const f=cube[face];
  if(cw){const t=f[0];f[0]=f[6];f[6]=f[8];f[8]=f[2];f[2]=t;const t2=f[1];f[1]=f[3];f[3]=f[7];f[7]=f[5];f[5]=t2}
  else{const t=f[0];f[0]=f[2];f[2]=f[8];f[8]=f[6];f[6]=t;const t2=f[1];f[1]=f[5];f[5]=f[7];f[7]=f[3];f[3]=t2}
}

function doMove(move,log=true){
  const face=move[0],cw=!move.includes("'");
  switch(face){
    case'U':rotateFace(0,cw);
      if(cw){const t=[cube[2][0],cube[2][1],cube[2][2]];[cube[2][0],cube[2][1],cube[2][2]]=[cube[5][0],cube[5][1],cube[5][2]];[cube[5][0],cube[5][1],cube[5][2]]=[cube[3][0],cube[3][1],cube[3][2]];[cube[3][0],cube[3][1],cube[3][2]]=[cube[4][0],cube[4][1],cube[4][2]];[cube[4][0],cube[4][1],cube[4][2]]=t}
      else{const t=[cube[2][0],cube[2][1],cube[2][2]];[cube[2][0],cube[2][1],cube[2][2]]=[cube[4][0],cube[4][1],cube[4][2]];[cube[4][0],cube[4][1],cube[4][2]]=[cube[3][0],cube[3][1],cube[3][2]];[cube[3][0],cube[3][1],cube[3][2]]=[cube[5][0],cube[5][1],cube[5][2]];[cube[5][0],cube[5][1],cube[5][2]]=t}
      break;
    case'D':rotateFace(1,cw);
      if(cw){const t=[cube[2][6],cube[2][7],cube[2][8]];[cube[2][6],cube[2][7],cube[2][8]]=[cube[4][6],cube[4][7],cube[4][8]];[cube[4][6],cube[4][7],cube[4][8]]=[cube[3][6],cube[3][7],cube[3][8]];[cube[3][6],cube[3][7],cube[3][8]]=[cube[5][6],cube[5][7],cube[5][8]];[cube[5][6],cube[5][7],cube[5][8]]=t}
      else{const t=[cube[2][6],cube[2][7],cube[2][8]];[cube[2][6],cube[2][7],cube[2][8]]=[cube[5][6],cube[5][7],cube[5][8]];[cube[5][6],cube[5][7],cube[5][8]]=[cube[3][6],cube[3][7],cube[3][8]];[cube[3][6],cube[3][7],cube[3][8]]=[cube[4][6],cube[4][7],cube[4][8]];[cube[4][6],cube[4][7],cube[4][8]]=t}
      break;
    case'R':rotateFace(5,cw);
      if(cw){const t=[cube[0][2],cube[0][5],cube[0][8]];[cube[0][2],cube[0][5],cube[0][8]]=[cube[2][2],cube[2][5],cube[2][8]];[cube[2][2],cube[2][5],cube[2][8]]=[cube[1][2],cube[1][5],cube[1][8]];[cube[1][2],cube[1][5],cube[1][8]]=[cube[3][6],cube[3][3],cube[3][0]];[cube[3][6],cube[3][3],cube[3][0]]=t}
      else{const t=[cube[0][2],cube[0][5],cube[0][8]];[cube[0][2],cube[0][5],cube[0][8]]=[cube[3][6],cube[3][3],cube[3][0]];[cube[3][6],cube[3][3],cube[3][0]]=[cube[1][2],cube[1][5],cube[1][8]];[cube[1][2],cube[1][5],cube[1][8]]=[cube[2][2],cube[2][5],cube[2][8]];[cube[2][2],cube[2][5],cube[2][8]]=t}
      break;
    case'L':rotateFace(4,cw);
      if(cw){const t=[cube[0][0],cube[0][3],cube[0][6]];[cube[0][0],cube[0][3],cube[0][6]]=[cube[3][8],cube[3][5],cube[3][2]];[cube[3][8],cube[3][5],cube[3][2]]=[cube[1][0],cube[1][3],cube[1][6]];[cube[1][0],cube[1][3],cube[1][6]]=[cube[2][0],cube[2][3],cube[2][6]];[cube[2][0],cube[2][3],cube[2][6]]=t}
      else{const t=[cube[0][0],cube[0][3],cube[0][6]];[cube[0][0],cube[0][3],cube[0][6]]=[cube[2][0],cube[2][3],cube[2][6]];[cube[2][0],cube[2][3],cube[2][6]]=[cube[1][0],cube[1][3],cube[1][6]];[cube[1][0],cube[1][3],cube[1][6]]=[cube[3][8],cube[3][5],cube[3][2]];[cube[3][8],cube[3][5],cube[3][2]]=t}
      break;
    case'F':rotateFace(2,cw);
      if(cw){const t=[cube[0][6],cube[0][7],cube[0][8]];[cube[0][6],cube[0][7],cube[0][8]]=[cube[4][8],cube[4][5],cube[4][2]];[cube[4][8],cube[4][5],cube[4][2]]=[cube[1][2],cube[1][1],cube[1][0]];[cube[1][2],cube[1][1],cube[1][0]]=[cube[5][0],cube[5][3],cube[5][6]];[cube[5][0],cube[5][3],cube[5][6]]=t}
      else{const t=[cube[0][6],cube[0][7],cube[0][8]];[cube[0][6],cube[0][7],cube[0][8]]=[cube[5][0],cube[5][3],cube[5][6]];[cube[5][0],cube[5][3],cube[5][6]]=[cube[1][2],cube[1][1],cube[1][0]];[cube[1][2],cube[1][1],cube[1][0]]=[cube[4][8],cube[4][5],cube[4][2]];[cube[4][8],cube[4][5],cube[4][2]]=t}
      break;
    case'B':rotateFace(3,cw);
      if(cw){const t=[cube[0][0],cube[0][1],cube[0][2]];[cube[0][0],cube[0][1],cube[0][2]]=[cube[5][2],cube[5][5],cube[5][8]];[cube[5][2],cube[5][5],cube[5][8]]=[cube[1][8],cube[1][7],cube[1][6]];[cube[1][8],cube[1][7],cube[1][6]]=[cube[4][6],cube[4][3],cube[4][0]];[cube[4][6],cube[4][3],cube[4][0]]=t}
      else{const t=[cube[0][0],cube[0][1],cube[0][2]];[cube[0][0],cube[0][1],cube[0][2]]=[cube[4][6],cube[4][3],cube[4][0]];[cube[4][6],cube[4][3],cube[4][0]]=[cube[1][8],cube[1][7],cube[1][6]];[cube[1][8],cube[1][7],cube[1][6]]=[cube[5][2],cube[5][5],cube[5][8]];[cube[5][2],cube[5][5],cube[5][8]]=t}
      break;
  }
  if(log)movesLog.push(move);
  render();
}

function render(){
  const net=document.getElementById('net');
  net.innerHTML='';
  const layouts=[{f:0,label:'Up',col:1,row:0},{f:4,label:'Left',col:0,row:1},{f:2,label:'Front',col:1,row:1},{f:5,label:'Right',col:2,row:1},{f:3,label:'Back',col:3,row:1},{f:1,label:'Down',col:1,row:2}];
  layouts.forEach(({f,label,col,row})=>{
    const div=document.createElement('div');
    div.className='face';
    div.style.gridColumn=col+1;div.style.gridRow=row+1;
    div.innerHTML=`<div class="face-label">${label}</div>`;
    const grid=document.createElement('div');grid.className='grid';
    for(let i=0;i<9;i++){
      const cell=document.createElement('div');cell.className='cell';
      cell.style.background=COLORS[cube[f][i]];
      grid.appendChild(cell);
    }
    div.appendChild(grid);net.appendChild(div);
  });
  document.getElementById('log').textContent=movesLog.slice(-20).join(' ');
}

resetCube();
</script>
</body>
</html>
