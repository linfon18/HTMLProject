<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids Flocking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;inset:0}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:8px}
.panel{padding:12px;border-radius:10px;background:rgba(10,10,15,.8);backdrop-filter:blur(16px);border:1px solid var(--border);min-width:180px}
.panel h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:.68rem}
.row label{color:var(--t3);font-size:.62rem}
input[type=range]{width:80px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3);min-width:22px;text-align:right}
.fps{position:fixed;bottom:12px;left:12px;font-size:.6rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="panel">
    <h3>Flocking</h3>
    <div class="row"><label>Separation</label><input type="range" id="sep" min="0" max="100" value="40"><span class="val" id="sepV">40</span></div>
    <div class="row"><label>Alignment</label><input type="range" id="ali" min="0" max="100" value="50"><span class="val" id="aliV">50</span></div>
    <div class="row"><label>Cohesion</label><input type="range" id="coh" min="0" max="100" value="30"><span class="val" id="cohV">30</span></div>
    <div class="row"><label>Speed</label><input type="range" id="spd" min="1" max="10" value="4"><span class="val" id="spdV">4</span></div>
    <div class="row"><label>Perception</label><input type="range" id="perc" min="20" max="200" value="80"><span class="val" id="percV">80</span></div>
    <div class="row"><label>Boids</label><input type="range" id="count" min="50" max="500" value="200"><span class="val" id="countV">200</span></div>
  </div>
</div>
<div class="fps" id="fps"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

let mouseX=W/2,mouseY=H/2,mouseDown=false;
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mousedown',()=>mouseDown=true);
canvas.addEventListener('mouseup',()=>mouseDown=false);

class Boid{
  constructor(){
    this.x=Math.random()*W;this.y=Math.random()*H;
    this.vx=(Math.random()-.5)*6;this.vy=(Math.random()-.5)*6;
    this.hue=Math.random()*60+180;
  }
}

let boids=[];
function initBoids(n){boids=Array.from({length:n},()=>new Boid())}
initBoids(200);

function getVal(id){return+document.getElementById(id).value}

function update(){
  const sepDist=25,sepW=getVal('sep')/100;
  const aliW=getVal('ali')/100;
  const cohW=getVal('coh')/100;
  const maxSpeed=getVal('spd');
  const perception=getVal('perc');
  const targetCount=getVal('count');

  while(boids.length<targetCount)boids.push(new Boid());
  while(boids.length>targetCount)boids.pop();

  boids.forEach(b=>{
    let sx=0,sy=0,sn=0;
    let ax=0,ay=0,an=0;
    let cx=0,cy=0,cn=0;

    boids.forEach(other=>{
      if(other===b)return;
      const dx=other.x-b.x,dy=other.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>perception)return;
      // Separation
      if(dist<sepDist){sx-=dx/dist;sy-=dy/dist;sn++}
      // Alignment
      ax+=other.vx;ay+=other.vy;an++;
      // Cohesion
      cx+=other.x;cy+=other.y;cn++;
    });

    if(sn){b.vx+=sx/sn*sepW;b.vy+=sy/sn*sepW}
    if(an){b.vx+=(ax/an-b.vx)*aliW*.05;b.vy+=(ay/an-b.vy)*aliW*.05}
    if(cn){b.vx+=(cx/cn-b.x)*cohW*.001;b.vy+=(cy/cn-b.y)*cohW*.001}

    // Mouse attraction/repulsion
    if(mouseDown){
      const dx=mouseX-b.x,dy=mouseY-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+1;
      b.vx+=dx/dist*2;b.vy+=dy/dist*2;
    }

    // Speed limit
    const speed=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(speed>maxSpeed){b.vx=b.vx/speed*maxSpeed;b.vy=b.vy/speed*maxSpeed}
    if(speed<maxSpeed*.5){b.vx=b.vx/speed*maxSpeed*.5;b.vy=b.vy/speed*maxSpeed*.5}

    b.x+=b.vx;b.y+=b.vy;
    b.hue+=(b.vx+b.vy)*.1;

    // Wrap
    if(b.x<0)b.x+=W;if(b.x>W)b.x-=W;
    if(b.y<0)b.y+=H;if(b.y>H)b.y-=H;
  });
}

function draw(){
  ctx.fillStyle='rgba(5,5,8,.15)';ctx.fillRect(0,0,W,H);
  boids.forEach(b=>{
    const angle=Math.atan2(b.vy,b.vx);
    const speed=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    const s=4+speed*.5;
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(angle);
    ctx.beginPath();ctx.moveTo(s,0);ctx.lineTo(-s,-s*.5);ctx.lineTo(-s*.3,0);ctx.lineTo(-s,s*.5);ctx.closePath();
    ctx.fillStyle=`hsla(${b.hue%360},60%,55%,.7)`;ctx.fill();
    ctx.restore();
  });
}

let frames=0,fpsT=performance.now();
function loop(t){
  update();draw();
  frames++;
  if(t-fpsT>500){document.getElementById('fps').textContent=Math.round(frames*1000/(t-fpsT||1))+' FPS · '+boids.length+' boids';frames=0;fpsT=t}
  requestAnimationFrame(loop);
}

document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>vEl.textContent=s.value);
});

requestAnimationFrame(loop);
</script>
</body>
</html>
