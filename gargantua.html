<script type="module">

const labels={mass:'质量',spin:'拖拽旋向',horizon:'视界半径',diskInner:'盘内缘',diskOuter:'盘外缘',diskTemp:'盘温度',diskTurb:'盘湍流',diskTilt:'盘倾角',doppler:'Doppler',redshift:'引力红移',lensing:'透镜强度',photonRing:'光子环',starDensity:'星密度',milkyWay:'银河',bloom:'Bloom',exposure:'曝光',grain:'胶片颗粒',vignette:'暗角',chromatic:'色散',fov:'FOV',timeScale:'时间倍率'};
const qualityMap={Standard:{ratio:Math.min(devicePixelRatio,1.25),steps:58},High:{ratio:Math.min(devicePixelRatio,1.7),steps:92},Cinematic:{ratio:Math.min(devicePixelRatio,2.35),steps:136}};

try{const saved=JSON.parse(localStorage.getItem('gargantua-state')||'null');if(saved)state={...state,...saved,params:{...defaults,...saved.params},music:false}}catch(e){}
let renderer,scene,camera,controlCamera,material,mesh,orbit,clock,raf=0,last=performance.now(),fpsSmooth=60,audioCtx,masterGain,noiseNode,ambientAudio,orbitRadius=8,orbitTheta=0,orbitPhi=1.25;
const vertexShader=`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,0.0,1.0);}`;
const fragmentShader=`precision highp float;
varying vec2 vUv;
uniform vec2 iResolution;
uniform float iTime;
uniform float uMass;
uniform float uSpin;
uniform float uHorizon;
uniform float uDiskInner;
uniform float uDiskOuter;
uniform float uDiskTemp;
uniform float uDiskTurb;
uniform float uDiskTilt;
uniform float uDoppler;
uniform float uRedshift;
uniform float uLensing;
uniform float uPhotonRing;
uniform float uStarDensity;
uniform float uMilkyWay;
uniform float uBloom;
uniform float uExposure;
uniform float uGrain;
uniform float uVignette;
uniform float uChromatic;
uniform float uFov;
uniform float uSteps;
uniform float uDebug;
uniform vec3 uCamPos;
uniform vec3 uCamTarget;
uniform float uAspect;
#define PI 3.14159265359
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}
float hash3(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453123);}
float noise(vec3 p){vec3 i=floor(p);vec3 f=fract(p);f=f*f*(3.0-2.0*f);float n=mix(mix(mix(hash3(i+vec3(0,0,0)),hash3(i+vec3(1,0,0)),f.x),mix(hash3(i+vec3(0,1,0)),hash3(i+vec3(1,1,0)),f.x),f.y),mix(mix(hash3(i+vec3(0,0,1)),hash3(i+vec3(1,0,1)),f.x),mix(hash3(i+vec3(0,1,1)),hash3(i+vec3(1,1,1)),f.x),f.y),f.z);return n;}
float fbm(vec3 p){float a=.5,s=0.0;for(int i=0;i<5;i++){s+=a*noise(p);p*=2.12;a*=.52;}return s;}
mat2 rot(float a){float s=sin(a),c=cos(a);return mat2(c,-s,s,c);}
vec3 aces(vec3 x){return clamp((x*(2.51*x+.03))/(x*(2.43*x+.59)+.14),0.0,1.0);}
vec3 blackbody(float t){vec3 c=mix(vec3(1.0,.22,.045),vec3(1.0,.72,.23),smoothstep(.15,.62,t));c=mix(c,vec3(.55,.75,1.0),smoothstep(.62,1.25,t));return c*pow(max(t,.02),1.45);}
vec3 starfield(vec3 d){vec2 uv=vec2(atan(d.z,d.x)/6.2831853+.5,asin(clamp(d.y,-1.0,1.0))/PI+.5);vec2 g=floor(uv*vec2(900.0,420.0));vec2 f=fract(uv*vec2(900.0,420.0));float h=hash(g);float star=smoothstep(.9975-uStarDensity*.0017,1.0,h)*pow(1.0-length(f-.5)*2.0,14.0);vec3 col=vec3(star)*(1.2+4.0*hash(g+4.7))*mix(vec3(.7,.83,1.0),vec3(1.0,.62,.35),hash(g+8.2));float band=exp(-pow(abs(uv.y-.52-.08*sin(uv.x*6.0)),2.0)*110.0);float clouds=fbm(vec3(uv*vec2(9.0,3.0),.2+iTime*.01));col+=uMilkyWay*band*(.08+.45*clouds)*vec3(.52,.46,.66);col+=vec3(.005,.007,.012);return col;}
vec3 diskSample(vec3 p,vec3 rd,float side,out float alpha,out float heat,out float dop){vec3 q=p;q.yz=rot(uDiskTilt)*q.yz;float r=length(q.xz);float a=atan(q.z,q.x);float inDisk=smoothstep(uDiskInner,uDiskInner+.25,r)*(1.0-smoothstep(uDiskOuter-.8,uDiskOuter,r));float orbital=pow(max(uDiskInner/r,.04),.5);vec3 tangent=normalize(vec3(-sin(a),0.0,cos(a)));dop=pow(max(.08,1.0+dot(rd,tangent)*orbital*uDoppler),3.0);float grav=sqrt(max(.04,1.0-(2.0*uMass)/max(r,2.05*uMass)));float turb=fbm(vec3(q.xz*.62,a*1.7+iTime*.18))*uDiskTurb;float streak=.5+.5*sin(a*42.0-r*4.7+iTime*(2.0+uSpin*2.0)+turb*6.0);float spiral=.5+.5*sin(a*5.0-log(r)*7.0+iTime*.55+turb*2.0);heat=inDisk*(pow(uDiskInner/r,.82)+.24*streak+.18*spiral)*uDiskTemp*dop*mix(1.0,grav,uRedshift);alpha=inDisk*smoothstep(0.0,.12,abs(side))*(.22+.78*smoothstep(.02,.35,abs(side)));vec3 col=blackbody(heat)*alpha*(.85+1.2*turb);col*=mix(vec3(.58,.62,1.0),vec3(1.0,.8,.52),smoothstep(uDiskInner,uDiskOuter,r));return col;}
vec4 trace(vec2 frag,float channel){vec2 p=(frag*2.0-iResolution.xy)/iResolution.y;p.x+=channel*uChromatic*.012;float fov=tan(radians(uFov)*.5);vec3 fw=normalize(uCamTarget-uCamPos);vec3 rr=normalize(cross(fw,vec3(0.0,1.0,0.0)));vec3 uu=normalize(cross(rr,fw));vec3 ro=uCamPos;vec3 rd=normalize(fw+rr*p.x*fov+uu*p.y*fov);vec3 col=vec3(0.0);float bloom=0.0;float crossings=0.0;float minR=999.0;float ring=0.0;float red=1.0;float dop=1.0;float depth=0.0;float oldY=ro.y;for(int i=0;i<160;i++){if(float(i)>=uSteps)break;float r=length(ro);minR=min(minR,r);depth=float(i)/uSteps;if(r<uHorizon*2.0*uMass){col*=0.03;break;}float stepSize=mix(.035,.28,smoothstep(2.0,18.0,r));vec3 acc=-normalize(ro)*(uLensing*uMass/(r*r+.18));rd=normalize(rd+acc*stepSize);rd.xz=rot(uSpin*.0009/(r*r+.2))*rd.xz;vec3 nr=ro+rd*stepSize;float side=oldY*nr.y;if(side<0.0){vec3 hit=mix(ro,nr,abs(oldY)/(abs(oldY)+abs(nr.y)));float alpha,heat,dd;vec3 dc=diskSample(hit,rd,side,alpha,heat,dd);col+=dc*(1.0-min(length(col),1.0)*.16);bloom+=max(max(dc.r,dc.g),dc.b)*.42;crossings+=alpha>.02?1.0:0.0;dop=max(dop,dd);red*=mix(1.0,sqrt(max(.03,1.0-(2.0*uMass)/max(length(hit),2.05*uMass))),uRedshift*.12);}
oldY=nr.y;ro=nr;if(length(ro)>42.0){vec3 bent=normalize(rd+normalize(cross(cross(rd,ro),rd))*uLensing*uMass/(minR+.8)*.38);col+=starfield(bent)*(1.0+.9/(minR*minR+.08));break;}}
float photon=exp(-pow((minR-3.0*uMass)/(.055+.12*uPhotonRing),2.0))*uPhotonRing;ring=photon;col+=vec3(1.0,.65,.34)*photon*(.12+.7*bloom);col+=vec3(.45,.62,1.0)*photon*.14;float shadow=1.0-smoothstep(1.7*uMass,2.55*uMass,minR);col*=1.0-shadow*.96;bloom+=photon*2.0;float dbg=uDebug;if(dbg<.5)return vec4(col,bloom);if(dbg<1.5)return vec4(vec3(depth),bloom);if(dbg<2.5)return vec4(vec3(min(crossings/4.0,1.0),crossings>1.5?0.7:0.0,crossings>2.5?1.0:0.0),bloom);if(dbg<3.5)return vec4(vec3(red,red*.65,red*.35),bloom);if(dbg<4.5)return vec4(vec3(dop*.25,dop*.12,1.0/(dop+.1)),bloom);if(dbg<5.5)return vec4(vec3(1.0/(minR*.18+0.1)),bloom);if(dbg<6.5)return vec4(starfield(rd),bloom);if(dbg<7.5)return vec4(vec3(ring),bloom);if(dbg<8.5)return vec4(vec3(bloom*.18),bloom);return vec4(vec3((p.x+1.0)*.5,(p.y+1.0)*.5,minR*.04),bloom);}
void main(){vec2 frag=vUv*iResolution.xy;vec4 a=trace(frag,-1.0);vec4 b=trace(frag,0.0);vec4 c=trace(frag,1.0);vec3 col=vec3(a.r,b.g,c.b);float bloom=(a.a+b.a+c.a)/3.0;col+=bloom*uBloom*vec3(1.0,.62,.32)*.18;vec2 q=vUv-.5;float vig=smoothstep(.9,.18,dot(q,q)*1.7);col*=mix(1.0,vig,uVignette);col*=uExposure;col=aces(col);float grain=(hash(frag+iTime)-.5)*uGrain;col+=grain;gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);}`;
function uniformObject(){return {iResolution:{value:new THREE.Vector2(1,1)},iTime:{value:0},uMass:{value:state.params.mass},uSpin:{value:state.params.spin},uHorizon:{value:state.params.horizon},uDiskInner:{value:state.params.diskInner},uDiskOuter:{value:state.params.diskOuter},uDiskTemp:{value:state.params.diskTemp},uDiskTurb:{value:state.params.diskTurb},uDiskTilt:{value:state.params.diskTilt},uDoppler:{value:state.params.doppler},uRedshift:{value:state.params.redshift},uLensing:{value:state.params.lensing},uPhotonRing:{value:state.params.photonRing},uStarDensity:{value:state.params.starDensity},uMilkyWay:{value:state.params.milkyWay},uBloom:{value:state.params.bloom},uExposure:{value:state.params.exposure},uGrain:{value:state.params.grain},uVignette:{value:state.params.vignette},uChromatic:{value:state.params.chromatic},uFov:{value:state.params.fov},uSteps:{value:qualityMap[state.quality].steps},uDebug:{value:state.debug},uCamPos:{value:new THREE.Vector3(0,2.3,8)},uCamTarget:{value:new THREE.Vector3(0,0,0)},uAspect:{value:1}}}
function init(){try{cancelAnimationFrame(raf);renderer?.dispose();renderer=new THREE.WebGLRenderer({canvas,antialias:false,preserveDrawingBuffer:true,powerPreference:'high-performance'});renderer.outputColorSpace=THREE.SRGBColorSpace;renderer.toneMapping=THREE.ACESFilmicToneMapping;scene=new THREE.Scene();camera=new THREE.OrthographicCamera(-1,1,1,-1,0,1);controlCamera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.01,100);material=new THREE.ShaderMaterial({uniforms:uniformObject(),vertexShader,fragmentShader,depthWrite:false,depthTest:false});mesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2),material);scene.add(mesh);orbit=new OrbitControls(controlCamera,canvas);orbit.enableDamping=true;orbit.enablePan=false;orbit.target.set(0,0,0);clock=new THREE.Clock();applyQuality();applyPreset(state.preset,false);resize();errorEl.classList.remove('show');loop()}catch(e){showError(e)}}

function buildControls(){controlsRoot.innerHTML='';Object.keys(defaults).forEach(key=>{const row=document.createElement('div');row.className='row';const label=document.createElement('label');label.textContent=labels[key];const input=document.createElement('input');input.type='range';input.min=ranges[key][0];input.max=ranges[key][1];input.step=ranges[key][2];input.value=state.params[key];const out=document.createElement('output');out.textContent=Number(input.value).toFixed(key==='fov'?1:2);input.addEventListener('input',()=>{state.params[key]=Number(input.value);out.textContent=Number(input.value).toFixed(key==='fov'?1:2);const uname='u'+key[0].toUpperCase()+key.slice(1);if(material?.uniforms[uname])material.uniforms[uname].value=state.params[key];save()});row.append(label,input,out);controlsRoot.append(row)})}
function updateOrbitCamera(){const s=Math.sin(orbitPhi);controlCamera.position.set(orbitRadius*s*Math.sin(orbitTheta),orbitRadius*Math.cos(orbitPhi),orbitRadius*s*Math.cos(orbitTheta));controlCamera.lookAt(0,0,0)}
function updateCamera(t){if(state.cinema){const phase=t*.065*state.params.timeScale;orbitTheta=phase+Math.sin(t*.09)*.22;orbitPhi=1.18+Math.sin(t*.13)*.18;orbitRadius=7.2+Math.sin(t*.07)*1.6;updateOrbitCamera()}else{orbit.update();const v=controlCamera.position;orbitRadius=v.length();orbitTheta=Math.atan2(v.x,v.z);orbitPhi=Math.acos(Math.max(-1,Math.min(1,v.y/Math.max(.001,orbitRadius))))}material.uniforms.uCamPos.value.copy(controlCamera.position);material.uniforms.uCamTarget.value.set(0,0,0)}
function loop(){raf=requestAnimationFrame(loop);try{const t=clock.getElapsedTime();material.uniforms.iTime.value=t*state.params.timeScale;updateCamera(t);renderer.render(scene,camera);const now=performance.now();const fps=1000/Math.max(1,now-last);last=now;fpsSmooth=fpsSmooth*.92+fps*.08;fpsEl.textContent=Math.round(fpsSmooth);debugNameEl.textContent=debugNames[state.debug];if(new URLSearchParams(location.search).get('screenshot')==='1'&&renderer.info.render.frame>8&&!window.__GARGANTUA_CAPTURED__){window.__GARGANTUA_CAPTURED__=true;capture(false)}}catch(e){showError(e)}}
function save(){localStorage.setItem('gargantua-state',JSON.stringify(state))}
function toast(text){toastEl.textContent=text;toastEl.classList.add('show');clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.classList.remove('show'),1400)}
function setDebug(n){state.debug=Math.max(0,Math.min(9,n));material.uniforms.uDebug.value=state.debug;debugNameEl.textContent=debugNames[state.debug];toast('调试视图 '+state.debug+' · '+debugNames[state.debug]);save()}
function capture(download=true){const data=canvas.toDataURL('image/png');window.__GARGANTUA_SCREENSHOT__=data;if(download){const a=document.createElement('a');a.href=data;a.download='gargantua-schwarzschild-raytracer.png';a.click();toast('截图已生成')}return data}
function toggleMusic(){if(!audioCtx){ambientAudio=new Audio('./assest/gargantua_ambient.wav');ambientAudio.loop=true;ambientAudio.volume=.0;ambientAudio.play().catch(()=>{});audioCtx=new AudioContext();masterGain=audioCtx.createGain();masterGain.gain.value=0.0;masterGain.connect(audioCtx.destination);const osc1=audioCtx.createOscillator();const osc2=audioCtx.createOscillator();const lfo=audioCtx.createOscillator();const lfoGain=audioCtx.createGain();osc1.type='sine';osc2.type='triangle';osc1.frequency.value=46.25;osc2.frequency.value=69.3;lfo.frequency.value=.055;lfoGain.gain.value=9;lfo.connect(lfoGain);lfoGain.connect(osc2.frequency);const filter=audioCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=420;filter.Q.value=6;osc1.connect(filter);osc2.connect(filter);filter.connect(masterGain);osc1.start();osc2.start();lfo.start()}state.music=!state.music;if(audioCtx.state==='suspended')audioCtx.resume();masterGain.gain.cancelScheduledValues(audioCtx.currentTime);masterGain.gain.linearRampToValueAtTime(state.music?.18:0.0,audioCtx.currentTime+.7);if(ambientAudio){ambientAudio.volume=state.music?.22:0.0;if(state.music)ambientAudio.play().catch(()=>{})}document.getElementById('music').textContent=state.music?'静音':'氛围音乐';toast(state.music?'氛围音乐开启':'氛围音乐关闭');save()}
function cycleQuality(){const names=['Standard','High','Cinematic'];state.quality=names[(names.indexOf(state.quality)+1)%names.length];applyQuality();resize();toast('质量档 '+state.quality)}
function resetParams(){state.params={...defaults};buildControls();Object.keys(defaults).forEach(key=>{const uname='u'+key[0].toUpperCase()+key.slice(1);if(material.uniforms[uname])material.uniforms[uname].value=state.params[key]});toast('参数已重置');save()}
buildControls();init();addEventListener('resize',resize);canvas.addEventListener('webglcontextlost',e=>{e.preventDefault();cancelAnimationFrame(raf);statusEl.textContent='WebGL 上下文丢失，等待恢复';errorEl.classList.add('show')});canvas.addEventListener('webglcontextrestored',()=>{statusEl.textContent='WebGL 上下文已恢复';init()});qualityEl.addEventListener('change',()=>{state.quality=qualityEl.value;applyQuality();resize();toast('质量档 '+state.quality)});document.querySelectorAll('[data-preset]').forEach(b=>b.addEventListener('click',()=>applyPreset(Number(b.dataset.preset))));document.getElementById('cinema').addEventListener('click',()=>{state.cinema=!state.cinema;toast(state.cinema?'电影镜头循环开启':'电影镜头循环关闭');save()});document.getElementById('music').addEventListener('click',toggleMusic);document.getElementById('shot').addEventListener('click',()=>capture(true));document.getElementById('fold').addEventListener('click',()=>{state.hidden=!state.hidden;hud.classList.toggle('collapsed',state.hidden);save()});addEventListener('keydown',e=>{if(e.target&&['INPUT','SELECT'].includes(e.target.tagName))return;if(e.key>='0'&&e.key<='9')setDebug(Number(e.key));if(e.key.toLowerCase()==='q')cycleQuality();if(e.key.toLowerCase()==='c'){state.cinema=!state.cinema;toast(state.cinema?'电影镜头循环开启':'电影镜头循环关闭');save()}if(e.key.toLowerCase()==='m')toggleMusic();if(e.key.toLowerCase()==='h'){state.hidden=!state.hidden;hud.classList.toggle('collapsed',state.hidden);save()}if(e.key.toLowerCase()==='p')capture(true);if(e.key.toLowerCase()==='r')resetParams()});hud.classList.toggle('collapsed',state.hidden);document.getElementById('music').textContent=state.music?'静音':'氛围音乐';window.GARGANTUA={capture,setDebug,setQuality:q=>{state.quality=q;applyQuality();resize()},setParam:(k,v)=>{if(k in state.params){state.params[k]=v;const uname='u'+k[0].toUpperCase()+k.slice(1);if(material.uniforms[uname])material.uniforms[uname].value=v;save()}},renderer:()=>renderer};
</script>
</body>
