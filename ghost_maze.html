<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Maze</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="newGame()">New Game</button>
  <button class="btn" onclick="lightRadius=Math.min(200,lightRadius+20)">Brighter</button>
  <button class="btn" onclick="lightRadius=Math.max(40,lightRadius-20)">Darker</button>
  <button class="btn" onclick="ghostCount=Math.min(8,ghostCount+1)">More Ghosts</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

const CELL=32,COLS=20,ROWS=15;
let maze,player,ghosts,lightRadius=80,ghostCount=3,score=0;

function newGame(){
  maze=generateMaze(COLS,ROWS);
  player={x:1,y:1,energy:100};
  ghosts=[];
  for(let i=0;i<ghostCount;i++){
    ghosts.push({x:COLS-2,y:ROWS-2,dir:0,speed:.02+Math.random()*.02,phase:Math.random()*Math.PI*2});
  }
  score=0;
}

function generateMaze(w,h){
  const grid=Array.from({length:h},()=>Array(w).fill(1));
  const visited=Array.from({length:h},()=>Array(w).fill(false));
  function carve(x,y){
    visited[y][x]=true;grid[y][x]=0;
    const dirs=[[0,1],[1,0],[0,-1],[-1,0]].sort(()=>Math.random()-.5);
    for(const[dx,dy]of dirs){
      const nx=x+dx*2,ny=y+dy*2;
      if(nx>=0&&nx<w&&ny>=0&&ny<h&&!visited[ny][nx]){
        grid[y+dy][x+dx]=0;carve(nx,ny);
      }
    }
  }
  carve(1,1);
  return grid;
}

document.addEventListener('keydown',e=>{
  const dirs={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  const d=dirs[e.key];if(!d)return;
  const nx=player.x+d[0],ny=player.y+d[1];
  if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&maze[ny][nx]===0){
    player.x=nx;player.y=ny;score++;
    // Collect energy
    if(Math.random()<.1)player.energy=Math.min(100,player.energy+10);
  }
});

newGame();

function loop(){
  ctx.fillStyle='rgba(5,5,8,.2)';ctx.fillRect(0,0,W,H);

  // Update ghosts
  ghosts.forEach(g=>{
    const dx=player.x-g.x,dy=player.y-g.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<8&&dist>0){
      g.x+=dx/dist*g.speed*1.5;g.y+=dy/dist*g.speed*1.5;
    }else{
      // Random walk
      const dirs=[[0,1],[1,0],[0,-1],[-1,0]];
      const dir=dirs[g.dir];
      const nx=Math.round(g.x)+dir[0],ny=Math.round(g.y)+dir[1];
      if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&maze[ny]&&maze[ny][nx]===0){
        g.x+=dir[0]*g.speed;g.y+=dir[1]*g.speed;
      }else{
        g.dir=Math.random()*4|0;
      }
    }
    // Check collision
    if(Math.hypot(g.x-player.x,g.y-player.y)<.8){
      player.energy-=2;
    }
  });

  // Camera offset
  const camX=W/2-player.x*CELL-CELL/2;
  const camY=H/2-player.y*CELL-CELL/2;

  ctx.save();
  ctx.translate(camX,camY);

  // Draw maze
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const px=x*CELL,py=y*CELL;
    const dist=Math.hypot(px-player.x*CELL,py-player.y*CELL);
    if(dist>lightRadius*1.5)continue;
    const visibility=Math.max(0,1-dist/lightRadius);
    if(maze[y][x]===1){
      ctx.fillStyle=`rgba(100,100,140,${visibility*.4})`;
      ctx.fillRect(px,py,CELL,CELL);
    }else{
      ctx.fillStyle=`rgba(30,30,50,${visibility*.3})`;
      ctx.fillRect(px,py,CELL,CELL);
    }
  }

  // Draw ghosts
  ghosts.forEach(g=>{
    const dist=Math.hypot(g.x-player.x,g.y-player.y);
    if(dist>lightRadius/CELL*1.5)return;
    const alpha=Math.max(0,.6-dist*.05);
    const gx=g.x*CELL,gy=g.y*CELL;
    ctx.fillStyle=`rgba(200,100,255,${alpha*.5})`;
    ctx.beginPath();ctx.arc(gx+CELL/2,gy+CELL/2,CELL*.4,0,Math.PI*2);ctx.fill();
    // Ghost eyes
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;
    ctx.fillRect(gx+CELL*.3,gy+CELL*.3,4,4);
    ctx.fillRect(gx+CELL*.55,gy+CELL*.3,4,4);
  });

  // Draw player
  const px=player.x*CELL,py=player.y*CELL;
  ctx.fillStyle='rgba(34,197,94,.9)';
  ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,CELL*.35,0,Math.PI*2);ctx.fill();
  // Light glow
  const g=ctx.createRadialGradient(px+CELL/2,py+CELL/2,0,px+CELL/2,py+CELL/2,lightRadius);
  g.addColorStop(0,'rgba(255,200,100,.08)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,lightRadius,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Darkness overlay
  const darkness=ctx.createRadialGradient(W/2,H/2,lightRadius*.3,W/2,H/2,lightRadius);
  darkness.addColorStop(0,'rgba(0,0,0,0)');darkness.addColorStop(1,'rgba(5,5,8,.95)');
  ctx.fillStyle=darkness;ctx.fillRect(0,0,W,H);

  // HUD
  ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='14px Space Grotesk';ctx.textAlign='left';
  ctx.fillText(`Energy: ${player.energy|0}%`,20,30);
  ctx.fillText(`Score: ${score}`,20,50);
  if(player.energy<=0){
    ctx.fillStyle='rgba(244,63,94,.8)';ctx.font='bold 2rem Space Grotesk';ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2);
  }

  document.getElementById('stats').textContent=`${ghosts.length} ghosts · energy ${player.energy|0}%`;
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
