<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Ripple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="ripples.push({x:W/2,y:H/2,t:0,power:1})">Ripple</button>
  <button class="btn" onclick="ripples=[];ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H)">Clear</button>
  <button class="btn" onclick="autoRipple=!autoRipple">Auto</button>
  <button class="btn" onclick="complexMode=!complexMode">Complex Mode</button>
  <button class="btn" onclick="speed*=1.5">Faster</button>
  <button class="btn" onclick="speed/=1.5">Slower</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let ripples=[],autoRipple=false,complexMode=false,speed=1;

canvas.addEventListener('click',e=>{
  ripples.push({x:e.clientX,y:e.clientY,t:0,power:1+Math.random()});
  ripples.push({x:e.clientX+Math.random()*20-10,y:e.clientY+Math.random()*20-10,t:0,power:.5+Math.random()});
});

resize();

function loop(){
  const scale=4;
  const cols=Math.ceil(W/scale),rows=Math.ceil(H/scale);
  const imgData=ctx.createImageData(cols,rows);
  const d=imgData.data;

  if(autoRipple&&Math.random()<.03)ripples.push({x:W*.2+Math.random()*W*.6,y:H*.2+Math.random()*H*.6,t:0,power:.5+Math.random()});

  // Update ripples
  ripples.forEach(r=>r.t+=.05*speed);
  ripples=ripples.filter(r=>r.t<8);

  for(let py=0;py<rows;py++)for(let px=0;px<cols;px++){
    const x=px*scale,y=py*scale;
    let val=0,imVal=0;

    ripples.forEach(r=>{
      const dist=Math.hypot(x-r.x,y-r.y);
      const wave=Math.sin(dist*.08-r.t*4)*Math.exp(-dist*.003)*Math.exp(-r.t*.3)*r.power;
      val+=wave;
      if(complexMode)imVal+=Math.cos(dist*.08-r.t*4)*Math.exp(-dist*.003)*Math.exp(-r.t*.3)*r.power;
    });

    const idx=(py*cols+px)*4;
    let r2,g,b;
    if(complexMode){
      const mag=Math.sqrt(val*val+imVal*imVal);
      const phase=Math.atan2(imVal,val);
      r2=(val*.5+.5)*200+Math.sin(phase)*55;
      g=(imVal*.5+.5)*150+50;
      b=mag*200+55;
    }else{
      const v=(val+1)*.5;
      r2=v*80;g=v*160+20;b=v*240+15;
    }

    d[idx]=Math.max(0,Math.min(255,r2));
    d[idx+1]=Math.max(0,Math.min(255,g));
    d[idx+2]=Math.max(0,Math.min(255,b));
    d[idx+3]=255;
  }

  const tmpC=document.createElement('canvas');tmpC.width=cols;tmpC.height=rows;
  tmpC.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpC,0,0,W,H);

  // Draw click indicators
  ripples.forEach(r=>{
    const alpha=Math.max(0,1-r.t/3);
    ctx.beginPath();ctx.arc(r.x,r.y,5+r.t*20,0,Math.PI*2);
    ctx.strokeStyle=`rgba(6,182,212,${alpha*.3})`;ctx.lineWidth=1;ctx.stroke();
  });

  document.getElementById('stats').textContent=`${ripples.length} ripples · mode: ${complexMode?'complex':'simple'}`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
