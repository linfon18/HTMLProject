<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Timeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25);--accent:#8b5cf6;--green:#22c55e;--red:#f43f5e;--amber:#f59e0b;--cyan:#06b6d4}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;filter:blur(120px);opacity:.35}
.a1{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.3),transparent 70%);top:5%;left:20%;animation:f 25s ease-in-out infinite alternate}
.a2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.2),transparent 70%);bottom:10%;right:15%;animation:f 25s ease-in-out infinite alternate-reverse}
@keyframes f{0%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}100%{transform:translate(-30px,40px)}}

.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:0 24px}

/* Header */
.header{padding:80px 0 40px;text-align:center}
.header .eyebrow{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.header h1{font-size:2.2rem;font-weight:800;color:var(--t1);letter-spacing:-.03em}
.header p{font-size:.9rem;color:var(--t3);margin-top:8px}

/* Input Card */
.input-card{
  padding:24px;border-radius:16px;
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;
  margin-bottom:40px;
}
.field label{display:block;font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.field input,.field select{
  width:100%;padding:10px 12px;border-radius:8px;font-size:.85rem;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--t1);font-family:inherit;outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:rgba(139,92,246,.4)}
select option{background:#1a1a2e}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:14px;overflow:hidden;margin-bottom:40px}
.stat{background:var(--bg);padding:24px 16px;text-align:center}
.stat .val{font-size:1.6rem;font-weight:700;font-family:'Space Mono',monospace;color:var(--t1)}
.stat .label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-top:4px}
.stat:nth-child(1) .val{color:var(--accent)}
.stat:nth-child(2) .val{color:var(--cyan)}
.stat:nth-child(3) .val{color:var(--amber)}
.stat:nth-child(4) .val{color:var(--green)}

/* Weeks Grid */
.weeks-section{margin-bottom:40px}
.weeks-section h2{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:16px}
.weeks-grid{display:flex;flex-wrap:wrap;gap:3px}
.week{
  width:12px;height:12px;border-radius:2px;
  transition:all .2s;cursor:default;position:relative;
}
.week:hover{transform:scale(1.5);z-index:5}
.week.lived{background:rgba(139,92,246,.5)}
.week.current{background:var(--accent);box-shadow:0 0 8px rgba(139,92,246,.4)}
.week.future{background:rgba(255,255,255,.04)}
.week:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:120%;left:50%;transform:translateX(-50%);
  padding:4px 8px;border-radius:4px;font-size:.6rem;
  background:rgba(0,0,0,.8);color:var(--t1);white-space:nowrap;
  pointer-events:none;z-index:10;
}

/* Year Labels */
.year-labels{display:flex;gap:0;margin-top:8px}
.year-label{
  font-size:.55rem;font-family:'Space Mono',monospace;color:var(--t3);
  text-align:center;
}
.year-label span{display:block;font-size:.65rem;color:var(--t2);font-weight:600}

/* Milestone Timeline */
.milestones{margin-bottom:60px}
.milestones h2{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:16px}
.tl{position:relative;padding-left:24px}
.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent),var(--cyan),var(--green))}
.tl-item{position:relative;margin-bottom:20px;padding:14px 18px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--border);transition:all .3s}
.tl-item:hover{border-color:var(--border);background:rgba(255,255,255,.04)}
.tl-item::before{content:'';position:absolute;left:-22px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-item .age{font-size:.65rem;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace}
.tl-item .event{font-size:.85rem;font-weight:600;color:var(--t1);margin-top:2px}
.tl-item .desc{font-size:.72rem;color:var(--t3);margin-top:2px}

.footer{padding:40px 0;text-align:center;font-size:.7rem;color:var(--t3)}
</style>
</head>
<body>
<div class="aurora"><div class="a1"></div><div class="a2"></div></div>

<div class="container">
  <div class="header">
    <div class="eyebrow">Your Life in Weeks</div>
    <h1>Life Timeline</h1>
    <p>Visualize your entire life, one week at a time</p>
  </div>

  <div class="input-card">
    <div class="field">
      <label>Birth Date</label>
      <input type="date" id="birthDate" value="2000-01-01">
    </div>
    <div class="field">
      <label>Life Expectancy</label>
      <input type="number" id="expectancy" value="80" min="30" max="120">
    </div>
    <div class="field">
      <label>Theme</label>
      <select id="theme">
        <option value="purple">Purple</option>
        <option value="cyan">Cyan</option>
        <option value="fire">Fire</option>
        <option value="ocean">Ocean</option>
      </select>
    </div>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat"><div class="val" id="age">—</div><div class="label">Years Old</div></div>
    <div class="stat"><div class="val" id="weeksLived">—</div><div class="label">Weeks Lived</div></div>
    <div class="stat"><div class="val" id="weeksLeft">—</div><div class="label">Weeks Left</div></div>
    <div class="stat"><div class="val" id="pctLife">—</div><div class="label">% Complete</div></div>
  </div>

  <div class="weeks-section">
    <h2>Each square = 1 week</h2>
    <div class="weeks-grid" id="weeksGrid"></div>
  </div>

  <div class="milestones" id="milestones">
    <h2>Life Milestones</h2>
    <div class="tl" id="tl"></div>
  </div>

  <div class="footer">Every week is a gift. Make it count.</div>
</div>

<script>
const THEMES={
  purple:{lived:'rgba(139,92,246,.5)',current:'#8b5cf6',glow:'rgba(139,92,246,.4)'},
  cyan:{lived:'rgba(6,182,212,.5)',current:'#06b6d4',glow:'rgba(6,182,212,.4)'},
  fire:{lived:'rgba(244,63,94,.5)',current:'#f43f5e',glow:'rgba(244,63,94,.4)'},
  ocean:{lived:'rgba(59,130,246,.5)',current:'#3b82f6',glow:'rgba(59,130,246,.4)'},
};

const MILESTONES=[
  {age:0,event:'Born',desc:'The journey begins'},
  {age:1,event:'First Steps',desc:'Learning to walk'},
  {age:3,event:'Pre-school',desc:'Starting to explore the world'},
  {age:6,event:'Primary School',desc:'Learning to read and write'},
  {age:12,event:'Teenager',desc:'The teenage years begin'},
  {age:15,event:'High School',desc:'Growing up, finding interests'},
  {age:18,event:'Adult',desc:'Legal adulthood, new responsibilities'},
  {age:22,event:'Graduate',desc:'University completed'},
  {age:25,event:'Quarter Life',desc:'Career takes shape'},
  {age:30,event:'Established',desc:'Finding your groove'},
  {age:40,event:'Midlife',desc:'Reflection and wisdom'},
  {age:50,event:'Half Century',desc:'50 years of experience'},
  {age:60,event:'Senior',desc:'Embracing a new chapter'},
  {age:65,event:'Retirement',desc:'Freedom and leisure'},
  {age:70,event:'Elder',desc:'Sharing wisdom'},
  {age:80,event:'Legacy',desc:'A life well lived'},
];

function render(){
  const birthStr=document.getElementById('birthDate').value;
  if(!birthStr)return;
  const birth=new Date(birthStr);
  const expectancy=+document.getElementById('expectancy').value;
  const theme=THEMES[document.getElementById('theme').value];
  const now=new Date();

  const ageYears=((now-birth)/(365.25*24*60*60*1000));
  const totalWeeks=Math.round(expectancy*52.18);
  const weeksLived=Math.round(ageYears*52.18);
  const weeksLeft=Math.max(0,totalWeeks-weeksLived);
  const pct=Math.min(100,weeksLived/totalWeeks*100);

  document.getElementById('age').textContent=ageYears.toFixed(1);
  document.getElementById('weeksLived').textContent=weeksLived.toLocaleString();
  document.getElementById('weeksLeft').textContent=weeksLeft.toLocaleString();
  document.getElementById('pctLife').textContent=pct.toFixed(1)+'%';

  // Weeks grid
  const grid=document.getElementById('weeksGrid');
  grid.innerHTML='';
  for(let i=0;i<totalWeeks;i++){
    const w=document.createElement('div');
    w.className='week';
    if(i<weeksLived){w.classList.add('lived');w.style.background=theme.lived}
    else if(i===weeksLived){w.classList.add('current');w.style.background=theme.current;w.style.boxShadow=`0 0 8px ${theme.glow}`}
    else{w.classList.add('future')}
    const year=Math.floor(i/52.18);
    const weekInYear=Math.floor(i%52.18);
    w.dataset.tip=`Year ${year}, Week ${weekInYear}`;
    grid.appendChild(w);
  }

  // Milestones
  const tl=document.getElementById('tl');
  tl.innerHTML='';
  MILESTONES.forEach(m=>{
    if(m.age>expectancy)return;
    const item=document.createElement('div');
    item.className='tl-item';
    const isPast=ageYears>=m.age;
    item.style.opacity=isPast?1:.4;
    item.innerHTML=`
      <div class="age">Age ${m.age}</div>
      <div class="event">${m.event}</div>
      <div class="desc">${m.desc}</div>
    `;
    tl.appendChild(item);
  });
}

document.getElementById('birthDate').addEventListener('input',render);
document.getElementById('expectancy').addEventListener('input',render);
document.getElementById('theme').addEventListener('change',render);

render();
</script>
</body>
</html>
