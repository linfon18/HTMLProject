<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲁大师 - 硬件性能评测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .content {
            padding: 30px;
        }

        .score-display {
            text-align: center;
            margin-bottom: 40px;
        }

        .score-number {
            font-size: 5rem;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .score-label {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 10px;
        }

        .score-rating {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .rating-超越98%用户 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
        .rating-超越90%用户 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
        .rating-超越70%用户 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #fff; }
        .rating-超越50%用户 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #fff; }
        .rating-一般 { background: #f0f0f0; color: #666; }

        .hardware-list {
            margin-bottom: 30px;
        }

        .hardware-item {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .hardware-item:last-child {
            border-bottom: none;
        }

        .hardware-name {
            font-size: 1rem;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hardware-score {
            color: #667eea;
            font-weight: bold;
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 2s ease-out;
            width: 0;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .testing {
            text-align: center;
            padding: 60px 30px;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #f0f0f0;
            border-top: 6px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .testing-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        .testing-progress {
            font-size: 2rem;
            color: #667eea;
            font-weight: bold;
        }

        .system-info {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .system-info h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .score-number {
                font-size: 3.5rem;
            }

            .btn-container {
                flex-direction: column;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 鲁大师</h1>
            <p>专业的硬件性能评测工具</p>
        </div>

        <div class="content">
            <div id="beforeTest">
                <div style="text-align: center; padding: 40px 20px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">⚡</div>
                    <h2 style="color: #333; margin-bottom: 15px;">准备开始性能测试</h2>
                    <p style="color: #666; margin-bottom: 30px;">点击下方按钮开始测试您的设备性能</p>
                </div>

                <div class="system-info">
                    <h3>系统信息</h3>
                    <div class="info-row">
                        <span class="info-label">操作系统</span>
                        <span class="info-value" id="os">检测中...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">浏览器</span>
                        <span class="info-value" id="browser">检测中...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">屏幕分辨率</span>
                        <span class="info-value" id="screen">检测中...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">CPU核心数</span>
                        <span class="info-value" id="cores">检测中...</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">内存</span>
                        <span class="info-value" id="memory">检测中...</span>
                    </div>
                </div>

                <div class="btn-container">
                    <button class="btn btn-primary" onclick="startTest()">🚀 开始测试</button>
                </div>
            </div>

            <div id="testing" class="testing hidden">
                <div class="spinner"></div>
                <div class="testing-text">正在测试硬件性能...</div>
                <div class="testing-progress">0%</div>
                <div style="margin-top: 20px; color: #999;" id="testingItem">初始化测试环境...</div>
            </div>

            <div id="result" class="hidden">
                <div class="score-display">
                    <div class="score-label">综合性能得分</div>
                    <div class="score-number" id="totalScore">0</div>
                    <div class="score-rating" id="rating">计算中...</div>
                </div>

                <div class="hardware-list">
                    <div class="hardware-item">
                        <div class="hardware-name">
                            <span>💻 处理器性能</span>
                            <span class="hardware-score" id="cpuScore">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="cpuBar"></div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="hardware-name">
                            <span>🎮 图形性能</span>
                            <span class="hardware-score" id="gpuScore">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="gpuBar"></div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="hardware-name">
                            <span>💾 内存性能</span>
                            <span class="hardware-score" id="memScore">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="memBar"></div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="hardware-name">
                            <span>💿 磁盘性能</span>
                            <span class="hardware-score" id="diskScore">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="diskBar"></div>
                        </div>
                    </div>

                    <div class="hardware-item">
                        <div class="hardware-name">
                            <span>🌐 网络性能</span>
                            <span class="hardware-score" id="netScore">0</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="netBar"></div>
                        </div>
                    </div>
                </div>

                <div class="btn-container">
                    <button class="btn btn-primary" onclick="resetTest()">🔄 重新测试</button>
                    <button class="btn btn-secondary" onclick="shareResult()">📤 分享结果</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function detectSystemInfo() {
            const ua = navigator.userAgent;
            let os = 'Unknown';
            if (ua.indexOf('Windows') !== -1) os = 'Windows';
            else if (ua.indexOf('Mac') !== -1) os = 'macOS';
            else if (ua.indexOf('Linux') !== -1) os = 'Linux';
            else if (ua.indexOf('Android') !== -1) os = 'Android';
            else if (ua.indexOf('iOS') !== -1) os = 'iOS';

            let browser = 'Unknown';
            if (ua.indexOf('Chrome') !== -1) browser = 'Chrome';
            else if (ua.indexOf('Firefox') !== -1) browser = 'Firefox';
            else if (ua.indexOf('Safari') !== -1) browser = 'Safari';
            else if (ua.indexOf('Edge') !== -1) browser = 'Edge';

            document.getElementById('os').textContent = os;
            document.getElementById('browser').textContent = browser;
            document.getElementById('screen').textContent = `${screen.width} × ${screen.height}`;
            document.getElementById('cores').textContent = navigator.hardwareConcurrency || '未知';
            document.getElementById('memory').textContent = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : '未知';
        }

        detectSystemInfo();

        let scores = {
            cpu: 0,
            gpu: 0,
            mem: 0,
            disk: 0,
            net: 0
        };

        function startTest() {
            document.getElementById('beforeTest').classList.add('hidden');
            document.getElementById('testing').classList.remove('hidden');

            const tests = [
                { name: '测试CPU性能...', duration: 2000, key: 'cpu', min: 8000, max: 25000 },
                { name: '测试GPU性能...', duration: 2500, key: 'gpu', min: 6000, max: 20000 },
                { name: '测试内存性能...', duration: 1500, key: 'mem', min: 5000, max: 15000 },
                { name: '测试磁盘性能...', duration: 2000, key: 'disk', min: 4000, max: 12000 },
                { name: '测试网络性能...', duration: 1500, key: 'net', min: 3000, max: 10000 }
            ];

            let currentTest = 0;
            let totalDuration = tests.reduce((sum, t) => sum + t.duration, 0);
            let elapsed = 0;

            function runNextTest() {
                if (currentTest >= tests.length) {
                    showResult();
                    return;
                }

                const test = tests[currentTest];
                document.getElementById('testingItem').textContent = test.name;

                scores[test.key] = Math.floor(Math.random() * (test.max - test.min) + test.min);

                const interval = setInterval(() => {
                    elapsed += 50;
                    const progress = Math.min(100, Math.floor((elapsed / totalDuration) * 100));
                    document.querySelector('.testing-progress').textContent = progress + '%';
                }, 50);

                setTimeout(() => {
                    clearInterval(interval);
                    currentTest++;
                    runNextTest();
                }, test.duration);
            }

            runNextTest();
        }

        function showResult() {
            document.getElementById('testing').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            const total = scores.cpu + scores.gpu + scores.mem + scores.disk + scores.net;

            setTimeout(() => {
                animateScore('totalScore', total);
                animateScore('cpuScore', scores.cpu);
                animateScore('gpuScore', scores.gpu);
                animateScore('memScore', scores.mem);
                animateScore('diskScore', scores.disk);
                animateScore('netScore', scores.net);

                setTimeout(() => {
                    document.getElementById('cpuBar').style.width = (scores.cpu / 250) + '%';
                    document.getElementById('gpuBar').style.width = (scores.gpu / 200) + '%';
                    document.getElementById('memBar').style.width = (scores.mem / 150) + '%';
                    document.getElementById('diskBar').style.width = (scores.disk / 120) + '%';
                    document.getElementById('netBar').style.width = (scores.net / 100) + '%';
                }, 500);

                let rating = '一般';
                let ratingClass = 'rating-一般';
                if (total > 70000) {
                    rating = '超越98%用户 🏆';
                    ratingClass = 'rating-超越98%用户';
                } else if (total > 55000) {
                    rating = '超越90%用户 🌟';
                    ratingClass = 'rating-超越90%用户';
                } else if (total > 40000) {
                    rating = '超越70%用户 ✨';
                    ratingClass = 'rating-超越70%用户';
                } else if (total > 30000) {
                    rating = '超越50%用户 👍';
                    ratingClass = 'rating-超越50%用户';
                }

                const ratingEl = document.getElementById('rating');
                ratingEl.textContent = rating;
                ratingEl.className = 'score-rating ' + ratingClass;
            }, 100);
        }

        function animateScore(elementId, target) {
            const el = document.getElementById(elementId);
            const duration = 1500;
            const steps = 60;
            const stepValue = target / steps;
            let current = 0;
            let step = 0;

            const interval = setInterval(() => {
                step++;
                current = Math.min(target, Math.floor(stepValue * step));
                el.textContent = current.toLocaleString();

                if (step >= steps) {
                    clearInterval(interval);
                    el.textContent = target.toLocaleString();
                }
            }, duration / steps);
        }

        function resetTest() {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('beforeTest').classList.remove('hidden');
            
            document.querySelectorAll('.progress-fill').forEach(bar => {
                bar.style.width = '0';
            });
        }

        function shareResult() {
            const total = scores.cpu + scores.gpu + scores.mem + scores.disk + scores.net;
            const text = `我在鲁大师跑分测试中获得了 ${total.toLocaleString()} 分！🎉`;
            
            if (navigator.share) {
                navigator.share({
                    title: '鲁大师跑分',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('结果已复制到剪贴板！');
                });
            }
        }
    </script>
</body>
</html>
