<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shader Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
.top{padding:6px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.top h1{font-size:.82rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.btn.primary{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.25);color:#a78bfa}
.main{flex:1;display:flex;overflow:hidden}
.editor{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.pane-h{padding:4px 12px;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--border);background:rgba(255,255,255,.015);display:flex;align-items:center;gap:6px}
.pane-h .dot{width:5px;height:5px;border-radius:50%;background:#22c55e}
textarea{flex:1;resize:none;border:none;outline:none;padding:12px;background:#0a0a10;color:#e6edf3;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.6;tab-size:2}
.preview{width:55%;display:flex;flex-direction:column;position:relative}
canvas{flex:1;display:block;width:100%;height:100%}
.errors{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:rgba(244,63,94,.1);border-top:1px solid rgba(244,63,94,.2);color:#f87171;font-size:.68rem;font-family:'JetBrains Mono',monospace;max-height:80px;overflow:auto;display:none}
.presets{display:flex;gap:3px;margin-right:8px}
.presets .btn{font-size:.6rem;padding:3px 8px}
.fps{position:absolute;top:8px;right:8px;font-size:.6rem;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.25);padding:3px 8px;border-radius:4px;background:rgba(0,0,0,.4);backdrop-filter:blur(8px)}
</style>
</head>
<body>
<div class="top">
  <h1>Shader Lab</h1>
  <div class="presets">
    <button class="btn" onclick="loadPreset('plasma')">Plasma</button>
    <button class="btn" onclick="loadPreset('voronoi')">Voronoi</button>
    <button class="btn" onclick="loadPreset('noise')">Noise</button>
    <button class="btn" onclick="loadPreset('raymarch')">Raymarch</button>
    <button class="btn" onclick="loadPreset('mandelbrot')">Mandelbrot</button>
    <button class="btn" onclick="loadPreset('waves')">Waves</button>
  </div>
  <button class="btn primary" onclick="compile()">Run</button>
  <button class="btn" onclick="copyShader()">Copy</button>
</div>
<div class="main">
  <div class="editor">
    <div class="pane-h"><span class="dot"></span>Fragment Shader</div>
    <textarea id="code" spellcheck="false"></textarea>
  </div>
  <div class="preview">
    <canvas id="c"></canvas>
    <div class="fps" id="fps">0 FPS</div>
    <div class="errors" id="errors"></div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl2')||canvas.getContext('webgl');
const codeEl=document.getElementById('code');
const errorsEl=document.getElementById('errors');
const fpsEl=document.getElementById('fps');

let W,H,prog=null,startTime=performance.now(),frames=0,fpsTime=performance.now();

function resize(){
  const rect=canvas.parentElement.getBoundingClientRect();
  W=canvas.width=rect.width;H=canvas.height=rect.height;
  gl.viewport(0,0,W,H);
}
resize();addEventListener('resize',resize);

const VS=`attribute vec2 a;varying vec2 v;void main(){v=a*.5+.5;gl_Position=vec4(a,0,1);}`;
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const PRESETS={
plasma:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
void main(){
  vec2 uv=(v-.5)*2.;uv.x*=uR.x/uR.y;
  float t=uT*.5;
  float c=sin(uv.x*3.+t)+sin(uv.y*3.+t)+sin((uv.x+uv.y)*3.+t);
  c+=sin(length(uv)*5.-t*2.);
  c=c*.5+.5;
  vec3 col=vec3(sin(c*3.14)*.5+.5,sin(c*3.14+2.09)*.5+.5,sin(c*3.14+4.19)*.5+.5);
  gl_FragColor=vec4(col,1);
}`,

voronoi:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
vec2 hash(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}
void main(){
  vec2 uv=(v-.5)*2.;uv.x*=uR.x/uR.y;
  uv*=3.;
  vec2 g=floor(uv),f=fract(uv);
  float d=1.;
  for(int y=-1;y<=1;y++)for(int x=-1;x<=1;x++){
    vec2 o=vec2(float(x),float(y));
    vec2 h=hash(g+o);
    h=.5+.5*sin(uT+6.28*h);
    d=min(d,length(o+h-f));
  }
  vec3 col=vec3(.1)+vec3(.6,.3,.8)*smoothstep(.05,.5,d);
  col+=vec3(.1)*smoothstep(.5,.48,d);
  gl_FragColor=vec4(col,1);
}`,

noise:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}
float snoise(vec2 v){const vec4 C=vec4(.211324865,.366025403,-.577350269,.024390243);
vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1;x0.x>x0.y?i1=vec2(1,0):i1=vec2(0,1);
vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);vec3 p=permute(permute(i.y+vec3(0,i1.y,1.))+i.x+vec3(0,i1.x,1.));
vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);m=m*m;m=m*m;
vec3 x=2.*fract(p*C.www)-1.;vec3 h=abs(x)-.5;vec3 ox=floor(x+.5);vec3 a0=x-ox;
m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.*dot(m,g);}
void main(){
  vec2 uv=(v-.5)*2.;uv.x*=uR.x/uR.y;
  float n=0.;n+=.5*snoise(uv*2.+uT*.2);n+=.25*snoise(uv*4.-uT*.3);n+=.125*snoise(uv*8.+uT*.1);
  n=n*.5+.5;
  vec3 col=mix(vec3(.05,.02,.1),vec3(.4,.1,.8),n);
  col=mix(col,vec3(.1,.3,.8),smoothstep(.4,.6,n));
  gl_FragColor=vec4(col,1);
}`,

raymarch:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
mat2 r(float a){float c=cos(a),s=sin(a);return mat2(c,-s,s,c);}
float sdSphere(vec3 p,float r){return length(p)-r;}
float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float scene(vec3 p){
  p.xz*=r(uT*.3);p.yz*=r(uT*.2);
  float d=sdSphere(p,1.);d=min(d,sdBox(p,vec3(.7)));return d;
}
void main(){
  vec2 uv=(v-.5)*2.;uv.x*=uR.x/uR.y;
  vec3 ro=vec3(0,0,3.),rd=normalize(vec3(uv,-1.5));
  float t=0.;vec3 p;bool hit=false;
  for(int i=0;i<80;i++){p=ro+rd*t;float d=scene(p);if(d<.001){hit=true;break;}if(t>10.)break;t+=d;}
  vec3 col=vec3(.02,.02,.04);
  if(hit){
    vec2 e=vec2(.001,0);
    vec3 n=normalize(vec3(scene(p+e.xyy)-scene(p-e.xyy),scene(p+e.yxy)-scene(p-e.yxy),scene(p+e.yyx)-scene(p-e.yyx)));
    float diff=max(dot(n,normalize(vec3(1,1,1))),0.);
    float spec=pow(max(dot(reflect(normalize(vec3(-1,-1,-1)),n),-rd),0.),32.);
    col=vec3(.4,.2,.8)*diff*.6+vec3(1)*spec*.5+vec3(.05);
  }
  col=pow(col,vec3(.45));gl_FragColor=vec4(col,1);
}`,

mandelbrot:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
void main(){
  vec2 uv=(v-.5)*2.5;uv.x*=uR.x/uR.y;
  float zoom=1.+sin(uT*.1)*.5;
  uv/=zoom;uv+=vec2(-.5,0);
  vec2 z=vec2(0.);float i;const int MAX=200;
  for(i=0.;float(i)<200.;i++){z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+uv;if(dot(z,z)>4.)break;}
  float c=i/200.;
  vec3 col=vec3(.5+.5*sin(c*6.28+uT),.5+.5*sin(c*6.28+2.+uT*.7),.5+.5*sin(c*6.28+4.+uT*.5));
  if(i>=200.)col=vec3(0);
  gl_FragColor=vec4(col,1);
}`,

waves:`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;
void main(){
  vec2 uv=(v-.5)*2.;uv.x*=uR.x/uR.y;
  float w=0.;
  w+=sin(uv.x*5.+uT)*.3;
  w+=sin(uv.y*7.-uT*1.3)*.2;
  w+=sin(length(uv)*8.-uT*2.)*.3;
  w+=sin((uv.x+uv.y)*4.+uT*.7)*.2;
  float glow=exp(-abs(w)*3.);
  vec3 col=vec3(.1,.05,.2)+glow*vec3(.3,.5,1.);
  col+=smoothstep(.0,.02,abs(w)-.01)*vec3(.2,.4,.8)*.3;
  gl_FragColor=vec4(col,1);
}`
};

function loadPreset(name){
  codeEl.value=PRESETS[name];
  compile();
}

function compile(){
  errorsEl.style.display='none';
  const fsSrc='precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;\n'+codeEl.value.replace(/precision.*?;/,'').replace(/varying.*?;/,'').replace(/uniform.*?;/g,'');

  const fs=gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs,`precision highp float;varying vec2 v;uniform vec2 uR;uniform float uT;void main();`+
    codeEl.value.replace(/^precision.*$/m,'').replace(/^varying.*$/m,'').replace(/^uniform.*$/m,''));
  // Better approach
  const fullFS=codeEl.value;
  gl.shaderSource(fs,fullFS);
  gl.compileShader(fs);
  if(!gl.getShaderParameter(fs,gl.COMPILE_STATUS)){
    errorsEl.textContent=gl.getShaderInfoLog(fs);
    errorsEl.style.display='block';
    return;
  }

  const vs=gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs,VS);gl.compileShader(vs);

  const p=gl.createProgram();
  gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){
    errorsEl.textContent=gl.getProgramInfoLog(p);
    errorsEl.style.display='block';
    return;
  }

  prog=p;
  gl.useProgram(prog);
  const loc=gl.getAttribLocation(prog,'a');
  gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  startTime=performance.now();
}

function copyShader(){navigator.clipboard.writeText(codeEl.value)}

function loop(t){
  if(prog){
    gl.useProgram(prog);
    const uR=gl.getUniformLocation(prog,'uR');
    const uT=gl.getUniformLocation(prog,'uT');
    const uM=gl.getUniformLocation(prog,'uM');
    if(uR)gl.uniform2f(uR,W,H);
    if(uT)gl.uniform1f(uT,(t-startTime)*.001);
    if(uM)gl.uniform2f(uM,0,0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  frames++;
  if(t-fpsTime>500){fpsEl.textContent=Math.round(frames*1000/(t-fpsTime))+' FPS';frames=0;fpsTime=t}
  requestAnimationFrame(loop);
}

loadPreset('plasma');
requestAnimationFrame(loop);
</script>
</body>
</html>
