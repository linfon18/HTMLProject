<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25);--accent:#8b5cf6;--green:#22c55e;--red:#f43f5e;--amber:#f59e0b;--blue:#3b82f6}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.container{max-width:520px;width:100%}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:1.6rem;font-weight:800;color:var(--t1);letter-spacing:-.03em}
.header p{font-size:.85rem;color:var(--t3);margin-top:4px}

.card{padding:28px;border-radius:16px;background:rgba(255,255,255,.025);border:1px solid var(--border);margin-bottom:16px}
.result-box{
  padding:18px 20px;border-radius:12px;
  background:rgba(0,0,0,.3);border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.result-box .password{
  flex:1;font-family:'Space Mono',monospace;font-size:1.1rem;color:var(--t1);
  word-break:break-all;line-height:1.5;
}
.result-box .char{transition:all .15s}
.copy-btn{
  padding:8px 14px;border-radius:8px;font-size:.75rem;font-weight:600;
  background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#a78bfa;
  cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.copy-btn:hover{background:rgba(139,92,246,.25)}
.copy-btn.copied{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#4ade80}

.strength-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-bottom:6px;overflow:hidden}
.strength-bar .fill{height:100%;border-radius:2px;transition:all .3s}
.strength-label{font-size:.68rem;display:flex;justify-content:space-between;margin-bottom:20px}
.strength-label .label{font-weight:600}

.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.row label{font-size:.82rem;color:var(--t2)}
.row .right{display:flex;align-items:center;gap:8px}
input[type=range]{width:120px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--t1);min-width:28px;text-align:right}
.toggle{
  width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;
  background:rgba(255,255,255,.1);position:relative;transition:all .2s;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;
  border-radius:50%;background:var(--t3);transition:all .2s;
}
.toggle.on{background:rgba(139,92,246,.3)}
.toggle.on::after{left:21px;background:var(--accent)}

.btn-generate{
  width:100%;padding:14px;border-radius:12px;font-size:.9rem;font-weight:700;
  background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(6,182,212,.2));
  border:1px solid rgba(139,92,246,.2);color:var(--t1);cursor:pointer;
  transition:all .3s;margin-top:8px;
}
.btn-generate:hover{background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(6,182,212,.3));transform:translateY(-1px)}

.history{margin-top:16px}
.history h3{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.history-item{
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;
  font-family:'Space Mono',monospace;font-size:.72rem;color:var(--t2);
  transition:background .2s;cursor:pointer;
}
.history-item:hover{background:rgba(255,255,255,.03)}
.history-item .pw{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .copy{font-size:.6rem;color:var(--t3);opacity:0;transition:opacity .2s}
.history-item:hover .copy{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Password Generator</h1>
    <p>Generate secure, random passwords</p>
  </div>

  <div class="card">
    <div class="result-box">
      <div class="password" id="password"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyPassword()">Copy</button>
    </div>

    <div class="strength-bar"><div class="fill" id="strFill"></div></div>
    <div class="strength-label">
      <span class="label" id="strLabel">—</span>
      <span id="entropy">0 bits</span>
    </div>

    <div class="row">
      <label>Length</label>
      <div class="right">
        <input type="range" id="length" min="4" max="128" value="20">
        <span class="val" id="lengthV">20</span>
      </div>
    </div>
    <div class="row">
      <label>Uppercase (A-Z)</label>
      <button class="toggle on" id="tUpper" onclick="toggle(this)"></button>
    </div>
    <div class="row">
      <label>Lowercase (a-z)</label>
      <button class="toggle on" id="tLower" onclick="toggle(this)"></button>
    </div>
    <div class="row">
      <label>Numbers (0-9)</label>
      <button class="toggle on" id="tNumbers" onclick="toggle(this)"></button>
    </div>
    <div class="row">
      <label>Symbols (!@#$...)</label>
      <button class="toggle on" id="tSymbols" onclick="toggle(this)"></button>
    </div>
    <div class="row">
      <label>Exclude Ambiguous (0O, 1lI)</label>
      <button class="toggle" id="tAmbiguous" onclick="toggle(this)"></button>
    </div>

    <button class="btn-generate" onclick="generate()">Generate Password</button>
  </div>

  <div class="history">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>
</div>

<script>
const CHARS={
  upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower:'abcdefghijklmnopqrstuvwxyz',
  numbers:'0123456789',
  symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?'
};
const AMBIGUOUS='O0Il1';

let passwords=[];

function toggle(el){
  el.classList.toggle('on');
  generate();
}

function generate(){
  const len=+document.getElementById('length').value;
  let charset='';
  if(document.getElementById('tUpper').classList.contains('on'))charset+=CHARS.upper;
  if(document.getElementById('tLower').classList.contains('on'))charset+=CHARS.lower;
  if(document.getElementById('tNumbers').classList.contains('on'))charset+=CHARS.numbers;
  if(document.getElementById('tSymbols').classList.contains('on'))charset+=CHARS.symbols;

  if(document.getElementById('tAmbiguous').classList.contains('on')){
    charset=charset.split('').filter(c=>!AMBIGUOUS.includes(c)).join('');
  }

  if(!charset){document.getElementById('password').textContent='Select at least one option';return}

  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  let pw='';
  for(let i=0;i<len;i++)pw+=charset[arr[i]%charset.length];

  // Render with color
  const el=document.getElementById('password');
  el.innerHTML='';
  for(const c of pw){
    const span=document.createElement('span');
    span.className='char';span.textContent=c;
    if(/[A-Z]/.test(c))span.style.color='var(--accent)';
    else if(/[a-z]/.test(c))span.style.color='var(--t1)';
    else if(/[0-9]/.test(c))span.style.color='var(--green)';
    else span.style.color='var(--amber)';
    el.appendChild(span);
  }

  // Strength
  const entropy=Math.log2(charset.length)*len;
  const fill=document.getElementById('strFill');
  const label=document.getElementById('strLabel');
  document.getElementById('entropy').textContent=Math.round(entropy)+' bits';

  if(entropy<28){fill.style.width='15%';fill.style.background='var(--red)';label.textContent='Very Weak';label.style.color='var(--red)'}
  else if(entropy<36){fill.style.width='35%';fill.style.background='var(--amber)';label.textContent='Weak';label.style.color='var(--amber)'}
  else if(entropy<60){fill.style.width='60%';fill.style.background='var(--blue)';label.textContent='Fair';label.style.color='var(--blue)'}
  else if(entropy<80){fill.style.width='80%';fill.style.background='var(--green)';label.textContent='Strong';label.style.color='var(--green)'}
  else{fill.style.width='100%';fill.style.background='var(--accent)';label.textContent='Very Strong';label.style.color='var(--accent)'}

  // History
  passwords.unshift(pw);
  if(passwords.length>10)passwords.pop();
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('historyList');
  el.innerHTML=passwords.map(p=>`
    <div class="history-item" onclick="navigator.clipboard.writeText('${p}')">
      <span class="pw">${p}</span>
      <span class="copy">copy</span>
    </div>
  `).join('');
}

function copyPassword(){
  const text=document.getElementById('password').textContent;
  navigator.clipboard.writeText(text);
  const btn=document.getElementById('copyBtn');
  btn.textContent='Copied!';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1500);
}

document.getElementById('length').addEventListener('input',e=>{
  document.getElementById('lengthV').textContent=e.target.value;
  generate();
});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!e.target.closest('input')){e.preventDefault();generate()}
  if(e.ctrlKey&&e.key==='c'&&window.getSelection().toString()===''){copyPassword()}
});

generate();
</script>
</body>
</html>
