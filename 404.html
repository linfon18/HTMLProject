<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050508;
            color: #fff;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./assest/background.png') center/cover no-repeat;
            opacity: 0.3;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 5, 8, 0.8) 100%);
            z-index: 0;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 16rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #a78bfa 0%, #22d3ee 50%, #fb7185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(167, 139, 250, 0.5));
            animation: glow 3s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 40px rgba(167, 139, 250, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(167, 139, 250, 0.8));
            }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e8e6e3;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #9ca3af;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #a78bfa;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            border-color: #a78bfa;
            color: #fff;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 1rem;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas class="bg-canvas" id="bgCanvas"></canvas>
    <canvas class="particles" id="particles"></canvas>
    
    <div class="content">
        <div class="error-code">404</div>
        <h1>页面未找到</h1>
        <p>抱歉，您访问的页面不存在或已被移除。<br>让我们帮您找到正确的方向。</p>
        <div class="buttons">
            <a href="/" class="btn btn-primary">返回首页</a>
            <a href="javascript:history.back()" class="btn">返回上一页</a>
        </div>
    </div>

    <script>
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const particlesCanvas = document.getElementById('particles');
        const particlesCtx = particlesCanvas.getContext('2d');

        function resizeCanvas() {
            bgCanvas.width = particlesCanvas.width = window.innerWidth;
            bgCanvas.height = particlesCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const waves = [];
        const waveCount = 3;
        for (let i = 0; i < waveCount; i++) {
            waves.push({
                y: bgCanvas.height * (0.3 + i * 0.15),
                length: 0.01 + i * 0.003,
                amplitude: 30 + i * 20,
                frequency: 0.01 + i * 0.005,
                speed: 0.002 + i * 0.001,
                opacity: 0.4 - i * 0.1,
                width: 1.5 - i * 0.3
            });
        }

        let time = 0;

        function drawWaves() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            const gradient = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
            gradient.addColorStop(0, '#050508');
            gradient.addColorStop(0.5, '#0a0a12');
            gradient.addColorStop(1, '#050508');
            bgCtx.fillStyle = gradient;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            waves.forEach((wave, index) => {
                bgCtx.beginPath();
                bgCtx.strokeStyle = `rgba(167, 139, 250, ${wave.opacity})`;
                bgCtx.lineWidth = wave.width;

                for (let x = 0; x < bgCanvas.width; x++) {
                    const y = wave.y + Math.sin(x * wave.length + time * wave.speed) * wave.amplitude;
                    if (x === 0) {
                        bgCtx.moveTo(x, y);
                    } else {
                        bgCtx.lineTo(x, y);
                    }
                }
                bgCtx.stroke();
            });

            time += 0.5;
            requestAnimationFrame(drawWaves);
        }

        drawWaves();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * particlesCanvas.width;
                this.y = Math.random() * particlesCanvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > particlesCanvas.width || 
                    this.y < 0 || this.y > particlesCanvas.height) {
                    this.reset();
                }
            }

            draw() {
                particlesCtx.beginPath();
                particlesCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particlesCtx.fillStyle = `rgba(167, 139, 250, ${this.opacity})`;
                particlesCtx.fill();
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        let mouseX = particlesCanvas.width / 2;
        let mouseY = particlesCanvas.height / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            particles.forEach(particle => {
                const dx = mouseX - particle.x;
                const dy = mouseY - particle.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    particle.vx -= (dx / dist) * force * 0.2;
                    particle.vy -= (dy / dist) * force * 0.2;
                }
            });
        });
    </script>
</body>
</html>
