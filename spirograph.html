<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="resetDraw()">Clear</button>
  <button class="btn" onclick="R=50+Math.random()*100;r=10+Math.random()*50;d=20+Math.random()*80;resetDraw()">Random</button>
  <button class="btn" onclick="preset1()">Preset 1</button>
  <button class="btn" onclick="preset2()">Preset 2</button>
  <button class="btn" onclick="preset3()">Preset 3</button>
  <button class="btn" onclick="hueSpeed*=2">Faster Hue</button>
  <button class="btn" onclick="hueSpeed/=2">Slower Hue</button>
  <button class="btn" onclick="exportPNG()">Export</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;resetDraw()}
addEventListener('resize',resize);

let R=100,r=37,d=70,t=0,hueSpeed=1,steps=0;

function preset1(){R=100;r=37;d=70;resetDraw()}
function preset2(){R=80;r=56;d=60;resetDraw()}
function preset3(){R=120;r=29;d=100;resetDraw()}

function resetDraw(){
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  t=0;steps=0;
}

function spiroPoint(t){
  const x=(R-r)*Math.cos(t)+d*Math.cos((R-r)/r*t);
  const y=(R-r)*Math.sin(t)-d*Math.sin((R-r)/r*t);
  return{x:W/2+x,y:H/2+y};
}

function draw(){
  const speed=50;
  ctx.beginPath();
  let prev=spiroPoint(t);
  ctx.moveTo(prev.x,prev.y);
  for(let i=0;i<speed;i++){
    t+=.02;steps++;
    const p=spiroPoint(t);
    const hue=(t*hueSpeed*10)%360;
    ctx.strokeStyle=`hsla(${hue},70%,55%,.8)`;
    ctx.beginPath();ctx.moveTo(prev.x,prev.y);ctx.lineTo(p.x,p.y);
    ctx.lineWidth=1.5;ctx.stroke();
    prev=p;
  }
  document.getElementById('stats').textContent=`R=${R} r=${r} d=${d} · ${steps} steps`;
}

function exportPNG(){const a=document.createElement('a');a.download='spirograph.png';a.href=canvas.toDataURL();a.click()}

resetDraw();
function loop(){draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
</html>
