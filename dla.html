<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffusion Limited Aggregation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="resetSim()">Reset</button>
  <button class="btn" onclick="addSeed('center')">Center Seed</button>
  <button class="btn" onclick="addSeed('line')">Bottom Line</button>
  <button class="btn" onclick="addSeed('circle')">Circle</button>
  <button class="btn" onclick="addSeed('random')">Random Seeds</button>
  <button class="btn" onclick="speed*=2">Faster</button>
  <button class="btn" onclick="speed=Math.max(10,speed/2)">Slower</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%3">Color Mode</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;resetSim()}
addEventListener('resize',resize);

let grid,walkers,speed=500,colorMode=0;
let cx,cy,maxDist=0;

function resetSim(){
  cx=W/2;cy=H/2;
  grid=new Uint8Array(W*H);
  walkers=[];
  maxDist=1;
  addSeed('center');
}

function addSeed(type){
  if(type==='center'){
    const i=Math.floor(cy)*W+Math.floor(cx);
    grid[i]=1;
  }else if(type==='line'){
    for(let x=0;x<W;x++){grid[(H-1)*W+x]=1}
  }else if(type==='circle'){
    const r=Math.min(W,H)*.3;
    for(let a=0;a<Math.PI*2;a+=.01){
      const x=Math.floor(cx+Math.cos(a)*r);
      const y=Math.floor(cy+Math.sin(a)*r);
      if(x>=0&&x<W&&y>=0&&y<H)grid[y*W+x]=1;
    }
  }else if(type==='random'){
    for(let i=0;i<20;i++){
      const x=Math.floor(Math.random()*W);
      const y=Math.floor(Math.random()*H);
      grid[y*W+x]=1;
    }
  }
}

function spawnWalker(){
  // Spawn on a circle around center
  const r=Math.max(W,H)*.6;
  const a=Math.random()*Math.PI*2;
  return{x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r};
}

function isFixed(x,y){
  if(x<0||x>=W||y<0||y>=H)return false;
  const i=Math.floor(y)*W+Math.floor(x);
  return grid[i]===1;
}

function hasNeighbor(x,y){
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    if(dx===0&&dy===0)continue;
    const nx=Math.floor(x)+dx,ny=Math.floor(y)+dy;
    if(nx>=0&&nx<W&&ny>=0&&ny<H&&grid[ny*W+nx])return true;
  }
  return false;
}

function step(){
  // Spawn walkers
  while(walkers.length<200)walkers.push(spawnWalker());

  for(let i=walkers.length-1;i>=0;i--){
    const w=walkers[i];
    // Random walk
    w.x+=(Math.random()-.5)*4;
    w.y+=(Math.random()-.5)*4;

    const ix=Math.floor(w.x),iy=Math.floor(w.y);

    // Check bounds
    if(ix<0||ix>=W||iy<0||iy>=H||Math.hypot(w.x-cx,w.y-cy)>Math.max(W,H)*.7){
      walkers[i]=spawnWalker();continue;
    }

    // Check if adjacent to fixed particle
    if(hasNeighbor(w.x,w.y)){
      grid[iy*W+ix]=1;
      const dist=Math.hypot(w.x-cx,w.y-cy);
      if(dist>maxDist)maxDist=dist;
      walkers.splice(i,1);
    }
  }
}

function draw(){
  const imgData=ctx.createImageData(W,H);
  const d=imgData.data;
  let count=0;

  // Draw grid (fixed particles)
  for(let i=0;i<W*H;i++){
    if(!grid[i])continue;
    count++;
    const x=i%W,y=Math.floor(i/W);
    const dist=Math.hypot(x-cx,y-cy);
    const ratio=dist/(maxDist||1);
    let r,g,b;
    if(colorMode===0){
      // Purple to cyan gradient
      r=50+ratio*150;g=100+ratio*80;b=200-ratio*100;
    }else if(colorMode===1){
      // Fire
      r=255;g=200-ratio*150;b=50-ratio*50;
    }else{
      // Rainbow
      const hue=ratio*360;
      r=128+127*Math.sin(hue*.017);
      g=128+127*Math.sin(hue*.017+2.09);
      b=128+127*Math.sin(hue*.017+4.19);
    }
    const idx=i*4;
    d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=255;
  }

  ctx.putImageData(imgData,0,0);

  // Draw walkers (semi-transparent)
  ctx.fillStyle='rgba(255,255,255,.1)';
  walkers.forEach(w=>{
    ctx.fillRect(Math.floor(w.x),Math.floor(w.y),2,2);
  });

  document.getElementById('stats').textContent=`${count} particles · ${walkers.length} walkers · radius: ${Math.round(maxDist)}px`;
}

function loop(){
  for(let i=0;i<speed;i++)step();
  draw();
  requestAnimationFrame(loop);
}

resetSim();
requestAnimationFrame(loop);
</script>
</body>
</html>
