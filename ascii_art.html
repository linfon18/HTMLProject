<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Art Converter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.top{padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.top h1{font-size:1rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:7px 14px;border-radius:8px;font-size:.75rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.btn.primary{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);color:#a78bfa}
label{font-size:.68rem;color:var(--t3)}
input[type=range]{width:80px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--t3);min-width:24px}
select{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:.75rem;padding:7px 12px;font-family:inherit;outline:none}
select option{background:#1a1a2e}
input[type=file]{display:none}
.main{display:flex;gap:0;min-height:calc(100vh - 56px)}
.left{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;border-right:1px solid var(--border)}
.left canvas{max-width:100%;max-height:70vh;border-radius:8px}
.left .drop-zone{
  width:100%;max-width:400px;padding:60px 24px;border-radius:12px;
  border:2px dashed var(--border);text-align:center;cursor:pointer;
  transition:all .2s;
}
.left .drop-zone:hover{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.03)}
.left .drop-zone p{font-size:.85rem;color:var(--t3);margin-top:8px}
.left .drop-zone .icon{font-size:2rem}
.right{flex:1;padding:24px;overflow:auto;display:flex;flex-direction:column}
.ascii-output{
  flex:1;font-family:'Space Mono',monospace;font-size:8px;line-height:8px;
  letter-spacing:0;white-space:pre;overflow:auto;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:8px;padding:12px;color:var(--t1);
}
.ascii-output.color{font-size:7px;line-height:7px}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>
<div class="top">
  <h1>ASCII Art Converter</h1>
  <button class="btn primary" onclick="document.getElementById('fileInput').click()">Load Image</button>
  <input type="file" id="fileInput" accept="image/*">
  <button class="btn" onclick="copyASCII()">Copy ASCII</button>
  <button class="btn" onclick="downloadASCII()">Download</button>
</div>
<div class="main">
  <div class="left">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📷</div>
      <p>Click or drop an image here</p>
    </div>
    <canvas id="preview" style="display:none"></canvas>
  </div>
  <div class="right">
    <div class="controls">
      <label>Width</label><input type="range" id="width" min="20" max="200" value="100"><span class="val" id="widthV">100</span>
      <label>Contrast</label><input type="range" id="contrast" min="-100" max="100" value="0"><span class="val" id="contrastV">0</span>
      <label>Brightness</label><input type="range" id="brightness" min="-100" max="100" value="0"><span class="val" id="brightnessV">0</span>
      <select id="charset">
        <option value="standard">Standard</option>
        <option value="blocks">Blocks</option>
        <option value="detailed">Detailed</option>
        <option value="simple">Simple</option>
      </select>
      <select id="colorMode">
        <option value="bw">Black & White</option>
        <option value="color">Color (HTML)</option>
      </select>
      <label>Invert<input type="checkbox" id="invert"></label>
    </div>
    <pre class="ascii-output" id="output">Load an image to convert to ASCII art</pre>
  </div>
</div>

<script>
const charsets={
  standard:'@%#*+=-:. ',
  blocks:'█▓▒░ ',
  detailed:'$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^\'. ',
  simple:'@#=-. '
};

let imgData=null,imgW=0,imgH=0;
const canvas=document.getElementById('preview');
const ctx=canvas.getContext('2d');

document.getElementById('fileInput').addEventListener('change',e=>loadFile(e.target.files[0]));
document.getElementById('dropZone').addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.style.borderColor='rgba(139,92,246,.5)'});
document.getElementById('dropZone').addEventListener('dragleave',e=>{e.currentTarget.style.borderColor=''});
document.getElementById('dropZone').addEventListener('drop',e=>{e.preventDefault();loadFile(e.dataTransfer.files[0])});

function loadFile(file){
  if(!file)return;
  const img=new Image();
  img.onload=()=>{
    canvas.style.display='block';document.getElementById('dropZone').style.display='none';
    canvas.width=img.width;canvas.height=img.height;
    ctx.drawImage(img,0,0);
    imgData=ctx.getImageData(0,0,img.width,img.height);
    imgW=img.width;imgH=img.height;
    convert();
  };
  img.src=URL.createObjectURL(file);
}

function convert(){
  if(!imgData)return;
  const asciiW=+document.getElementById('width').value;
  const contrast=+document.getElementById('contrast').value;
  const brightness=+document.getElementById('brightness').value;
  const charset=charsets[document.getElementById('charset').value];
  const colorMode=document.getElementById('colorMode').value;
  const invert=document.getElementById('invert').checked;

  const ratio=imgH/imgW*.5;
  const asciiH=Math.round(asciiW*ratio);
  const scaleX=imgW/asciiW,scaleY=imgH/asciiH;

  let html='';
  const d=imgData.data;

  for(let y=0;y<asciiH;y++){
    for(let x=0;x<asciiW;x++){
      const px=Math.floor(x*scaleX),py=Math.floor(y*scaleY);
      const idx=(py*imgW+px)*4;
      let r=d[idx],g=d[idx+1],b=d[idx+2];

      // Apply contrast & brightness
      const factor=(259*(contrast+255))/(255*(259-contrast));
      r=Math.min(255,Math.max(0,factor*(r-128)+128+brightness));
      g=Math.min(255,Math.max(0,factor*(g-128)+128+brightness));
      b=Math.min(255,Math.max(0,factor*(b-128)+128+brightness));

      let gray=.299*r+.587*g+.114*b;
      if(invert)gray=255-gray;

      const charIdx=Math.floor(gray/255*(charset.length-1));
      const ch=charset[charIdx];

      if(colorMode==='color'){
        html+=`<span style="color:rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})">${ch}</span>`;
      }else{
        html+=ch;
      }
    }
    html+='\n';
  }

  const output=document.getElementById('output');
  if(colorMode==='color'){output.innerHTML=html;output.classList.add('color')}
  else{output.textContent=html;output.classList.remove('color')}

  // Auto-size
  const maxW=output.clientWidth-24;
  const fontSize=Math.max(4,Math.min(12,Math.floor(maxW/asciiW)));
  output.style.fontSize=fontSize+'px';
  output.style.lineHeight=fontSize+'px';
}

document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>{vEl.textContent=s.value;convert()});
});
document.getElementById('charset').addEventListener('change',convert);
document.getElementById('colorMode').addEventListener('change',convert);
document.getElementById('invert').addEventListener('change',convert);

function copyASCII(){
  const text=document.getElementById('output').textContent;
  navigator.clipboard.writeText(text);
}
function downloadASCII(){
  const text=document.getElementById('output').textContent;
  const a=document.createElement('a');
  a.download='ascii-art.txt';
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.click();
}
</script>
</body>
</html>
