<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life - Extended</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;font-family:'Space Grotesk',sans-serif}
canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.btn.active{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.25);color:#4ade80}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn active" id="playBtn" onclick="playing=!playing;playBtn.classList.toggle('active')">Running</button>
  <button class="btn" onclick="stepOnce()">Step</button>
  <button class="btn" onclick="randomize()">Random</button>
  <button class="btn" onclick="grid=new Uint8Array(W*H);gen=0">Clear</button>
  <button class="btn" onclick="speed=Math.min(60,speed+5)">Faster</button>
  <button class="btn" onclick="speed=Math.max(1,speed-5)">Slower</button>
  <button class="btn" onclick="cellSize=cellSize===3?6:cellSize===6?10:3;resize()">Zoom</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cols,rows,cellSize=3;
let grid,nextGrid,gen=0,playing=true,speed=30;
let drawMode=false;

function resize(){
  cols=Math.floor(innerWidth/cellSize);
  rows=Math.floor(innerHeight/cellSize);
  W=canvas.width=cols*cellSize;
  H=canvas.height=rows*cellSize;
  const oldGrid=grid;
  grid=new Uint8Array(cols*rows);
  nextGrid=new Uint8Array(cols*rows);
  if(oldGrid){
    const oldCols=Math.sqrt(oldGrid.length)|0;
    for(let y=0;y<Math.min(rows,oldCols);y++)for(let x=0;x<Math.min(cols,oldCols);x++){
      grid[y*cols+x]=oldGrid[y*oldCols+x]||0;
    }
  }
}
addEventListener('resize',resize);

function randomize(){
  for(let i=0;i<grid.length;i++)grid[i]=Math.random()>.75?1:0;
  gen=0;
}

function stepOnce(){
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    let n=0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      if(dx===0&&dy===0)continue;
      n+=grid[((y+dy+rows)%rows)*cols+(x+dx+cols)%cols];
    }
    const i=y*cols+x;
    if(grid[i])nextGrid[i]=(n===2||n===3)?1:0;
    else nextGrid[i]=n===3?1:0;
  }
  [grid,nextGrid]=[nextGrid,grid];
  gen++;
}

canvas.addEventListener('mousedown',e=>{
  drawMode=true;
  const cx=Math.floor(e.clientX/cellSize),cy=Math.floor(e.clientY/cellSize);
  if(cx>=0&&cx<cols&&cy>=0&&cy<rows)grid[cy*cols+cx]=grid[cy*cols+cx]?0:1;
});
canvas.addEventListener('mousemove',e=>{
  if(!drawMode)return;
  const cx=Math.floor(e.clientX/cellSize),cy=Math.floor(e.clientY/cellSize);
  if(cx>=0&&cx<cols&&cy>=0&&cy<rows){
    for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
      const nx=cx+dx,ny=cy+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows)grid[ny*cols+nx]=1;
    }
  }
});
canvas.addEventListener('mouseup',()=>drawMode=false);

function draw(){
  const imgData=ctx.createImageData(W,H);
  const data=imgData.data;
  const cw=cellSize;

  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const alive=grid[y*cols+x];
    for(let dy=0;dy<cw;dy++)for(let dx=0;dx<cw;dx++){
      const idx=((y*cw+dy)*W+x*cw+dx)*4;
      if(alive){
        // Color based on age (approximate with position)
        const hue=(x+y+gen*.5)%360;
        data[idx]=20+Math.sin(hue*.017)*35|0;
        data[idx+1]=30+Math.sin(hue*.017+2)*30|0;
        data[idx+2]=50+Math.sin(hue*.017+4)*40|0;
      }else{
        data[idx]=5;data[idx+1]=5;data[idx+2]=8;
      }
      data[idx+3]=255;
    }
  }
  ctx.putImageData(imgData,0,0);
}

let lastFrame=0;
function loop(t){
  if(playing&&t-lastFrame>1000/speed){
    stepOnce();
    lastFrame=t;
  }
  draw();
  let alive=0;for(let i=0;i<grid.length;i++)if(grid[i])alive++;
  document.getElementById('stats').textContent=`Gen: ${gen} · Alive: ${alive} · ${cols}x${rows} · ${speed} fps`;
  requestAnimationFrame(loop);
}

resize();randomize();
requestAnimationFrame(loop);
</script>
</body>
</html>
