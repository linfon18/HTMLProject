<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSP Genetic Algorithm</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.top{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.top h1{font-size:.85rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
label{font-size:.62rem;color:var(--t3)}
input[type=range]{width:60px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3)}
.main{flex:1;display:flex;overflow:hidden}
canvas{flex:1;display:block}
.sidebar{width:240px;border-left:1px solid var(--border);padding:12px;overflow-y:auto;font-size:.72rem}
.sidebar h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:12px 0 6px}
.sidebar h3:first-child{margin-top:0}
.stat{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.stat label{color:var(--t3);font-size:.62rem}
.stat .v{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--t1)}
</style>
</head>
<body>
<div class="top">
  <h1>TSP · Genetic Algorithm</h1>
  <label>Cities</label><input type="range" id="cities" min="10" max="200" value="40"><span class="val" id="citiesV">40</span>
  <label>Pop</label><input type="range" id="pop" min="50" max="1000" value="200"><span class="val" id="popV">200</span>
  <label>Mutation</label><input type="range" id="mut" min="1" max="50" value="5"><span class="val" id="mutV">5%</span>
  <button class="btn" onclick="initGA()">New Problem</button>
  <button class="btn" id="playBtn" onclick="running=!running;playBtn.textContent=running?'Pause':'Resume'">Pause</button>
</div>
<div class="main">
  <canvas id="c"></canvas>
  <div class="sidebar">
    <h3>Statistics</h3>
    <div class="stat"><label>Generation</label><span class="v" id="gen">0</span></div>
    <div class="stat"><label>Best Distance</label><span class="v" id="bestDist">∞</span></div>
    <div class="stat"><label>Avg Distance</label><span class="v" id="avgDist">∞</span></div>
    <div class="stat"><label>Worst Distance</label><span class="v" id="worstDist">∞</span></div>
    <div class="stat"><label>Improvement</label><span class="v" id="improve">-</span></div>
    <h3>Progress</h3>
    <canvas id="chart" width="210" height="100" style="border-radius:6px;background:rgba(0,0,0,.2)"></canvas>
    <h3>Best Route</h3>
    <div id="routeInfo" style="font-size:.62rem;color:var(--t3);font-family:'Space Mono',monospace;line-height:1.8;max-height:200px;overflow-y:auto"></div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const chartCanvas=document.getElementById('chart');
const chartCtx=chartCanvas.getContext('2d');
let W,H;

function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight}
addEventListener('resize',resize);

let cities=[],population=[],gen=0,running=true;
let bestEver=Infinity,bestRoute=null;
let history=[];

function initGA(){
  const n=+document.getElementById('cities').value;
  cities=[];history=[];gen=0;bestEver=Infinity;bestRoute=null;
  const pad=40;
  for(let i=0;i<n;i++)cities.push({x:pad+Math.random()*(W-pad*2),y:pad+Math.random()*(H-pad*2)});

  const popSize=+document.getElementById('pop').value;
  population=[];
  const base=Array.from({length:n},(_,i)=>i);
  for(let i=0;i<popSize;i++){
    const route=base.slice();
    for(let j=n-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[route[j],route[k]]=[route[k],route[j]]}
    population.push(route);
  }
}

function dist(route){
  let d=0;
  for(let i=0;i<route.length;i++){
    const a=cities[route[i]],b=cities[route[(i+1)%route.length]];
    d+=Math.hypot(a.x-b.x,a.y-b.y);
  }
  return d;
}

function evolve(){
  const popSize=population.length;
  const mutRate=+document.getElementById('mut').value/100;

  // Evaluate
  const scored=population.map(r=>({route:r,dist:dist(r)}));
  scored.sort((a,b)=>a.dist-b.dist);

  if(scored[0].dist<bestEver){bestEver=scored[0].dist;bestRoute=scored[0].route.slice()}
  history.push(bestEver);
  if(history.length>200)history.shift();

  // Selection (tournament)
  function tournament(k=5){
    let best=null;
    for(let i=0;i<k;i++){
      const c=scored[Math.floor(Math.random()*scored.length)];
      if(!best||c.dist<best.dist)best=c;
    }
    return best.route;
  }

  // Crossover (ordered)
  function crossover(p1,p2){
    const n=p1.length;
    const start=Math.floor(Math.random()*n);
    const end=start+Math.floor(Math.random()*n);
    const child=new Array(n).fill(-1);
    for(let i=start;i<end&&i<n;i++)child[i%n]=p1[i%n];
    let pos=0;
    for(let i=0;i<n;i++){
      if(child.includes(p2[i]))continue;
      while(child[pos]!==-1)pos++;
      child[pos]=p2[i];
    }
    return child;
  }

  // Mutate (swap)
  function mutate(route){
    const r=route.slice();
    if(Math.random()<mutRate){
      const i=Math.floor(Math.random()*r.length);
      const j=Math.floor(Math.random()*r.length);
      [r[i],r[j]]=[r[j],r[i]];
    }
    // 2-opt improvement
    if(Math.random()<.3){
      const i=Math.floor(Math.random()*r.length);
      const j=(i+2+Math.floor(Math.random()*(r.length-3)))%r.length;
      const [si,ei]=i<j?[i,j]:[j,i];
      r.splice(si,ei-si+1,...r.slice(si,ei+1).reverse());
    }
    return r;
  }

  // New population
  const newPop=[scored[0].route.slice()]; // Elitism
  while(newPop.length<popSize){
    const p1=tournament(),p2=tournament();
    newPop.push(mutate(crossover(p1,p2)));
  }
  population=newPop;
  gen++;
}

function draw(){
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);

  // Best route
  if(bestRoute){
    ctx.beginPath();
    ctx.moveTo(cities[bestRoute[0]].x,cities[bestRoute[0]].y);
    for(let i=1;i<bestRoute.length;i++)ctx.lineTo(cities[bestRoute[i]].x,cities[bestRoute[i]].y);
    ctx.closePath();
    ctx.strokeStyle='rgba(139,92,246,.4)';ctx.lineWidth=1.5;ctx.stroke();
  }

  // Cities
  cities.forEach((c,i)=>{
    ctx.beginPath();ctx.arc(c.x,c.y,4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
  });

  // Stats
  document.getElementById('gen').textContent=gen;
  document.getElementById('bestDist').textContent=Math.round(bestEver);

  const scores=population.map(dist);
  const avg=scores.reduce((a,b)=>a+b)/scores.length;
  const worst=Math.max(...scores);
  document.getElementById('avgDist').textContent=Math.round(avg);
  document.getElementById('worstDist').textContent=Math.round(worst);
  if(history.length>1)document.getElementById('improve').textContent=((1-bestEver/history[0])*100).toFixed(1)+'%';

  // Chart
  chartCtx.fillStyle='#0a0a10';chartCtx.fillRect(0,0,210,100);
  if(history.length>1){
    const min=Math.min(...history),max=Math.max(...history);
    chartCtx.beginPath();
    history.forEach((v,i)=>{
      const x=i/history.length*200+5;
      const y=90-((v-min)/(max-min||1))*80;
      if(i===0)chartCtx.moveTo(x,y);else chartCtx.lineTo(x,y);
    });
    chartCtx.strokeStyle='rgba(139,92,246,.6)';chartCtx.lineWidth=1.5;chartCtx.stroke();
    chartCtx.fillStyle='rgba(255,255,255,.2)';chartCtx.font='9px Space Mono';
    chartCtx.fillText(Math.round(min),5,15);
    chartCtx.fillText(Math.round(max),5,95);
  }
}

function loop(){
  if(running)for(let i=0;i<10;i++)evolve();
  draw();
  requestAnimationFrame(loop);
}

document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>vEl.textContent=s.id==='mut'?s.value+'%':s.value);
});

resize();
initGA();
requestAnimationFrame(loop);
</script>
</body>
</html>
