<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARGANTUA Reference & Test Gallery</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#03060b;color:#eafaff;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 10%,rgba(127,220,255,.16),transparent 34%),radial-gradient(circle at 80% 15%,rgba(255,180,84,.12),transparent 28%),linear-gradient(180deg,#03060b,#000);z-index:-1}.wrap{width:min(1440px,calc(100% - 32px));margin:0 auto;padding:40px 0 56px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:26px}.eyebrow{color:#ffb454;letter-spacing:.22em;font-size:12px}.title{margin:8px 0 0;font-size:clamp(28px,5vw,64px);letter-spacing:.16em}.desc{max-width:780px;color:rgba(234,250,255,.72);line-height:1.7}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{color:#7fdcff;text-decoration:none;border:1px solid rgba(127,220,255,.35);padding:11px 13px;background:rgba(127,220,255,.06)}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:22px 0}.stat{border:1px solid rgba(127,220,255,.25);background:rgba(5,14,24,.62);padding:16px}.stat b{display:block;font-size:28px;color:#fff}.stat span{display:block;margin-top:6px;color:rgba(127,220,255,.7);font-size:12px;letter-spacing:.12em}.section{margin-top:34px}.section h2{font-size:18px;letter-spacing:.16em;color:#ffb454;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}.card{display:block;color:inherit;text-decoration:none;border:1px solid rgba(127,220,255,.18);background:rgba(3,8,14,.68);overflow:hidden;transition:.18s transform,.18s border-color}.card:hover{transform:translateY(-3px);border-color:rgba(255,180,84,.75)}.card img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;background:#000}.cap{padding:10px 12px;color:rgba(234,250,255,.82);font-size:12px;word-break:break-all}.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}.item{color:rgba(234,250,255,.82);text-decoration:none;border:1px solid rgba(127,220,255,.16);background:rgba(127,220,255,.045);padding:10px 11px;word-break:break-all}.item:hover{border-color:#ffb454;color:#fff}@media(max-width:780px){.top{display:block}.actions{margin-top:18px}.wrap{width:min(100% - 20px,1440px);padding-top:24px}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">REFERENCE / TEST ASSETS</div>
      <h1 class="title">GARGANTUA LAB</h1>
      <p class="desc">这里收录 GARGANTUA 参考工程的视觉验收截图、调试视图、自动化测试脚本、JSON任务和 v1 备份入口，用来追踪黑洞光追从甜甜圈版本到参考工程版的迭代过程。</p>
    </div>
    <div class="actions">
      <a class="btn" href="./gargantua.html">打开正式入口</a>
      <a class="btn" href="./gargantua/index.html">打开参考工程</a>
      <a class="btn" href="./gargantua_test/gargantua_v1_backup/index.html">打开 v1 备份</a>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><b id="imgCount">0</b><span>PNG Screenshots</span></div>
    <div class="stat"><b id="scriptCount">0</b><span>Python Scripts</span></div>
    <div class="stat"><b id="jsonCount">0</b><span>JSON Jobs</span></div>
    <div class="stat"><b>1</b><span>Backup Build</span></div>
  </div>
  <section class="section">
    <h2>视觉截图</h2>
    <div class="grid" id="shots"></div>
  </section>
  <section class="section">
    <h2>测试脚本</h2>
    <div class="list" id="scripts"></div>
  </section>
  <section class="section">
    <h2>JSON 任务</h2>
    <div class="list" id="jobs"></div>
  </section>
</main>
<script>
const images=['badq.png','bg0.png','bg1.png','bg2s.png','bloom_live_dbg0_back.png','bloom_live_dbg0_custom.png','bloom_live_dbg3.png','bloom_live_dbg6.png','bloom_live_dbg9.png','bloom_v1_dbg0.png','bloom_v1_dbg3.png','bloom_v2_dbg0.png','bloom_v2_dbg3.png','close460.png','ctime0.png','ctime20.png','dbg1.png','dbg2.png','dbg2_200.png','dbg2_460.png','dbg2_boost.png','dbg3.png','dbg3_460.png','dbg4.png','dbg5.png','dbg6.png','dbg7.png','dbg8.png','dbg9.png','edge460.png','edge_plus.png','final_cine_1920.png','final_edge_1920.png','final_poster_1440.png','mobile.png','mobile2.png','polar460.png','poster.png','poster460.png','probe.png','probe_boost.png','shot_close_cine.png','shot_edge_std.png','shot_polar_high.png','shot_poster_cine.png','shot_poster_dbg3.png','shot_poster_dbg6.png','shot_poster_dbg9.png','v2_edge_1920.png','v2_mobile_390.png','v2_mobile_params.png','v2_poster_1440.png'];
const scripts=['dragtest.py','func.py','hinttest.py','hit.py','probe.py','quick.py','shot.py','touch.py','v2_audio.py','v2_bloom.py','v2_bloom2.py','v2_common.py','v2_f5_probe.py','v2_logic.py','v2_mobile.py','v2_renderfault.py','v2_shots.py','v2_visual.py','v2_webgl.py'];
const jobs=['bgjob.json','jobs1.json','jobs2.json','jobs3.json','jobs4.json','jobs5.json','jobs6.json','jobs7.json','jobs8.json','sign.json'];
const shotRoot=document.getElementById('shots');
const scriptRoot=document.getElementById('scripts');
const jobRoot=document.getElementById('jobs');
document.getElementById('imgCount').textContent=images.length;
document.getElementById('scriptCount').textContent=scripts.length;
document.getElementById('jsonCount').textContent=jobs.length;
shotRoot.innerHTML=images.map(name=>`<a class="card" href="./gargantua_test/${name}" target="_blank"><img src="./gargantua_test/${name}" loading="lazy" alt="${name}"><div class="cap">${name}</div></a>`).join('');
scriptRoot.innerHTML=scripts.map(name=>`<a class="item" href="./gargantua_test/${name}" target="_blank">${name}</a>`).join('');
jobRoot.innerHTML=jobs.map(name=>`<a class="item" href="./gargantua_test/${name}" target="_blank">${name}</a>`).join('');
</script>
</body>
</html>
