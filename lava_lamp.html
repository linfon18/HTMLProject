<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Lamp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="hue=(hue+60)%360">Color</button>
  <button class="btn" onclick="blobCount=Math.min(30,blobCount+3)">More Blobs</button>
  <button class="btn" onclick="blobCount=Math.max(3,blobCount-3)">Fewer Blobs</button>
  <button class="btn" onclick="gravity_*=1.5">Faster Rise</button>
  <button class="btn" onclick="gravity_/=1.5">Slower Rise</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let blobs=[],blobCount=12,hue=0,gravity_=.02;

class Blob{
  constructor(){
    this.x=W*.3+Math.random()*W*.4;
    this.y=Math.random()*H;
    this.r=30+Math.random()*50;
    this.vy=(Math.random()-.5)*.5;
    this.vx=0;
    this.phase=Math.random()*Math.PI*2;
    this.speed=.01+Math.random()*.02;
  }
  update(){
    // Buoyancy: rise when at bottom, sink when at top
    const targetVy=-(this.y/H-.5)*gravity_*200;
    this.vy+=(targetVy-this.vy)*.01;
    this.vx+=Math.sin(Date.now()*.001+this.phase)*.02;
    this.vx*=.98;this.vy*=.98;
    this.x+=this.vx;this.y+=this.vy;
    this.r+=Math.sin(Date.now()*this.speed)*.2;
    this.r=Math.max(20,Math.min(80,this.r));
    // Keep in bounds
    if(this.x<this.r)this.x=this.r;
    if(this.x>W-this.r)this.x=W-this.r;
  }
}

for(let i=0;i<blobCount;i++)blobs.push(new Blob());

function loop(){
  ctx.fillStyle='rgba(5,5,8,.05)';ctx.fillRect(0,0,W,H);

  // Lava lamp container outline
  const lampW=W*.35,lampX=(W-lampW)/2;
  ctx.fillStyle='rgba(255,255,255,.01)';
  ctx.fillRect(lampX,20,lampW,H-40);

  // Update blobs
  while(blobs.length<blobCount)blobs.push(new Blob());
  while(blobs.length>blobCount)blobs.pop();
  blobs.forEach(b=>b.update());

  // Draw metaball-like blobs
  const scale=4;
  const cols=Math.ceil(W/scale),rows=Math.ceil(H/scale);
  const imgData=ctx.createImageData(cols,rows);
  const d=imgData.data;

  for(let py=0;py<rows;py++)for(let px=0;px<cols;px++){
    const x=px*scale,y=py*scale;
    let sum=0;
    blobs.forEach(b=>{
      const dist=Math.hypot(b.x-x,b.y-y);
      sum+=b.r*b.r/(dist*dist+1);
    });
    const v=Math.min(1,sum*.02);
    const idx=(py*cols+px)*4;
    if(v>.3){
      const t=(v-.3)/.7;
      d[idx]=Math.sin(hue/360*Math.PI*2)*t*255*.6+t*200;
      d[idx+1]=Math.sin((hue+120)/360*Math.PI*2)*t*200*.5+t*50;
      d[idx+2]=Math.sin((hue+240)/360*Math.PI*2)*t*255*.7+t*80;
      d[idx+3]=255*t;
    }else{d[idx+3]=0}
  }

  const tmpC=document.createElement('canvas');tmpC.width=cols;tmpC.height=rows;
  tmpC.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpC,0,0,W,H);

  // Lamp glass effect
  const g=ctx.createLinearGradient(lampX,0,lampX+lampW,0);
  g.addColorStop(0,'rgba(255,255,255,.03)');g.addColorStop(.5,'rgba(255,255,255,.01)');g.addColorStop(1,'rgba(255,255,255,.03)');
  ctx.fillStyle=g;ctx.fillRect(lampX,20,lampW,H-40);

  document.getElementById('stats').textContent=`${blobs.length} blobs · hue ${hue}`;
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
