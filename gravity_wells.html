<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Wells</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="spawnParticles(100)">Spawn 100</button>
  <button class="btn" onclick="addWell()">Add Well</button>
  <button class="btn" onclick="wells=[];particles=[];ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H)">Clear</button>
  <button class="btn" onclick="presetOrbit()">Orbit System</button>
  <button class="btn" onclick="trailMode=!trailMode">Trails</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let wells=[],particles=[],trailMode=false,dragging=null;

function addWell(){
  wells.push({x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*300,mass:500+Math.random()*2000});
}

function presetOrbit(){
  wells=[{x:W/2,y:H/2,mass:3000},{x:W/2+200,y:H/2,mass:800},{x:W/2-150,y:H/2+100,mass:600}];
  particles=[];
  spawnParticles(200);
}

function spawnParticles(n){
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*3;
    particles.push({
      x:W/2+(Math.random()-.5)*W*.8,
      y:H/2+(Math.random()-.5)*H*.8,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:300+Math.random()*300,
      hue:Math.random()*360,
      trail:[]
    });
  }
}

canvas.addEventListener('mousedown',e=>{
  dragging=wells.find(w=>Math.hypot(w.x-e.clientX,w.y-e.clientY)<20);
  if(!dragging){
    wells.push({x:e.clientX,y:e.clientY,mass:1000+Math.random()*1000});
    spawnParticles(30);
  }
});
canvas.addEventListener('mousemove',e=>{if(dragging){dragging.x=e.clientX;dragging.y=e.clientY}});
canvas.addEventListener('mouseup',()=>dragging=null);

resize();
presetOrbit();

function loop(){
  ctx.fillStyle=trailMode?'rgba(5,5,8,.02)':'rgba(5,5,8,.12)';
  ctx.fillRect(0,0,W,H);

  // Draw wells
  wells.forEach(w=>{
    const r=Math.sqrt(w.mass)*.5;
    const g=ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,r*2);
    g.addColorStop(0,'rgba(139,92,246,.3)');g.addColorStop(.5,'rgba(139,92,246,.1)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(w.x,w.y,r*2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w.x,w.y,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fill();
  });

  // Update particles
  particles.forEach(p=>{
    wells.forEach(w=>{
      const dx=w.x-p.x,dy=w.y-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+10;
      const force=w.mass/(dist*dist);
      p.vx+=dx/dist*force*.1;p.vy+=dy/dist*force*.1;
    });

    p.vx*=.999;p.vy*=.999;
    p.x+=p.vx;p.y+=p.vy;
    p.life--;

    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>8)p.trail.shift();

    const speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    const hue=(p.hue+speed*10)%360;

    // Trail
    p.trail.forEach((t,i)=>{
      const alpha=p.life/300*(i/p.trail.length)*.5;
      ctx.beginPath();ctx.arc(t.x,t.y,1,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},70%,55%,${alpha})`;ctx.fill();
    });

    // Particle
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},70%,60%,${Math.min(1,p.life/100)})`;ctx.fill();
  });
  particles=particles.filter(p=>p.life>0&&p.x>-100&&p.x<W+100&&p.y>-100&&p.y<H+100);

  // Auto spawn
  if(particles.length<50)spawnParticles(20);

  document.getElementById('stats').textContent=`${wells.length} wells · ${particles.length} particles`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
