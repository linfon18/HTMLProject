<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Audio Synth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25);--accent:#8b5cf6}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
h1{font-size:1.3rem;font-weight:700;color:var(--t1);margin-bottom:24px}
.synth{display:flex;gap:8px;margin-bottom:24px;position:relative}
.white-key{
  width:48px;height:180px;border-radius:0 0 6px 6px;
  background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.2);
  cursor:pointer;transition:all .05s;position:relative;z-index:1;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;
  font-size:.6rem;color:rgba(0,0,0,.3);font-weight:600;
}
.white-key:hover{background:rgba(255,255,255,.95)}
.white-key.active{background:var(--accent);color:rgba(255,255,255,.8)}
.black-key{
  width:30px;height:110px;border-radius:0 0 4px 4px;
  background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.05);
  cursor:pointer;transition:all .05s;position:absolute;z-index:2;
  box-shadow:0 4px 8px rgba(0,0,0,.5);
}
.black-key:hover{background:rgba(30,30,45,.95)}
.black-key.active{background:var(--accent)}

.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;width:100%;max-width:600px}
.panel{padding:14px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid var(--border)}
.panel h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:.72rem}
.row label{color:var(--t3);font-size:.68rem}
input[type=range]{width:90px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--t2);min-width:28px;text-align:right}
select{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--t2);font-size:.72rem;padding:4px 8px;font-family:inherit;outline:none}
select option{background:#1a1a2e}
canvas{width:100%;max-width:600px;height:80px;border-radius:8px;margin-bottom:16px}
.hint{font-size:.68rem;color:var(--t3);margin-top:12px}
</style>
</head>
<body>
<h1>Web Audio Synth</h1>
<canvas id="scope"></canvas>
<div class="synth" id="keyboard"></div>
<div class="controls">
  <div class="panel">
    <h3>Oscillator</h3>
    <div class="row"><label>Wave</label><select id="wave"><option>sine</option><option>square</option><option>sawtooth</option><option>triangle</option></select></div>
    <div class="row"><label>Detune</label><input type="range" id="detune" min="-100" max="100" value="0"><span class="val" id="detuneV">0</span></div>
  </div>
  <div class="panel">
    <h3>Envelope</h3>
    <div class="row"><label>Attack</label><input type="range" id="attack" min="1" max="500" value="20"><span class="val" id="attackV">20ms</span></div>
    <div class="row"><label>Decay</label><input type="range" id="decay" min="1" max="1000" value="200"><span class="val" id="decayV">200ms</span></div>
    <div class="row"><label>Sustain</label><input type="range" id="sustain" min="0" max="100" value="60"><span class="val" id="sustainV">0.6</span></div>
    <div class="row"><label>Release</label><input type="range" id="release" min="1" max="2000" value="300"><span class="val" id="releaseV">300ms</span></div>
  </div>
  <div class="panel">
    <h3>Effects</h3>
    <div class="row"><label>Reverb</label><input type="range" id="reverb" min="0" max="100" value="30"><span class="val" id="reverbV">0.3</span></div>
    <div class="row"><label>Delay</label><input type="range" id="delay" min="0" max="100" value="0"><span class="val" id="delayV">0</span></div>
    <div class="row"><label>Volume</label><input type="range" id="volume" min="0" max="100" value="50"><span class="val" id="volumeV">0.5</span></div>
  </div>
</div>
<div class="hint">Click keys or use keyboard: A W S E D F T G Y H U J K O L P ;</div>

<script>
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FREQS=NOTES.map((_,i)=>440*Math.pow(2,(i-9)/12));
const WHITE=[0,2,4,5,7,9,11]; // C D E F G A B
const BLACK=[1,3,6,8,10]; // C# D# F# G# A#
const KEY_MAP=['a','w','s','e','d','f','t','g','y','h','u','j','k','o','l','p',';'];

let audioCtx,masterGain,analyser,convolver,delayNode;
const activeOscillators=new Map();

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=.5;
  analyser=audioCtx.createAnalyser();analyser.fftSize=2048;
  delayNode=audioCtx.createDelay(1);delayNode.delayTime.value=0;
  const delayFeedback=audioCtx.createGain();delayFeedback.gain.value=.3;
  const delayMix=audioCtx.createGain();delayMix.gain.value=0;
  const reverbGain=audioCtx.createGain();reverbGain.gain.value=.3;

  // Simple reverb via convolver
  convolver=audioCtx.createConvolver();
  const len=audioCtx.sampleRate*2;
  const impulse=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=impulse.getChannelData(ch);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  }
  convolver.buffer=impulse;

  masterGain.connect(analyser);analyser.connect(audioCtx.destination);
  masterGain.connect(convolver);convolver.connect(reverbGain);reverbGain.connect(audioCtx.destination);
  masterGain.connect(delayNode);delayNode.connect(delayFeedback);delayFeedback.connect(delayNode);
  delayNode.connect(delayMix);delayMix.connect(audioCtx.destination);

  window._reverbGain=reverbGain;
  window._delayMix=delayMix;
}

function playNote(noteIdx){
  initAudio();
  if(activeOscillators.has(noteIdx))return;
  const freq=FREQS[noteIdx%12]*(1+Math.floor(noteIdx/12)-4);
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type=document.getElementById('wave').value;
  osc.frequency.value=freq;
  osc.detune.value=+document.getElementById('detune').value;

  const a=+document.getElementById('attack').value/1000;
  const d=+document.getElementById('decay').value/1000;
  const s=+document.getElementById('sustain').value/100;
  const now=audioCtx.currentTime;
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(.4,now+a);
  gain.gain.linearRampToValueAtTime(.4*s,now+a+d);

  osc.connect(gain);gain.connect(masterGain);
  osc.start();
  activeOscillators.set(noteIdx,{osc,gain});
}

function stopNote(noteIdx){
  const entry=activeOscillators.get(noteIdx);
  if(!entry)return;
  const r=+document.getElementById('release').value/1000;
  const now=audioCtx.currentTime;
  entry.gain.gain.cancelScheduledValues(now);
  entry.gain.gain.setValueAtTime(entry.gain.gain.value,now);
  entry.gain.gain.linearRampToValueAtTime(0,now+r);
  entry.osc.stop(now+r+.1);
  activeOscillators.delete(noteIdx);
}

// Build keyboard
const kb=document.getElementById('keyboard');
const whiteNotes=[];
WHITE.forEach((ni,i)=>{
  const el=document.createElement('div');
  el.className='white-key';el.textContent=NOTES[ni];
  el.dataset.note=ni;
  el.addEventListener('mousedown',e=>{e.preventDefault();playNote(ni);el.classList.add('active')});
  el.addEventListener('mouseup',()=>{stopNote(ni);el.classList.remove('active')});
  el.addEventListener('mouseleave',()=>{stopNote(ni);el.classList.remove('active')});
  kb.appendChild(el);
  whiteNotes.push({el,left:i*50,width:48});
});

BLACK.forEach(ni=>{
  const el=document.createElement('div');
  el.className='black-key';
  const whiteIdx=ni===1?0:ni===3?1:ni===6?3:ni===8?4:5;
  el.style.left=(whiteIdx*50+34)+'px';
  el.dataset.note=ni;
  el.addEventListener('mousedown',e=>{e.preventDefault();playNote(ni);el.classList.add('active')});
  el.addEventListener('mouseup',()=>{stopNote(ni);el.classList.remove('active')});
  el.addEventListener('mouseleave',()=>{stopNote(ni);el.classList.remove('active')});
  kb.appendChild(el);
});

// Keyboard input
const keyDown=new Set();
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  const idx=KEY_MAP.indexOf(e.key.toLowerCase());
  if(idx>=0&&!keyDown.has(e.key)){
    keyDown.add(e.key);
    playNote(idx);
    const el=document.querySelector(`[data-note="${idx}"]`);
    if(el)el.classList.add('active');
  }
});
document.addEventListener('keyup',e=>{
  const idx=KEY_MAP.indexOf(e.key.toLowerCase());
  if(idx>=0){
    keyDown.delete(e.key);
    stopNote(idx);
    const el=document.querySelector(`[data-note="${idx}"]`);
    if(el)el.classList.remove('active');
  }
});

// Sliders
document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>{
    if(s.id==='attack'||s.id==='decay'||s.id==='release')vEl.textContent=s.value+'ms';
    else if(s.id==='sustain'||s.id==='reverb'||s.id==='delay'||s.id==='volume')vEl.textContent=(+s.value/100).toFixed(1);
    else vEl.textContent=s.value;
    if(s.id==='volume'&&masterGain)masterGain.gain.value=+s.value/100;
    if(s.id==='reverb'&&window._reverbGain)window._reverbGain.gain.value=+s.value/100;
    if(s.id==='delay'&&window._delayMix)window._delayMix.gain.value=+s.value/100;
    if(s.id==='delay'&&delayNode)delayNode.delayTime.value=+s.value/500;
  });
});

// Scope
const scopeCanvas=document.getElementById('scope');
const sCtx=scopeCanvas.getContext('2d');
function drawScope(){
  requestAnimationFrame(drawScope);
  scopeCanvas.width=scopeCanvas.offsetWidth*2;scopeCanvas.height=scopeCanvas.offsetHeight*2;
  const w=scopeCanvas.width,h=scopeCanvas.height;
  sCtx.fillStyle='#0a0a10';sCtx.fillRect(0,0,w,h);
  if(!analyser)return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  sCtx.beginPath();
  const sliceW=w/data.length;
  for(let i=0;i<data.length;i++){
    const v=data[i]/128;const y=v*h/2;
    if(i===0)sCtx.moveTo(0,y);else sCtx.lineTo(i*sliceW,y);
  }
  sCtx.strokeStyle='rgba(139,92,246,.7)';sCtx.lineWidth=2;sCtx.stroke();
}
drawScope();
</script>
</body>
</html>
