<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interference Pattern</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="addSource()">Add Source</button>
  <button class="btn" onclick="sources.pop()">Remove</button>
  <button class="btn" onclick="resetSources()">Reset</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%3">Color</button>
  <button class="btn" onclick="waveSpeed*=1.5">Faster</button>
  <button class="btn" onclick="waveSpeed/=1.5">Slower</button>
  <button class="btn" onclick="mode=(mode+1)%2">Mode</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let sources=[],colorMode=0,waveSpeed=1,mode=0,dragging=null,time=0;

function resetSources(){
  sources=[];
  for(let i=0;i<3;i++){
    const a=i/3*Math.PI*2-Math.PI/2;
    sources.push({x:W/2+Math.cos(a)*150,y:H/2+Math.sin(a)*150,freq:.05+Math.random()*.03,phase:i*Math.PI/3});
  }
}

function addSource(){
  sources.push({x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*300,freq:.04+Math.random()*.04,phase:Math.random()*Math.PI*2});
}

canvas.addEventListener('mousedown',e=>{
  dragging=sources.find(s=>Math.hypot(s.x-e.clientX,s.y-e.clientY)<15);
});
canvas.addEventListener('mousemove',e=>{if(dragging){dragging.x=e.clientX;dragging.y=e.clientY}});
canvas.addEventListener('mouseup',()=>{dragging=null});

resetSources();

function loop(){
  time+=.03*waveSpeed;

  const scale=4;
  const cols=Math.ceil(W/scale),rows=Math.ceil(H/scale);
  const imgData=ctx.createImageData(cols,rows);
  const d=imgData.data;

  for(let py=0;py<rows;py++)for(let px=0;px<cols;px++){
    const x=px*scale,y=py*scale;
    let val=0;
    sources.forEach(s=>{
      const dist=Math.hypot(x-s.x,y-s.y);
      if(mode===0)val+=Math.sin(dist*s.freq-time*s.freq*20+s.phase)/(1+dist*.003);
      else val+=Math.cos(dist*s.freq-time*s.freq*15+s.phase)*Math.exp(-dist*.002);
    });

    const idx=(py*cols+px)*4;
    let r,g,b;
    if(colorMode===0){
      const v=(val+1)*.5;
      r=Math.sin(v*Math.PI)*200;g=Math.sin(v*Math.PI+.5)*180;b=Math.sin(v*Math.PI+1)*220;
    }else if(colorMode===1){
      const v=(val+1)*.5*255;
      r=v*.2;g=v*.6;b=v;
    }else{
      const v=(val+1)*.5;
      r=v>5?v*255:0;g=v>3?v*200:0;b=v*255;
    }
    d[idx]=Math.max(0,Math.min(255,r));
    d[idx+1]=Math.max(0,Math.min(255,g));
    d[idx+2]=Math.max(0,Math.min(255,b));
    d[idx+3]=255;
  }

  // Scale up
  const tmpC=document.createElement('canvas');tmpC.width=cols;tmpC.height=rows;
  tmpC.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpC,0,0,W,H);

  // Draw sources
  sources.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x,s.y,6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
    const pulse=(Math.sin(time*5+s.phase)*.5+.5)*.3;
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,15+pulse*20);
    g.addColorStop(0,'rgba(255,255,255,.2)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,15+pulse*20,0,Math.PI*2);ctx.fill();
  });

  document.getElementById('stats').textContent=`${sources.length} sources · mode ${mode} · color ${colorMode}`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
