<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Caustics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="speed*=1.5">Faster</button>
  <button class="btn" onclick="speed/=1.5">Slower</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%3">Color</button>
  <button class="btn" onclick="dropRandom()">Drop</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

const N=256;
let buf1=new Float32Array(N*N),buf2=new Float32Array(N*N);
let damping=.98,speed=1,colorMode=0;

function dropRandom(){
  const x=Math.random()*N|0,y=Math.random()*N|0,r=5+Math.random()*10;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const px=(x+dx+N)%N,py=(y+dy+N)%N;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<r)buf1[py*N+px]+=Math.cos(dist/r*Math.PI/2)*3;
  }
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)/W*N|0;
  const y=(e.clientY-rect.top)/H*N|0;
  for(let dy=-8;dy<=8;dy++)for(let dx=-8;dx<=8;dx++){
    const px=(x+dx+N)%N,py=(y+dy+N)%N;
    buf1[py*N+px]+=Math.cos(Math.sqrt(dx*dx+dy*dy)/8*Math.PI/2)*4;
  }
});

canvas.addEventListener('mousemove',e=>{
  if(e.buttons===0)return;
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)/W*N|0;
  const y=(e.clientY-rect.top)/H*N|0;
  for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
    const px=(x+dx+N)%N,py=(y+dy+N)%N;
    buf1[py*N+px]+=(Math.random()-.5)*2;
  }
});

function simulate(){
  for(let y=1;y<N-1;y++)for(let x=1;x<N-1;x++){
    buf2[y*N+x]=((buf1[(y-1)*N+x]+buf1[(y+1)*N+x]+buf1[y*N+x-1]+buf1[y*N+x+1])/2-buf2[y*N+x])*damping;
  }
  [buf1,buf2]=[buf2,buf1];
}

function render(){
  const imgData=ctx.createImageData(N,N);
  const d=imgData.data;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const v=buf1[y*N+x];
    const idx=(y*N+x)*4;
    if(colorMode===0){
      const n=v*.5+.5;
      d[idx]=n*30;d[idx+1]=n*100+20;d[idx+2]=n*200+55;
    }else if(colorMode===1){
      const n=Math.abs(v);
      d[idx]=Math.min(255,n*200+10);d[idx+1]=Math.min(255,n*120+10);d[idx+2]=Math.min(255,n*40+5);
    }else{
      const n=v*.3+.5;
      d[idx]=Math.sin(n*Math.PI)*200;d[idx+1]=Math.sin(n*Math.PI+1)*200;d[idx+2]=Math.sin(n*Math.PI+2)*200;
    }
    d[idx+3]=255;
  }
  const tmpC=document.createElement('canvas');tmpC.width=N;tmpC.height=N;
  tmpC.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpC,0,0,W,H);
}

// Auto drops
setInterval(()=>{if(Math.random()<.3)dropRandom()},200);

function loop(){
  for(let i=0;i<Math.round(speed*2);i++)simulate();
  render();
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
