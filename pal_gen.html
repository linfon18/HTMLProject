<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.top{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.top h1{font-size:1rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:6px 14px;border-radius:7px;font-size:.72rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.palette{flex:1;display:flex;overflow:hidden}
.swatch{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px;cursor:pointer;transition:flex .5s;position:relative}
.swatch:hover{flex:1.3}
.swatch .hex{font-family:'Space Mono',monospace;font-size:.85rem;font-weight:600;letter-spacing:.05em;opacity:0;transition:opacity .3s;position:absolute;bottom:50px}
.swatch:hover .hex{opacity:1}
.swatch .name{font-size:.65rem;opacity:0;transition:opacity .3s;margin-bottom:4px;position:absolute;bottom:30px}
.swatch:hover .name{opacity:.7}
.swatch .lock{position:absolute;top:16px;right:16px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:.7rem;opacity:0;transition:opacity .3s;cursor:pointer;border:none;color:#fff}
.swatch:hover .lock{opacity:.7}
.swatch .lock.locked{opacity:1;background:rgba(0,0,0,.6)}
.footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;font-size:.6rem;color:var(--t3)}
select{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;color:var(--t2);font-size:.7rem;padding:4px 8px;font-family:inherit}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:#4ade80;padding:8px 16px;border-radius:8px;font-size:.72rem;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top">
  <h1>Color Palette Generator</h1>
  <select id="mode" onchange="generate()">
    <option value="analogous">Analogous</option>
    <option value="complementary">Complementary</option>
    <option value="triadic">Triadic</option>
    <option value="monochromatic">Monochromatic</option>
    <option value="pastel">Pastel</option>
    <option value="neon">Neon</option>
    <option value="earth">Earth Tones</option>
    <option value="random">Random</option>
  </select>
  <button class="btn" onclick="generate()">Generate (Space)</button>
  <button class="btn" onclick="copyAll()">Copy All</button>
</div>
<div class="palette" id="palette"></div>
<div class="footer">
  <span>Press Space to generate · Click swatch to copy · Click lock to pin color</span>
</div>
<div class="toast" id="toast">Copied!</div>

<script>
let colors=Array(5).fill(null).map(()=>({h:Math.random()*360,s:50+Math.random()*40,l:40+Math.random()*30,locked:false}));

function hsl(h,s,l){return`hsl(${h},${s}%,${l}%)`}
function hslToHex(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1)};
  return`#${[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('')}`;
}

function generate(){
  const mode=document.getElementById('mode').value;
  const baseH=Math.random()*360;
  const baseS=50+Math.random()*40;
  const baseL=35+Math.random()*30;

  colors.forEach((c,i)=>{
    if(c.locked)return;
    switch(mode){
      case'analogous':c.h=(baseH+i*30-60)%360;c.s=baseS;c.l=baseL+(i-2)*5;break;
      case'complementary':c.h=i<3?(baseH+i*15-15)%360:(baseH+180+(i-3)*15)%360;c.s=baseS;c.l=baseL+i*5;break;
      case'triadic':c.h=(baseH+i*72)%360;c.s=baseS;c.l=baseL;break;
      case'monochromatic':c.h=baseH;c.s=baseS+i*5-10;c.l=baseL+i*8-16;break;
      case'pastel':c.h=(baseH+i*40)%360;c.s=40+Math.random()*20;c.l=75+Math.random()*15;break;
      case'neon':c.h=(baseH+i*72)%360;c.s=90+Math.random()*10;c.l=55+Math.random()*10;break;
      case'earth':c.h=20+Math.random()*40;c.s=30+Math.random()*30;c.l=25+Math.random()*40;break;
      default:c.h=Math.random()*360;c.s=40+Math.random()*50;c.l=30+Math.random()*40;
    }
  });
  render();
}

function render(){
  const el=document.getElementById('palette');
  el.innerHTML='';
  colors.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='swatch';
    div.style.background=hsl(c.h,c.s,c.l);
    div.style.color=c.l>50?'#000':'#fff';
    div.innerHTML=`<div class="hex">${hslToHex(c.h,c.s,c.l).toUpperCase()}</div><div class="name">${Math.round(c.h)}° ${Math.round(c.s)}% ${Math.round(c.l)}%</div>`;
    div.addEventListener('click',e=>{
      if(e.target.classList.contains('lock'))return;
      navigator.clipboard.writeText(hslToHex(c.h,c.s,c.l));
      showToast('Copied '+hslToHex(c.h,c.s,c.l));
    });
    // Lock button
    const lockBtn=document.createElement('button');
    lockBtn.className='lock'+(c.locked?' locked':'');
    lockBtn.textContent=c.locked?'🔒':'🔓';
    lockBtn.addEventListener('click',e=>{e.stopPropagation();c.locked=!c.locked;render()});
    div.appendChild(lockBtn);
    el.appendChild(div);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function copyAll(){
  const text=colors.map(c=>hslToHex(c.h,c.s,c.l)).join(', ');
  navigator.clipboard.writeText(text);
  showToast('Copied all colors');
}

document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();generate()}});
generate();
</script>
</body>
</html>
