<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Pattern Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="randomize()">New Pattern</button>
  <button class="btn" onclick="toggleAnim()">Pause/Play</button>
  <button class="btn" onclick="layerCount=Math.min(8,layerCount+1);randomize()">More Layers</button>
  <button class="btn" onclick="layerCount=Math.max(2,layerCount-1);randomize()">Fewer Layers</button>
  <button class="btn" onclick="exportPNG()">Export</button>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let animating=true,layerCount=5;
let weights=[];

function randomize(){
  weights=[];
  for(let l=0;l<layerCount;l++){
    const w=[];
    const inputs=l===0?3:4;
    const outputs=l===layerCount-1?3:4;
    for(let o=0;o<outputs;o++){
      const neuron=[];
      for(let i=0;i<inputs;i++)neuron.push((Math.random()-.5)*2);
      neuron.push((Math.random()-.5)*2); // bias
      w.push(neuron);
    }
    weights.push(w);
  }
}

function activate(x,type){
  if(type===0)return Math.tanh(x);
  if(type===1)return Math.max(0,x); // ReLU
  return 1/(1+Math.exp(-x)); // Sigmoid
}

function forward(x,y,t){
  let inp=[x,y,t];
  for(let l=0;l<weights.length;l++){
    const out=[];
    const actType=l%3;
    for(const neuron of weights[l]){
      let sum=neuron[neuron.length-1]; // bias
      for(let i=0;i<inp.length;i++)sum+=neuron[i]*inp[i];
      out.push(activate(sum,actType));
    }
    inp=out;
  }
  return inp;
}

let time=0;
const imgData=ctx.createImageData(1,1);

function draw(){
  const scale=4;
  const cols=Math.ceil(W/scale),rows=Math.ceil(H/scale);
  const imgData=ctx.createImageData(cols,rows);
  const data=imgData.data;

  for(let py=0;py<rows;py++){
    for(let px=0;px<cols;px++){
      const nx=(px/cols-.5)*2;
      const ny=(py/rows-.5)*2;
      const t=time;
      const out=nxforward(nx,ny,t);
      const idx=(py*cols+px)*4;
      data[idx]=Math.floor(Math.abs(out[0])*255);
      data[idx+1]=Math.floor(Math.abs(out[1])*255);
      data[idx+2]=Math.floor(Math.abs(out[2])*255);
      data[idx+3]=255;
    }
  }

  // Scale up
  const tmpCanvas=document.createElement('canvas');
  tmpCanvas.width=cols;tmpCanvas.height=rows;
  tmpCanvas.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(tmpCanvas,0,0,W,H);
}

function nxforward(x,y,t){
  return forward(x,y,t);
}

function toggleAnim(){animating=!animating}

function exportPNG(){
  const a=document.createElement('a');a.download='neural_pattern.png';a.href=canvas.toDataURL();a.click();
}

randomize();
function loop(){
  if(animating)time+=.01;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
