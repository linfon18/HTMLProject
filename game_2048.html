<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:rgba(255,255,255,.04);
  --grid-bg:rgba(255,255,255,.06);
  --grid-cell:rgba(255,255,255,.03);
  --t1:#fff;
  --t2:rgba(255,255,255,.6);
  --t3:rgba(255,255,255,.25);
}

body{
  background:var(--bg);color:var(--t2);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;filter:blur(120px);opacity:.4}
.a1{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.3),transparent 70%);top:10%;left:10%;animation:f 20s ease-in-out infinite alternate}
.a2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,.2),transparent 70%);bottom:10%;right:10%;animation:f 20s ease-in-out infinite alternate-reverse}
@keyframes f{0%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}100%{transform:translate(-20px,20px)}}

.game{position:relative;z-index:1;text-align:center;user-select:none}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px}
.title{font-size:2.4rem;font-weight:800;letter-spacing:-.04em;color:var(--t1)}
.scores{display:flex;gap:10px}
.score-box{
  padding:8px 16px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  min-width:80px;
}
.score-box .label{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
.score-box .val{font-size:1.2rem;font-weight:700;color:var(--t1);font-family:'Space Mono',monospace}

.controls{display:flex;gap:8px;margin-bottom:16px;justify-content:center}
.btn{
  padding:8px 18px;border-radius:8px;font-size:.78rem;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  color:var(--t2);cursor:pointer;transition:all .2s;
}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1);border-color:rgba(255,255,255,.15)}
.btn.primary{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);color:#a78bfa}
.btn.primary:hover{background:rgba(139,92,246,.25)}

.board-wrap{
  position:relative;
  width:380px;height:380px;
  margin:0 auto 16px;
}
.board{
  width:100%;height:100%;
  background:var(--grid-bg);
  border-radius:14px;
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
  gap:6px;padding:6px;
  position:relative;
}
.cell-bg{
  border-radius:10px;background:var(--grid-cell);
}

.tiles{position:absolute;inset:6px;pointer-events:none}
.tile{
  position:absolute;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  transition:top .12s ease,left .12s ease;
  animation:tileIn .15s ease;
}
@keyframes tileIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

.overlay{
  position:absolute;inset:0;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .3s;z-index:10;
}
.overlay.show{opacity:1;pointer-events:auto}
.overlay .msg{font-size:1.6rem;font-weight:800;color:var(--t1)}
.overlay .sub{font-size:.85rem;color:var(--t3)}

.hint{font-size:.75rem;color:var(--t3);margin-top:12px}
.hint kbd{
  padding:2px 8px;border-radius:4px;font-size:.7rem;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  font-family:'Space Mono',monospace;
}
</style>
</head>
<body>
<div class="aurora"><div class="a1"></div><div class="a2"></div></div>

<div class="game">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn primary" onclick="newGame()">New Game</button>
    <button class="btn" onclick="undo()">Undo</button>
  </div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="oMsg"></div>
      <div class="sub">Press New Game or swipe to continue</div>
    </div>
  </div>
  <div class="hint">Arrow keys / WASD / Swipe to move</div>
</div>

<script>
const COLORS={
  2:{bg:'rgba(238,228,218,.35)',fg:'#e6edf3'},
  4:{bg:'rgba(237,224,200,.4)',fg:'#e6edf3'},
  8:{bg:'rgba(242,177,121,.45)',fg:'#fff'},
  16:{bg:'rgba(245,149,99,.5)',fg:'#fff'},
  32:{bg:'rgba(246,124,95,.55)',fg:'#fff'},
  64:{bg:'rgba(246,94,59,.6)',fg:'#fff'},
  128:{bg:'rgba(237,207,114,.5)',fg:'#fff'},
  256:{bg:'rgba(237,204,97,.55)',fg:'#fff'},
  512:{bg:'rgba(237,200,80,.6)',fg:'#fff'},
  1024:{bg:'rgba(237,197,63,.6)',fg:'#fff'},
  2048:{bg:'rgba(237,194,46,.7)',fg:'#fff'},
  4096:{bg:'rgba(139,92,246,.6)',fg:'#fff'},
  8192:{bg:'rgba(139,92,246,.75)',fg:'#fff'},
};

let grid,score,best=+localStorage.getItem('best2048')||0,prev;

function init(){
  const b=document.getElementById('board');
  b.innerHTML='';
  for(let i=0;i<16;i++){const d=document.createElement('div');d.className='cell-bg';b.appendChild(d)}
  document.getElementById('best').textContent=best;
  newGame();
}

function newGame(){
  grid=Array.from({length:4},()=>Array(4).fill(0));
  score=0;prev=null;
  addRandom();addRandom();
  render();
  document.getElementById('overlay').classList.remove('show');
}

function save(){prev={grid:grid.map(r=>[...r]),score}}
function undo(){
  if(!prev)return;
  grid=prev.grid;score=prev.score;prev=null;
  render();
}

function addRandom(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const[r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<.9?2:4;
}

function render(){
  const tiles=document.getElementById('tiles');
  tiles.innerHTML='';
  const size=(380-6*5)/4;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    const v=grid[r][c];
    if(!v)continue;
    const el=document.createElement('div');
    el.className='tile';
    const col=COLORS[v]||{bg:'rgba(139,92,246,.7)',fg:'#fff'};
    el.style.cssText=`
      left:${c*(size+6)}px;top:${r*(size+6)}px;
      width:${size}px;height:${size}px;
      background:${col.bg};color:${col.fg};
      font-size:${v>=1024?'1.1rem':v>=128?'1.3rem':'1.5rem'};
    `;
    el.textContent=v;
    tiles.appendChild(el);
  }
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('best2048',best);document.getElementById('best').textContent=best}
}

function slide(row){
  let a=row.filter(v=>v),merged=false;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;score+=a[i];a.splice(i+1,1);merged=true}
  }
  while(a.length<4)a.push(0);
  return a;
}

function move(dir){
  save();
  const old=JSON.stringify(grid);
  if(dir==='left')for(let r=0;r<4;r++)grid[r]=slide(grid[r]);
  else if(dir==='right')for(let r=0;r<4;r++)grid[r]=slide(grid[r].reverse()).reverse();
  else if(dir==='up')for(let c=0;c<4;c++){let col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];col=slide(col);for(let r=0;r<4;r++)grid[r][c]=col[r]}
  else if(dir==='down')for(let c=0;c<4;c++){let col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];col=slide(col);for(let r=0;r<4;r++)grid[r][c]=col[3-r]}

  if(JSON.stringify(grid)!==old){
    addRandom();render();
    if(checkWin())showOverlay('You Win!','2048 reached!');
    else if(checkLose())showOverlay('Game Over','No more moves');
  }else{prev=null}
}

function checkWin(){for(let r of grid)for(let v of r)if(v>=2048)return true;return false}
function checkLose(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(!grid[r][c])return false;
    if(c<3&&grid[r][c]===grid[r][c+1])return false;
    if(r<3&&grid[r][c]===grid[r+1][c])return false;
  }
  return true;
}
function showOverlay(m,s){document.getElementById('oMsg').textContent=m;document.getElementById('overlay').querySelector('.sub').textContent=s;document.getElementById('overlay').classList.add('show')}

document.addEventListener('keydown',e=>{
  const k=e.key;
  if(['ArrowUp','w','W'].includes(k))move('up');
  else if(['ArrowDown','s','S'].includes(k))move('down');
  else if(['ArrowLeft','a','A'].includes(k))move('left');
  else if(['ArrowRight','d','D'].includes(k))move('right');
});

let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<30)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});

init();
</script>
</body>
</html>
