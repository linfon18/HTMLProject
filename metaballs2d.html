<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaballs 2D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="initBalls()">Reset</button>
  <button class="btn" onclick="balls.push(createBall())">Add Ball</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%3">Color</button>
  <button class="btn" onclick="showMarching=!showMarching">Marching Squares</button>
  <button class="btn" onclick="resolution=resolution===4?2:resolution===2?8:4;resize()">Resolution</button>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,resolution=4,cols,rows;
let balls=[];
let colorMode=0,showMarching=false;

function resize(){
  W=canvas.width=innerWidth;H=canvas.height=innerHeight;
  cols=Math.ceil(W/resolution);rows=Math.ceil(H/resolution);
}
addEventListener('resize',resize);

function createBall(){
  return{
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,
    r:30+Math.random()*50
  };
}

function initBalls(){
  balls=[];
  for(let i=0;i<8;i++)balls.push(createBall());
}

let mouseX=-999,mouseY=-999;
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

function field(x,y){
  let sum=0;
  balls.forEach(b=>{
    const dx=x-b.x,dy=y-b.y;
    sum+=b.r*b.r/(dx*dx+dy*dy+1);
  });
  // Mouse contribution
  const mdx=x-mouseX,mdy=y-mouseY;
  sum+=4000/(mdx*mdx+mdy*mdy+100);
  return sum;
}

function draw(){
  const imgData=ctx.createImageData(cols,rows);
  const data=imgData.data;

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const v=field(x*resolution,y*resolution);
      const idx=(y*cols+x)*4;
      if(colorMode===0){
        // Aurora
        const t=Math.min(1,v);
        data[idx]=t*t*80;data[idx+1]=t*120;data[idx+2]=t*t*200;
      }else if(colorMode===1){
        // Fire
        const t=Math.min(1,v);
        data[idx]=t*255;data[idx+1]=t*t*150;data[idx+2]=t*t*t*50;
      }else{
        // Monochrome
        const t=Math.min(255,v*80);
        data[idx]=t;data[idx+1]=t;data[idx+2]=t;
      }
      data[idx+3]=255;
    }
  }

  const tmpCanvas=document.createElement('canvas');
  tmpCanvas.width=cols;tmpCanvas.height=rows;
  tmpCanvas.getContext('2d').putImageData(imgData,0,0);
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(tmpCanvas,0,0,W,H);

  // Marching squares contour
  if(showMarching){
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;
    for(let y=0;y<rows-1;y++)for(let x=0;x<cols-1;x++){
      const v0=field(x*resolution,y*resolution)>1?1:0;
      const v1=field((x+1)*resolution,y*resolution)>1?1:0;
      const v2=field((x+1)*resolution,(y+1)*resolution)>1?1:0;
      const v3=field(x*resolution,(y+1)*resolution)>1?1:0;
      const code=v0|v1<<1|v2<<2|v3<<3;
      if(code===0||code===15)continue;
      const px=x*resolution+resolution/2,py=y*resolution+resolution/2;
      const s=resolution;
      // Simple contour lines
      if(code===1||code===14){ctx.beginPath();ctx.moveTo(px,py-s/2);ctx.lineTo(px+s/2,py);ctx.stroke()}
      if(code===2||code===13){ctx.beginPath();ctx.moveTo(px+s/2,py);ctx.lineTo(px,py+s/2);ctx.stroke()}
      if(code===4||code===11){ctx.beginPath();ctx.moveTo(px,py+s/2);ctx.lineTo(px-s/2,py);ctx.stroke()}
      if(code===8||code===7){ctx.beginPath();ctx.moveTo(px-s/2,py);ctx.lineTo(px,py-s/2);ctx.stroke()}
    }
  }

  // Ball indicators
  balls.forEach(b=>{
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
  });
}

function update(){
  balls.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<b.r||b.x>W-b.r)b.vx*=-1;
    if(b.y<b.r||b.y>H-b.r)b.vy*=-1;
    b.x=Math.max(b.r,Math.min(W-b.r,b.x));
    b.y=Math.max(b.r,Math.min(H-b.r,b.y));
  });
}

resize();initBalls();
function loop(){update();draw();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
</body>
</html>
