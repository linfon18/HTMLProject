<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;inset:0}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:6px}
.panel{padding:12px;border-radius:10px;background:rgba(10,10,15,.8);backdrop-filter:blur(16px);border:1px solid var(--border);min-width:170px}
.panel h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:.68rem}
.row label{color:var(--t3);font-size:.62rem}
input[type=range]{width:70px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3);min-width:22px;text-align:right}
.btn{padding:5px 10px;border-radius:6px;font-size:.68rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t3);cursor:pointer;transition:all .2s;text-align:center}
.btn:hover{color:var(--t1);background:rgba(255,255,255,.1)}
.fps{position:fixed;bottom:12px;left:12px;font-size:.6rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="panel">
    <h3>Gravity Sim</h3>
    <div class="row"><label>Bodies</label><input type="range" id="count" min="3" max="200" value="50"><span class="val" id="countV">50</span></div>
    <div class="row"><label>Gravity</label><input type="range" id="grav" min="1" max="100" value="30"><span class="val" id="gravV">30</span></div>
    <div class="row"><label>Damping</label><input type="range" id="damp" min="90" max="100" value="99"><span class="val" id="dampV">.99</span></div>
    <div class="row"><label>Trail</label><input type="range" id="trail" min="0" max="100" value="80"><span class="val" id="trailV">80</span></div>
    <button class="btn" onclick="reset()">Reset</button>
    <button class="btn" onclick="addCentral()">Add Central Mass</button>
    <button class="btn" onclick="explosion()">Explosion</button>
  </div>
</div>
<div class="fps" id="fps"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

let bodies=[],trails=[];
let mouseX=-1,mouseY=-1;
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

class Body{
  constructor(x,y,vx,vy,mass,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.mass=mass;this.r=Math.max(1.5,Math.pow(mass,.33)*1.5);
    this.color=color||`hsla(${Math.random()*360},70%,60%,.8)`;
    this.trail=[];
  }
}

function reset(){
  const n=+document.getElementById('count').value;
  bodies=[];
  for(let i=0;i<n;i++){
    const x=W/2+(Math.random()-.5)*W*.6;
    const y=H/2+(Math.random()-.5)*H*.6;
    const vx=(Math.random()-.5)*2;
    const vy=(Math.random()-.5)*2;
    const mass=.5+Math.random()*3;
    bodies.push(new Body(x,y,vx,vy,mass));
  }
}

function addCentral(){
  bodies.push(new Body(W/2,H/2,0,0,100,'rgba(255,200,50,.9)'));
}

function explosion(){
  const cx=W/2,cy=H/2;
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2;
    const speed=2+Math.random()*4;
    bodies.push(new Body(cx,cy,Math.cos(a)*speed,Math.sin(a)*speed,.3+Math.random()));
  }
}

function update(){
  const G=+document.getElementById('grav').value/10;
  const damp=+document.getElementById('damp').value/100;
  const trailLen=+document.getElementById('trail').value;

  // Gravity
  for(let i=0;i<bodies.length;i++){
    for(let j=i+1;j<bodies.length;j++){
      const a=bodies[i],b=bodies[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy)+5;
      const F=G*a.mass*b.mass/(dist*dist);
      const fx=F*dx/dist,fy=F*dy/dist;
      a.vx+=fx/a.mass;a.vy+=fy/a.mass;
      b.vx-=fx/b.mass;b.vy-=fy/b.mass;
    }
  }

  // Integrate
  bodies.forEach(b=>{
    b.vx*=damp;b.vy*=damp;
    b.x+=b.vx;b.y+=b.vy;
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>trailLen)b.trail.shift();
    // Wrap
    if(b.x<-50)b.x+=W+100;if(b.x>W+50)b.x-=W+100;
    if(b.y<-50)b.y+=H+100;if(b.y>H+50)b.y-=H+100;
  });

  // Merge close bodies
  for(let i=0;i<bodies.length;i++){
    for(let j=i+1;j<bodies.length;j++){
      const a=bodies[i],b=bodies[j];
      const dist=Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
      if(dist<a.r+b.r){
        const total=a.mass+b.mass;
        a.vx=(a.vx*a.mass+b.vx*b.mass)/total;
        a.vy=(a.vy*a.mass+b.vy*b.mass)/total;
        a.x=(a.x*a.mass+b.x*b.mass)/total;
        a.y=(a.y*a.mass+b.y*b.mass)/total;
        a.mass=total;
        a.r=Math.max(1.5,Math.pow(total,.33)*1.5);
        bodies.splice(j,1);j--;
      }
    }
  }
}

function draw(){
  const trailAlpha=+document.getElementById('trail').value/100;
  ctx.fillStyle=`rgba(5,5,8,${1-trailAlpha*.15})`;ctx.fillRect(0,0,W,H);

  // Trails
  bodies.forEach(b=>{
    if(b.trail.length<2)return;
    ctx.beginPath();
    ctx.moveTo(b.trail[0].x,b.trail[0].y);
    for(let i=1;i<b.trail.length;i++)ctx.lineTo(b.trail[i].x,b.trail[i].y);
    ctx.strokeStyle=b.color.replace(/[\d.]+\)$/,'.15)');
    ctx.lineWidth=b.r*.5;ctx.stroke();
  });

  // Bodies
  bodies.forEach(b=>{
    // Glow
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    g.addColorStop(0,b.color.replace(/[\d.]+\)$/,'.2)'));
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r*3,0,Math.PI*2);ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=b.color;ctx.fill();
  });

  document.getElementById('fps').textContent=bodies.length+' bodies';
}

let frames=0,fpsT=performance.now();
function loop(t){
  update();draw();
  frames++;
  if(t-fpsT>500){document.getElementById('fps').textContent=`${bodies.length} bodies · ${Math.round(frames*1000/(t-fpsT))} FPS`;frames=0;fpsT=t}
  requestAnimationFrame(loop);
}

document.querySelectorAll('input[type=range]').forEach(s=>{
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>vEl.textContent=s.id==='damp'?(+s.value/100).toFixed(2):s.value);
});

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
