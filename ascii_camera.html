<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Art Camera</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.top{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.top h1{font-size:.85rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
label{font-size:.62rem;color:var(--t3)}
input[type=range]{width:60px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3)}
.main{flex:1;display:flex;overflow:hidden;align-items:center;justify-content:center}
#ascii{font-family:'Space Mono',monospace;font-size:6px;line-height:7px;letter-spacing:1px;white-space:pre;color:var(--t2);text-align:center}
video{display:none}
canvas{display:none}
</style>
</head>
<body>
<div class="top">
  <h1>ASCII Art Camera</h1>
  <button class="btn" onclick="startCamera()">Start Camera</button>
  <label>Resolution</label><input type="range" id="res" min="40" max="200" value="100"><span class="val" id="resV">100</span>
  <label>Font Size</label><input type="range" id="fontSize" min="3" max="12" value="6"><span class="val" id="fontSizeV">6</span>
  <button class="btn" onclick="colorMode=!colorMode">Toggle Color</button>
  <button class="btn" onclick="invertColors=!invertColors">Invert</button>
  <button class="btn" onclick="charsetIdx=(charsetIdx+1)%3;setCharset()">Charset</button>
  <button class="btn" onclick="takeSnapshot()">Snapshot</button>
</div>
<div class="main">
  <pre id="ascii">Click "Start Camera" to begin</pre>
</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const asciiEl=document.getElementById('ascii');
let colorMode=false,invertColors=false,stream=null,animId=null;
let charsetIdx=0;

const CHARSETS=[
  ' .:-=+*#%@',
  ' ░▒▓█',
  ' .,:;i1tfLCG08@'
];

let charset=CHARSETS[0];
function setCharset(){charset=CHARSETS[charsetIdx]}

async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
    video.srcObject=stream;
    video.onloadedmetadata=()=>{video.play();renderLoop()};
  }catch(e){asciiEl.textContent='Camera error: '+e.message+'\n\nTry using HTTPS or a local server.'}
}

function renderLoop(){
  const cols=+document.getElementById('res').value;
  canvas.width=cols;
  const aspect=video.videoHeight/video.videoWidth||.75;
  const rows=Math.floor(cols*aspect*.5);
  canvas.height=rows;

  ctx.drawImage(video,0,0,cols,rows);
  const imgData=ctx.getImageData(0,0,cols,rows);
  const data=imgData.data;

  let ascii='';
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const i=(y*cols+x)*4;
      let r=data[i],g=data[i+1],b=data[i+2];
      let brightness=(r*.299+g*.587+b*.114)/255;
      if(invertColors)brightness=1-brightness;
      const charIdx=Math.floor(brightness*(charset.length-1));
      const ch=charset[charIdx];
      if(colorMode){
        ascii+=`<span style="color:rgb(${r},${g},${b})">${ch}</span>`;
      }else{
        ascii+=ch;
      }
    }
    ascii+='\n';
  }
  asciiEl.innerHTML=ascii;

  const fontSize=+document.getElementById('fontSize').value;
  asciiEl.style.fontSize=fontSize+'px';
  asciiEl.style.lineHeight=(fontSize+1)+'px';

  animId=requestAnimationFrame(renderLoop);
}

function takeSnapshot(){
  const blob=new Blob([asciiEl.textContent],{type:'text/plain'});
  const a=document.createElement('a');
  a.download='ascii_art.txt';
  a.href=URL.createObjectURL(blob);
  a.click();
}

document.getElementById('res').addEventListener('input',e=>document.getElementById('resV').textContent=e.target.value);
document.getElementById('fontSize').addEventListener('input',e=>document.getElementById('fontSizeV').textContent=e.target.value);
</script>
</body>
</html>
