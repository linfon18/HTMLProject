<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Text</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
input{padding:5px 10px;border-radius:6px;font-size:.75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff;outline:none;font-family:'Space Grotesk',sans-serif}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <input id="textInput" value="HELLO WORLD" oninput="formText(this.value)" placeholder="Enter text...">
  <button class="btn" onclick="formText(document.getElementById('textInput').value)">Form</button>
  <button class="btn" onclick="explode()">Explode</button>
  <button class="btn" onclick="wave()">Wave</button>
  <button class="btn" onclick="spiral()">Spiral</button>
  <button class="btn" onclick="colorMode=(colorMode+1)%4">Color</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let particles=[];
let colorMode=0;
const NUM=6000;

function init(){
  particles=[];
  for(let i=0;i<NUM;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      tx:Math.random()*W,ty:Math.random()*H,
      vx:0,vy:0,
      size:1+Math.random()*2,
      hue:Math.random()*360,
      life:1
    });
  }
  formText('HELLO WORLD');
}

function sampleText(text){
  const c=document.createElement('canvas');
  const cx=c.getContext('2d');
  const fontSize=Math.min(W/(text.length*.7),120);
  c.width=W;c.height=H;
  cx.fillStyle='#000';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';cx.font=`bold ${fontSize}px 'Space Grotesk',Arial,sans-serif`;
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(text,W/2,H/2);

  const data=cx.getImageData(0,0,W,H).data;
  const points=[];
  const step=4;
  for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){
    if(data[(y*W+x)*4]>128)points.push({x,y});
  }
  return points;
}

function formText(text){
  const points=sampleText(text||'HI');
  particles.forEach((p,i)=>{
    const target=points[i%points.length]||{x:W/2+(Math.random()-.5)*200,y:H/2+(Math.random()-.5)*200};
    p.tx=target.x+(Math.random()-.5)*2;
    p.ty=target.y+(Math.random()-.5)*2;
    p.state='forming';
  });
}

function explode(){
  particles.forEach(p=>{
    const angle=Math.random()*Math.PI*2;
    const speed=5+Math.random()*15;
    p.vx=Math.cos(angle)*speed;p.vy=Math.sin(angle)*speed;
    p.state='explode';
  });
}

function wave(){
  particles.forEach((p,i)=>{
    const angle=i/particles.length*Math.PI*4;
    p.tx=W/2+Math.cos(angle)*i/particles.length*300;
    p.ty=H/2+Math.sin(angle)*i/particles.length*200;
    p.state='forming';
  });
}

function spiral(){
  particles.forEach((p,i)=>{
    const a=i/particles.length*Math.PI*12;
    const r=i/particles.length*Math.min(W,H)*.45;
    p.tx=W/2+Math.cos(a)*r;
    p.ty=H/2+Math.sin(a)*r;
    p.state='forming';
  });
}

canvas.addEventListener('click',e=>{
  particles.forEach(p=>{
    const dx=p.x-e.clientX,dy=p.y-e.clientY;
    const d=Math.sqrt(dx*dx+dy*dy)+1;
    p.vx+=dx/d*10;p.vy+=dy/d*10;
  });
});

init();

function loop(){
  ctx.fillStyle='rgba(5,5,8,.15)';ctx.fillRect(0,0,W,H);

  particles.forEach(p=>{
    if(p.state==='forming'){
      const dx=p.tx-p.x,dy=p.ty-p.y;
      p.vx+=dx*.03;p.vy+=dy*.03;
      p.vx*=.85;p.vy*=.85;
    }else if(p.state==='explode'){
      p.vx*=.96;p.vy*=.96;
      p.vx+=(Math.random()-.5)*.5;p.vy+=(Math.random()-.5)*.5;
    }
    // Mouse repulsion
    // p.vx*=.98;p.vy*=.98;
    p.x+=p.vx;p.y+=p.vy;

    // Wrap
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;

    let hue,sat,lit;
    if(colorMode===0){hue=p.hue;sat=70;lit=55}
    else if(colorMode===1){hue=(p.x/W)*360;sat=80;lit=50}
    else if(colorMode===2){hue=(p.y/H)*200+200;sat=60;lit=50}
    else{hue=(Math.atan2(p.y-H/2,p.x-W/2)/Math.PI+1)*180;sat=70;lit=50}

    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},${sat}%,${lit}%,.7)`;
    ctx.fill();
  });

  document.getElementById('stats').textContent=`${particles.length} particles · mode ${colorMode}`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
