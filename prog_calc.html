<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programmer Calculator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25);--accent:#8b5cf6}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.calc{width:380px;border-radius:16px;background:rgba(12,12,18,.9);border:1px solid var(--border);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.display{padding:16px 20px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border)}
.base-tabs{display:flex;gap:4px;margin-bottom:8px}
.base-tab{padding:3px 10px;border-radius:5px;font-size:.6rem;font-weight:700;letter-spacing:.05em;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--t3);font-family:'JetBrains Mono',monospace}
.base-tab.active{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.3);color:#a78bfa}
.input-line{font-family:'JetBrains Mono',monospace;font-size:1.4rem;color:var(--t1);text-align:right;min-height:1.6em;word-break:break-all;direction:rtl;text-align:right}
.conversions{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:8px}
.conv{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--t3);padding:2px 0;display:flex;gap:4px}
.conv label{color:rgba(255,255,255,.15);min-width:18px;font-weight:700}
.conv span{color:var(--t2);word-break:break-all}
.bit-display{margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(139,92,246,.5);letter-spacing:2px;text-align:center;word-break:break-all;line-height:1.5}
.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:12px}
.key{padding:14px 8px;border-radius:8px;font-size:.8rem;font-weight:600;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);color:var(--t2);cursor:pointer;transition:all .15s;text-align:center;font-family:'Space Grotesk',sans-serif}
.key:hover{background:rgba(255,255,255,.08);color:var(--t1)}
.key:active{background:rgba(255,255,255,.12);transform:scale(.96)}
.key.op{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.1);color:#a78bfa}
.key.op:hover{background:rgba(139,92,246,.15)}
.key.fn{background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.1);color:#22d3ee;font-size:.65rem}
.key.fn:hover{background:rgba(6,182,212,.15)}
.key.eq{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.1);color:#4ade80;grid-column:span 2}
.key.clear{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.1);color:#f87171}
.wide{grid-column:span 2}
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="base-tabs">
      <div class="base-tab" onclick="setBase(2)">BIN</div>
      <div class="base-tab" onclick="setBase(8)">OCT</div>
      <div class="base-tab active" onclick="setBase(10)">DEC</div>
      <div class="base-tab" onclick="setBase(16)">HEX</div>
    </div>
    <div class="input-line" id="display">0</div>
    <div class="conversions">
      <div class="conv"><label>HEX</label><span id="hex">0</span></div>
      <div class="conv"><label>DEC</label><span id="dec">0</span></div>
      <div class="conv"><label>OCT</label><span id="oct">0</span></div>
      <div class="conv"><label>BIN</label><span id="bin">0</span></div>
    </div>
    <div class="bit-display" id="bits">00000000 00000000 00000000 00000000</div>
  </div>
  <div class="keys">
    <div class="key fn" onclick="doOp('LSH')">LSH</div>
    <div class="key fn" onclick="doOp('RSH')">RSH</div>
    <div class="key fn" onclick="doOp('AND')">AND</div>
    <div class="key fn" onclick="doOp('OR')">OR</div>
    <div class="key fn" onclick="doOp('XOR')">XOR</div>
    <div class="key fn" onclick="doOp('NOT')">NOT</div>
    <div class="key fn" onclick="doOp('NAND')">NAND</div>
    <div class="key fn" onclick="doOp('NOR')">NOR</div>
    <div class="key clear" onclick="clearAll()">AC</div>
    <div class="key" onclick="backspace()">⌫</div>
    <div class="key op" onclick="doOp('%')">%</div>
    <div class="key op" onclick="doOp('/')">÷</div>
    <div class="key" onclick="input('7')">7</div>
    <div class="key" onclick="input('8')">8</div>
    <div class="key" onclick="input('9')">9</div>
    <div class="key op" onclick="doOp('*')">×</div>
    <div class="key" onclick="input('4')">4</div>
    <div class="key" onclick="input('5')">5</div>
    <div class="key" onclick="input('6')">6</div>
    <div class="key op" onclick="doOp('-')">−</div>
    <div class="key" onclick="input('1')">1</div>
    <div class="key" onclick="input('2')">2</div>
    <div class="key" onclick="input('3')">3</div>
    <div class="key op" onclick="doOp('+')">+</div>
    <div class="key" onclick="input('A')">A</div>
    <div class="key" onclick="input('B')">B</div>
    <div class="key" onclick="input('0')">0</div>
    <div class="key eq" onclick="calculate()">=</div>
    <div class="key" onclick="input('C')">C</div>
    <div class="key" onclick="input('D')">D</div>
    <div class="key" onclick="input('E')">E</div>
    <div class="key" onclick="input('F')">F</div>
  </div>
</div>

<script>
let base=10;
let current='0';
let prev=null,op=null;
let newNum=true;

function setBase(b){
  // Convert current to new base
  const dec=parseInt(current,base)||0;
  base=b;
  current=dec.toString(base).toUpperCase();
  newNum=true;
  document.querySelectorAll('.base-tab').forEach((t,i)=>{
    t.classList.toggle('active',[2,8,10,16][i]===b);
  });
  updateDisplay();
}

function input(ch){
  const validChars={
    2:'01',8:'01234567',10:'0123456789',16:'0123456789ABCDEF'
  };
  if(!validChars[base].includes(ch))return;
  if(newNum){current=ch;newNum=false}
  else current+=ch;
  updateDisplay();
}

function doOp(o){
  if(['AND','OR','XOR','NOT','NAND','NOR','LSH','RSH'].includes(o)){
    bitwiseOp(o);return;
  }
  if(prev!==null&&op&&!newNum)calculate();
  prev=parseInt(current,base)||0;
  op=o;newNum=true;
}

function calculate(){
  if(prev===null||!op)return;
  const cur=parseInt(current,base)||0;
  let result;
  switch(op){
    case'+':result=prev+cur;break;
    case'-':result=prev-cur;break;
    case'*':result=prev*cur;break;
    case'/':result=cur!==0?Math.floor(prev/cur):0;break;
    case'%':result=cur!==0?prev%cur:0;break;
    default:result=cur;
  }
  current=(result>>>0).toString(base).toUpperCase();
  prev=null;op=null;newNum=true;
  updateDisplay();
}

function bitwiseOp(o){
  const cur=parseInt(current,base)||0;
  if(o==='NOT'){current=(~cur>>>0).toString(base).toUpperCase();newNum=true;updateDisplay();return}
  if(prev===null){prev=cur;op=o;newNum=true;return}
  let result;
  switch(o){
    case'AND':result=prev&cur;break;
    case'OR':result=prev|cur;break;
    case'XOR':result=prev^cur;break;
    case'NAND':result=(~(prev&cur))>>>0;break;
    case'NOR':result=(~(prev|cur))>>>0;break;
    case'LSH':result=(prev<<cur)>>>0;break;
    case'RSH':result=(prev>>>cur);break;
    default:result=cur;
  }
  current=(result>>>0).toString(base).toUpperCase();
  prev=null;op=null;newNum=true;
  updateDisplay();
}

function clearAll(){current='0';prev=null;op=null;newNum=true;updateDisplay()}
function backspace(){if(current.length>1)current=current.slice(0,-1);else current='0';updateDisplay()}

function updateDisplay(){
  document.getElementById('display').textContent=current;
  const dec=parseInt(current,base)||0;
  document.getElementById('hex').textContent=dec.toString(16).toUpperCase();
  document.getElementById('dec').textContent=dec.toString(10);
  document.getElementById('oct').textContent=dec.toString(8);
  document.getElementById('bin').textContent=dec.toString(2);
  // 32-bit display
  const bits=dec.toString(2).padStart(32,'0');
  document.getElementById('bits').textContent=bits.replace(/(.{8})/g,'$1 ').trim();
}

document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')input(e.key);
  else if(e.key>='a'&&e.key<='f')input(e.key.toUpperCase());
  else if(e.key>='A'&&e.key<='F')input(e.key);
  else if(e.key==='+'||e.key==='-'||e.key==='*'||e.key==='/')doOp(e.key);
  else if(e.key==='Enter'||e.key==='=')calculate();
  else if(e.key==='Backspace')backspace();
  else if(e.key==='Escape')clearAll();
});

updateDisplay();
</script>
</body>
</html>
