<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflakes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;overflow:hidden}canvas{display:block}
.ui{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{background:rgba(255,255,255,.1);color:#fff}
.stats{position:fixed;bottom:12px;left:12px;font-size:.62rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <button class="btn" onclick="snowCount=Math.min(500,snowCount+50)">More</button>
  <button class="btn" onclick="windStrength=(windStrength+1)%4">Wind</button>
  <button class="btn" onclick="blizzard=!blizzard">Blizzard</button>
</div>
<div class="stats" id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);

let snowflakes=[],snowCount=200,windStrength=0,blizzard=false,mouseX=W/2;

canvas.addEventListener('mousemove',e=>{mouseX=e.clientX});

class Snowflake{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*W;this.y=-10-Math.random()*H;
    this.r=1+Math.random()*4;this.speed=this.r*.5+.5;
    this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=.01+Math.random()*.03;
    this.opacity=.3+Math.random()*.7;
  }
  update(){
    this.y+=this.speed*(blizzard?3:1);
    this.wobble+=this.wobbleSpeed;
    this.x+=Math.sin(this.wobble)*.5+windStrength*.5;
    // Wind from mouse
    const dx=mouseX-W/2;
    this.x+=dx*.0005;
    if(this.y>H+10)this.reset();
    if(this.x<-10)this.x=W+10;
    if(this.x>W+10)this.x=-10;
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,240,${this.opacity})`;ctx.fill();
    // Crystal shape for larger flakes
    if(this.r>3){
      ctx.strokeStyle=`rgba(200,210,240,${this.opacity*.5})`;ctx.lineWidth=.5;
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2;
        ctx.beginPath();ctx.moveTo(this.x,this.y);
        ctx.lineTo(this.x+Math.cos(a)*this.r*2,this.y+Math.sin(a)*this.r*2);
        ctx.stroke();
      }
    }
  }
}

for(let i=0;i<snowCount;i++)snowflakes.push(new Snowflake());

function loop(){
  ctx.fillStyle='rgba(5,5,8,.08)';ctx.fillRect(0,0,W,H);
  while(snowflakes.length<snowCount)snowflakes.push(new Snowflake());

  snowflakes.forEach(s=>{s.update();s.draw()});

  // Ground snow
  ctx.fillStyle='rgba(200,210,240,.02)';ctx.fillRect(0,H-3,W,3);

  document.getElementById('stats').textContent=`${snowflakes.length} flakes · wind ${windStrength}`;
  requestAnimationFrame(loop);
}
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
