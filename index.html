const grid=document.getElementById('grid');
const searchInput=document.getElementById('search');
const filterBtns=document.querySelectorAll('.filter-btn');
const noResults=document.getElementById('no-results');
let currentFilter='all';
function render(filter='all',search=''){
  const filtered=projects.filter(p=>{
    const matchFilter=filter==='all'||p.tag===filter;
    const matchSearch=search===''||p.title.toLowerCase().includes(search.toLowerCase())||p.desc.toLowerCase().includes(search.toLowerCase())||p.tag.toLowerCase().includes(search.toLowerCase());
    return matchFilter&&matchSearch;
  });
  if(filtered.length===0){
    grid.style.display='none';
    noResults.style.display='block';
  }else{
    grid.style.display='grid';
    noResults.style.display='none';
    grid.innerHTML=filtered.map(p=>`
      <div class="card" onclick="window.open('${p.name}.html','_blank')">
        <div class="card-content">
          <div class="card-tag">${p.tag}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
        </div>
      </div>
    `).join('');
  }
}
filterBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    filterBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    render(currentFilter,searchInput.value);
  });
});
searchInput.addEventListener('input',e=>{
  render(currentFilter,e.target.value);
});
render();
</script>
