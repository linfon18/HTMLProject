<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.top{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.top h1{font-size:.85rem;font-weight:700;color:var(--t1);margin-right:auto}
.btn{padding:5px 10px;border-radius:6px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.main{flex:1;display:flex;overflow:hidden}
.pane{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.pane:last-child{border-right:none}
.pane-h{padding:4px 14px;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);border-bottom:1px solid var(--border);background:rgba(255,255,255,.015)}
textarea{flex:1;resize:none;border:none;outline:none;padding:14px;background:#0a0a10;color:#e6edf3;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.7}
.diff{flex:1;overflow-y:auto;padding:14px;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7}
.diff .added{background:rgba(34,197,94,.1);color:#4ade80}
.diff .removed{background:rgba(244,63,94,.1);color:#f87171}
.diff .unchanged{color:var(--t3)}
.diff .line{display:flex;gap:8px}
.diff .ln{color:rgba(255,255,255,.15);min-width:30px;text-align:right;user-select:none}
.stats{padding:6px 14px;border-top:1px solid var(--border);font-size:.6rem;font-family:'Space Mono',monospace;color:var(--t3);display:flex;gap:16px;flex-shrink:0}
</style>
</head>
<body>
<div class="top">
  <h1>Text Diff Tool</h1>
  <button class="btn" onclick="computeDiff()">Compare</button>
  <button class="btn" onclick="swapPanes()">Swap</button>
  <button class="btn" onclick="clearAll()">Clear</button>
  <button class="btn" onclick="loadSample()">Load Sample</button>
  <button class="btn" onclick="copyDiff()">Copy Diff</button>
</div>
<div class="main">
  <div class="pane">
    <div class="pane-h">Original</div>
    <textarea id="left" oninput="computeDiff()" placeholder="Paste original text here..."></textarea>
  </div>
  <div class="pane">
    <div class="pane-h">Modified</div>
    <textarea id="right" oninput="computeDiff()" placeholder="Paste modified text here..."></textarea>
  </div>
  <div class="pane">
    <div class="pane-h">Diff</div>
    <div class="diff" id="diff"></div>
  </div>
</div>
<div class="stats">
  <span>Added: <span id="added" style="color:#4ade80">0</span></span>
  <span>Removed: <span id="removed" style="color:#f87171">0</span></span>
  <span>Unchanged: <span id="unchanged">0</span></span>
</div>

<script>
function computeDiff(){
  const left=document.getElementById('left').value.split('\n');
  const right=document.getElementById('right').value.split('\n');
  const diff=lcsDiff(left,right);
  renderDiff(diff);
}

function lcsDiff(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const result=[];
  let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){result.unshift({type:'same',text:a[i-1],lnL:i,lnR:j});i--;j--}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){result.unshift({type:'add',text:b[j-1],lnR:j});j--}
    else{result.unshift({type:'remove',text:a[i-1],lnL:i});i--}
  }
  return result;
}

function renderDiff(diff){
  const el=document.getElementById('diff');
  let added=0,removed=0,unchanged=0;
  el.innerHTML=diff.map(d=>{
    const cls=d.type==='same'?'unchanged':d.type==='add'?'added':'removed';
    const prefix=d.type==='add'?'+':d.type==='remove'?'-':' ';
    if(d.type==='add')added++;else if(d.type==='remove')removed++;else unchanged++;
    const ln=d.lnL||d.lnR||'';
    return`<div class="line ${cls}"><span class="ln">${ln}</span><span>${prefix} ${escapeHtml(d.text)}</span></div>`;
  }).join('');
  document.getElementById('added').textContent=added;
  document.getElementById('removed').textContent=removed;
  document.getElementById('unchanged').textContent=unchanged;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function swapPanes(){
  const l=document.getElementById('left'),r=document.getElementById('right');
  [l.value,r.value]=[r.value,l.value];
  computeDiff();
}

function clearAll(){document.getElementById('left').value='';document.getElementById('right').value='';document.getElementById('diff').innerHTML=''}

function loadSample(){
  document.getElementById('left').value=`function hello() {
  console.log("Hello World");
  return true;
}

function add(a, b) {
  return a + b;
}`;

  document.getElementById('right').value=`function hello(name) {
  console.log("Hello " + name);
  console.log("Welcome!");
  return true;
}

function add(a, b, c) {
  return a + b + c;
}

function multiply(a, b) {
  return a * b;
}`;
  computeDiff();
}

function copyDiff(){
  const lines=document.querySelectorAll('.diff .line');
  let text='';
  lines.forEach(l=>{text+=l.querySelector('span:last-child').textContent+'\n'});
  navigator.clipboard.writeText(text);
}

computeDiff();
</script>
</body>
</html>
