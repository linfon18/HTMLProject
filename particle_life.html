<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--border:rgba(255,255,255,.06);--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25)}
body{background:var(--bg);color:var(--t2);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;inset:0}
.ui{position:fixed;top:12px;left:12px;z-index:10}
.panel{padding:12px;border-radius:10px;background:rgba(10,10,15,.8);backdrop-filter:blur(16px);border:1px solid var(--border);min-width:200px}
.panel h3{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:.68rem}
.row label{color:var(--t3);font-size:.62rem}
input[type=range]{width:80px;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.val{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--t3);min-width:22px;text-align:right}
.btn{padding:5px 10px;border-radius:6px;font-size:.68rem;font-weight:600;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t3);cursor:pointer;transition:all .2s;text-align:center;margin-top:4px;width:100%}
.btn:hover{color:var(--t1);background:rgba(255,255,255,.1)}
.matrix{display:grid;gap:2px;margin-bottom:8px}
.matrix input[type=range]{width:40px;height:3px}
.fps{position:fixed;bottom:12px;left:12px;font-size:.6rem;font-family:'Space Mono',monospace;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="panel">
    <h3>Particle Life</h3>
    <div class="row"><label>Particles</label><input type="range" id="count" min="100" max="2000" value="800"><span class="val" id="countV">800</span></div>
    <div class="row"><label>Radius</label><input type="range" id="radius" min="20" max="150" value="60"><span class="val" id="radiusV">60</span></div>
    <div class="row"><label>Friction</label><input type="range" id="friction" min="1" max="50" value="10"><span class="val" id="frictionV">.10</span></div>
    <div class="row"><label>Force</label><input type="range" id="force" min="1" max="100" value="30"><span class="val" id="forceV">30</span></div>
    <h3 style="margin-top:8px">Interaction Matrix</h3>
    <div class="matrix" id="matrix"></div>
    <button class="btn" onclick="randomMatrix()">Random Rules</button>
    <button class="btn" onclick="resetSim()">Reset</button>
  </div>
</div>
<div class="fps" id="fps"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

const TYPES=5;
const COLORS=['rgba(139,92,246,.7)','rgba(6,182,212,.7)','rgba(244,63,94,.7)','rgba(34,197,94,.7)','rgba(234,179,8,.7)'];
let matrix=[];
let particles=[];

function randomMatrix(){
  matrix=[];
  for(let i=0;i<TYPES;i++){
    matrix[i]=[];
    for(let j=0;j<TYPES;j++)matrix[i][j]=(Math.random()-.5)*2;
  }
  renderMatrix();
}

function renderMatrix(){
  const el=document.getElementById('matrix');
  el.style.gridTemplateColumns=`repeat(${TYPES},1fr)`;
  el.innerHTML='';
  for(let i=0;i<TYPES;i++){
    for(let j=0;j<TYPES;j++){
      const inp=document.createElement('input');
      inp.type='range';inp.min='-100';inp.max='100';inp.value=Math.round(matrix[i][j]*100);
      inp.title=`${i}→${j}: ${(matrix[i][j]).toFixed(2)}`;
      inp.style.background=matrix[i][j]>0?'rgba(34,197,94,.3)':'rgba(244,63,94,.3)';
      inp.addEventListener('input',()=>{matrix[i][j]=+inp.value/100;inp.style.background=matrix[i][j]>0?'rgba(34,197,94,.3)':'rgba(244,63,94,.3)'});
      el.appendChild(inp);
    }
  }
}

function resetSim(){
  const n=+document.getElementById('count').value;
  particles=[];
  for(let i=0;i<n;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:0,vy:0,
      type:Math.floor(Math.random()*TYPES)
    });
  }
}

function update(){
  const radius=+document.getElementById('radius').value;
  const friction=1-+document.getElementById('friction').value/100;
  const forceMult=+document.getElementById('force').value/100;
  const radius2=radius*radius;

  // Simple spatial hash for performance
  const cellSize=radius;
  const grid=new Map();
  particles.forEach(p=>{
    const key=Math.floor(p.x/cellSize)+','+Math.floor(p.y/cellSize);
    if(!grid.has(key))grid.set(key,[]);
    grid.get(key).push(p);
  });

  particles.forEach(p=>{
    let fx=0,fy=0;
    const gx=Math.floor(p.x/cellSize),gy=Math.floor(p.y/cellSize);

    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const cell=grid.get((gx+dx)+','+(gy+dy));
      if(!cell)continue;
      cell.forEach(other=>{
        if(other===p)return;
        const ddx=other.x-p.x,ddy=other.y-p.y;
        const dist2=ddx*ddx+ddy*ddy;
        if(dist2>radius2||dist2<1)return;
        const dist=Math.sqrt(dist2);
        const f=matrix[p.type][other.type]*forceMult;
        // Softened force
        const force=dist<radius*.3?-f*(1-dist/(radius*.3)):f*(1-dist/radius);
        fx+=ddx/dist*force;
        fy+=ddy/dist*force;
      });
    }

    p.vx=p.vx*friction+fx;
    p.vy=p.vy*friction+fy;
    p.x+=p.vx;p.y+=p.vy;

    // Wrap
    if(p.x<0)p.x+=W;if(p.x>W)p.x-=W;
    if(p.y<0)p.y+=H;if(p.y>H)p.y-=H;
  });

  // Adjust count
  const target=+document.getElementById('count').value;
  while(particles.length<target)particles.push({x:Math.random()*W,y:Math.random()*H,vx:0,vy:0,type:Math.floor(Math.random()*TYPES)});
  while(particles.length>target)particles.pop();
}

function draw(){
  ctx.fillStyle='rgba(5,5,8,.2)';ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle=COLORS[p.type];ctx.fill();
  });
}

let frames=0,fpsT=performance.now();
function loop(t){
  update();draw();
  frames++;
  if(t-fpsT>500){document.getElementById('fps').textContent=`${particles.length} particles · ${Math.round(frames*1000/(t-fpsT))} FPS`;frames=0;fpsT=t}
  requestAnimationFrame(loop);
}

document.querySelectorAll('input[type=range]').forEach(s=>{
  if(s.closest('.matrix'))return;
  const vEl=document.getElementById(s.id+'V');
  s.addEventListener('input',()=>vEl.textContent=s.id==='friction'?(+s.value/100).toFixed(2):s.value);
});

randomMatrix();resetSim();
requestAnimationFrame(loop);
</script>
</body>
</html>
